<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'Inter';
    src: url('{{FONT_PATH}}') format('woff2');
    font-weight: 100 900;
    font-style: normal;
    font-display: block;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #0f0f1a;
    font-family: 'Inter', sans-serif;
  }

  .frame { width: 1200px; height: 630px; position: relative; overflow: hidden; }

  .orbs {
    position: absolute; inset: 0; z-index: 1;
    background:
      radial-gradient(ellipse 600px 400px at 20% 40%, var(--cat-glow), transparent 70%),
      radial-gradient(ellipse 400px 350px at 80% 30%, rgba(16,185,129,0.06), transparent 70%),
      radial-gradient(ellipse 350px 250px at 50% 85%, rgba(138,43,226,0.05), transparent 70%);
  }

  .grid {
    position: absolute; inset: 0; z-index: 2;
    background-image:
      linear-gradient(rgba(102,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(102,255,255,0.035) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 20%, transparent 100%);
    -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 20%, transparent 100%);
  }

  .stripe {
    position: absolute; left: 0; top: 0; bottom: 0; width: 6px;
    background: linear-gradient(180deg, var(--cat-color), #10B981); z-index: 10;
  }

  .content {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 48px 72px;
  }

  .glass {
    background: rgba(255,255,255,0.035);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 20px;
    padding: 40px 56px;
    text-align: center;
    max-width: 900px; width: 100%;
    position: relative;
  }

  .glass::before {
    content: ''; position: absolute; inset: -1px; border-radius: 20px; padding: 1.5px;
    background: linear-gradient(135deg, var(--cat-color) 0%, transparent 35%, transparent 65%, rgba(16,185,129,0.3) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
  }

  .meta { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 16px; }

  .cat-pill {
    padding: 4px 14px; border-radius: 14px;
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--cat-color);
    border: 1px solid color-mix(in srgb, var(--cat-color) 30%, transparent);
    background: color-mix(in srgb, var(--cat-color) 5%, transparent);
  }

  .level-pill {
    padding: 4px 14px; border-radius: 14px;
    font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    color: var(--level-color);
    border: 1px solid color-mix(in srgb, var(--level-color) 25%, transparent);
    background: color-mix(in srgb, var(--level-color) 5%, transparent);
  }

  .cert-icon { width: 48px; height: 48px; margin: 0 auto 8px; }
  .cert-icon img { width: 100%; height: 100%; }

  .exam-code {
    font-size: 72px; font-weight: 900; letter-spacing: -2px;
    color: #fff; margin: 0 0 4px;
    text-shadow: 0 0 60px var(--cat-glow);
  }

  .line {
    width: 80px; height: 3px; margin: 10px auto 14px;
    background: linear-gradient(90deg, var(--cat-color), rgba(16,185,129,0.4));
    border-radius: 2px;
  }

  .exam-name {
    font-size: 22px; font-weight: 600; color: rgba(255,255,255,0.7);
    margin: 0; line-height: 1.3; max-width: 700px;
  }
  .exam-name.name-sm { font-size: 19px; }

  .footer {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 56px;
    background: linear-gradient(to top, rgba(0,0,0,0.3), transparent);
  }
  .logo-pill { display: flex; align-items: center; gap: 12px; }
  .logo-circle {
    width: 36px; height: 36px; border-radius: 50%; overflow: hidden;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.10);
  }
  .logo-circle img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .url { font-size: 14px; color: rgba(102,255,255,0.4); font-weight: 500; }
  .free-pill {
    padding: 4px 14px; border-radius: 14px;
    font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    color: #10B981; background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2);
  }
</style>
</head>
<body>
  <div class="frame" style="--cat-color: {{CAT_COLOR}}; --cat-glow: {{CAT_GLOW}}; --level-color: {{LEVEL_COLOR}};">
    <div class="orbs"></div>
    <div class="grid"></div>
    <div class="stripe"></div>
    <div class="content">
      <div class="glass">
        <div class="meta">
          <span class="cat-pill">{{CATEGORY}}</span>
          <span class="level-pill">{{LEVEL}}</span>
        </div>
        <div class="cert-icon"><img src="{{ICON_PATH}}" alt=""></div>
        <h1 class="exam-code">{{EXAM_CODE}}</h1>
        <div class="line"></div>
        <p class="exam-name {{NAME_CLASS}}">{{EXAM_NAME}}</p>
      </div>
    </div>
    <div class="footer">
      <div class="logo-pill">
        <div class="logo-circle"><img src="{{LOGO_PATH}}" alt=""></div>
        <span class="url">aguidetocloud.com/cert-tracker</span>
      </div>
      <span class="free-pill">📖 Free Study Guide</span>
    </div>
  </div>
</body>
</html>
