<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  /* V3 — Cert Guide OG template (April 2026 redesign) */
  @font-face {
    font-family: 'Inter';
    src: url('{{FONT_PATH}}') format('woff2');
    font-weight: 100 900;
    font-style: normal;
    font-display: block;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #030308;
    font-family: 'Inter', sans-serif;
  }

  .frame { width: 1200px; height: 630px; position: relative; overflow: hidden; }

  .ambient { position: absolute; inset: 0; z-index: 1; }

  /* Stacked pages pattern */
  .art-layer { position: absolute; inset: 0; z-index: 2; opacity: 0.50; }
  .art-layer svg { width: 100%; height: 100%; }

  .fade-overlay {
    position: absolute; inset: 0; z-index: 3;
    background: radial-gradient(ellipse 110% 90% at 50% 50%, transparent 40%, #030308 90%);
  }

  .content {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 10px 56px;
  }

  .glass {
    background: rgba(8,8,20,0.58);
    backdrop-filter: blur(90px); -webkit-backdrop-filter: blur(90px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 48px 64px;
    text-align: center;
    max-width: 860px; width: 100%;
    position: relative;
  }

  .glass::before {
    content: '';
    position: absolute; inset: -1px;
    border-radius: 24px; padding: 1.5px;
    background: linear-gradient(135deg, color-mix(in srgb, var(--cat-color) 50%, transparent) 0%, color-mix(in srgb, var(--cat-color) 10%, transparent) 25%, transparent 50%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
  }

  .meta {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin-bottom: 18px;
  }
  .meta-cat { font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--cat-color); }
  .meta-dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.2); }
  .meta-level { font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--level-color); }

  .exam-code {
    font-size: 130px; font-weight: 900; letter-spacing: -4px;
    color: #fff; margin: 0 0 12px; line-height: 1.0;
    text-shadow: 0 0 80px var(--cat-glow);
  }

  .separator {
    width: 48px; height: 3px;
    background: linear-gradient(90deg, var(--cat-color), color-mix(in srgb, var(--cat-color) 30%, transparent));
    border-radius: 2px; margin: 0 auto 16px;
  }

  .exam-name {
    font-size: 32px; font-weight: 500;
    color: rgba(255,255,255,0.55);
    margin: 0 0 16px; line-height: 1.3; max-width: 700px;
  }
  .exam-name.name-sm { font-size: 26px; }

  .badge {
    font-size: 15px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--cat-color); opacity: 0.7;
  }
</style>
</head>
<body>
  <div class="frame" style="--cat-color: {{CAT_COLOR}}; --cat-glow: {{CAT_GLOW}}; --level-color: {{LEVEL_COLOR}};">
    <div class="ambient" style="background:
      radial-gradient(ellipse 800px 600px at 20% 25%, {{AMBIENT_PRIMARY}}, transparent 70%),
      radial-gradient(ellipse 500px 400px at 80% 70%, {{AMBIENT_SECONDARY}}, transparent 70%);">
    </div>
    <div class="art-layer">
      <svg viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Stacked pages — left -->
        <rect x="50" y="80" width="180" height="240" rx="5" fill="none" stroke="{{PCOLOR}}" stroke-width="0.8"/>
        <rect x="68" y="62" width="180" height="240" rx="5" fill="none" stroke="{{PCOLOR}}" stroke-width="1"/>
        <rect x="86" y="44" width="180" height="240" rx="5" fill="none" stroke="{{PCOLOR}}" stroke-width="1.2"/>
        <rect x="106" y="72" width="120" height="4" rx="2" fill="{{PCOLOR}}"/>
        <rect x="106" y="88" width="90" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="106" y="102" width="140" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="106" y="116" width="70" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="106" y="130" width="110" height="3" rx="2" fill="{{PCOLOR}}"/>
        <circle cx="116" cy="160" r="5" fill="none" stroke="{{PCOLOR}}" stroke-width="1.5"/>
        <rect x="130" y="157" width="80" height="3" rx="2" fill="{{PCOLOR}}"/>
        <circle cx="116" cy="178" r="5" fill="none" stroke="{{PCOLOR}}" stroke-width="1.5"/>
        <rect x="130" y="175" width="60" height="3" rx="2" fill="{{PCOLOR}}"/>
        <circle cx="116" cy="196" r="5" fill="none" stroke="{{PCOLOR}}" stroke-width="1.5"/>
        <rect x="130" y="193" width="100" height="3" rx="2" fill="{{PCOLOR}}"/>
        <!-- Stacked pages — right -->
        <rect x="920" y="330" width="180" height="240" rx="5" fill="none" stroke="{{PCOLOR}}" stroke-width="0.8"/>
        <rect x="938" y="312" width="180" height="240" rx="5" fill="none" stroke="{{PCOLOR}}" stroke-width="1"/>
        <rect x="956" y="294" width="180" height="240" rx="5" fill="none" stroke="{{PCOLOR}}" stroke-width="1.2"/>
        <rect x="976" y="322" width="120" height="4" rx="2" fill="{{PCOLOR}}"/>
        <rect x="976" y="338" width="90" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="976" y="352" width="140" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="976" y="366" width="70" height="3" rx="2" fill="{{PCOLOR}}"/>
        <!-- Progress bars -->
        <rect x="380" y="60" width="160" height="8" rx="4" fill="none" stroke="{{PCOLOR}}" stroke-width="1"/>
        <rect x="380" y="60" width="120" height="8" rx="4" fill="{{PCOLOR}}"/>
        <rect x="660" y="560" width="160" height="8" rx="4" fill="none" stroke="{{PCOLOR}}" stroke-width="1"/>
        <rect x="660" y="560" width="64" height="8" rx="4" fill="{{PCOLOR}}"/>
        <!-- Badge circles -->
        <circle cx="460" cy="520" r="18" fill="none" stroke="{{PCOLOR}}" stroke-width="1.5"/>
        <circle cx="780" cy="80" r="14" fill="none" stroke="{{PCOLOR}}" stroke-width="1"/>
        <circle cx="780" cy="80" r="22" fill="none" stroke="{{PCOLOR}}" stroke-width="0.6" opacity="0.5"/>
        <!-- Connections -->
        <line x1="266" y1="160" x2="380" y2="64" stroke="{{PCOLOR}}" stroke-width="0.5" stroke-dasharray="3,5"/>
        <line x1="956" y1="350" x2="820" y2="564" stroke="{{PCOLOR}}" stroke-width="0.5" stroke-dasharray="3,5"/>
      </svg>
    </div>
    <div class="fade-overlay"></div>
    <div class="content">
      <div class="glass">
        <div class="meta">
          <span class="meta-cat">{{CATEGORY}}</span>
          <span class="meta-dot"></span>
          <span class="meta-level">{{LEVEL}}</span>
        </div>
        <h1 class="exam-code">{{EXAM_CODE}}</h1>
        <div class="separator"></div>
        <p class="exam-name {{NAME_CLASS}}">{{EXAM_NAME}}</p>
        <span class="badge">📖 Free Study Guide</span>
      </div>
    </div>
  </div>
</body>
</html>
