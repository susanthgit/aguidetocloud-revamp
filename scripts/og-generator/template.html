<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0f0f1a;
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  .frame {
    width: 1200px;
    height: 630px;
    position: relative;
    overflow: hidden;
  }

  /* Ambient gradient orbs */
  .orbs {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 15% 30%, rgba(255,102,255,0.12), transparent 70%),
      radial-gradient(ellipse 500px 350px at 85% 60%, var(--accent-glow-bg), transparent 70%),
      radial-gradient(ellipse 400px 300px at 50% 80%, rgba(138,43,226,0.06), transparent 70%);
    z-index: 1;
  }

  /* Wireframe grid */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(102,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(102,255,255,0.035) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 20%, transparent 100%);
    -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 20%, transparent 100%);
    z-index: 2;
  }

  /* Accent orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    z-index: 3;
  }
  .orb-1 {
    width: 300px; height: 300px;
    top: -80px; right: -60px;
    background: radial-gradient(circle, var(--accent-glow), transparent 70%);
    opacity: 0.18;
  }
  .orb-2 {
    width: 250px; height: 250px;
    bottom: -80px; left: -60px;
    background: radial-gradient(circle, var(--accent-glow), transparent 70%);
    opacity: 0.10;
  }

  /* Content */
  .content {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 48px 72px;
  }

  /* Glass card */
  .glass {
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    padding: 44px 64px;
    text-align: center;
    max-width: 900px;
    width: 100%;
    position: relative;
  }

  /* Gradient border */
  .glass::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 24px;
    padding: 1.5px;
    background: linear-gradient(
      135deg,
      var(--accent) 0%,
      transparent 40%,
      transparent 60%,
      rgba(102,255,255,0.3) 100%
    );
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  /* Category pill */
  .pill {
    display: inline-block;
    padding: 5px 18px;
    border-radius: 16px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
    background: color-mix(in srgb, var(--accent) 6%, transparent);
    margin-bottom: 16px;
  }

  .emoji {
    font-size: 56px;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 20px var(--accent-glow));
  }

  .title {
    font-size: 50px;
    font-weight: 800;
    letter-spacing: -1px;
    color: #ffffff;
    margin: 0 0 8px;
    text-shadow: 0 0 50px var(--accent-glow);
    line-height: 1.1;
  }

  /* Auto-shrink for long titles */
  .title.title-sm { font-size: 42px; }

  .line {
    width: 100px;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), rgba(102,255,255,0.5));
    border-radius: 2px;
    margin: 14px auto;
  }

  .tagline {
    font-size: 20px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.65);
    margin: 0;
    line-height: 1.4;
  }

  /* Footer */
  .footer {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 48px;
    background: linear-gradient(to top, rgba(0,0,0,0.35), transparent);
  }

  .logo-pill {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-circle {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    overflow: hidden;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.10);
    flex-shrink: 0;
  }

  .logo-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .url {
    font-size: 17px;
    font-weight: 500;
    color: rgba(102,255,255,0.55);
    letter-spacing: 0.5px;
  }

  .brand {
    font-size: 15px;
    font-weight: 600;
    color: rgba(255,255,255,0.4);
  }
  .brand span { color: rgba(102,255,255,0.6); }
</style>
</head>
<body>
  <div class="frame" style="--accent: {{ACCENT}}; --accent-glow: {{ACCENT_GLOW}}; --accent-glow-bg: {{ACCENT_GLOW_BG}};">
    <div class="orbs"></div>
    <div class="grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="content">
      <div class="glass">
        <div class="pill">Free Tool — {{CATEGORY}}</div>
        <div class="emoji">{{EMOJI}}</div>
        <h1 class="title {{TITLE_CLASS}}">{{TITLE}}</h1>
        <div class="line"></div>
        <p class="tagline">{{TAGLINE}}</p>
      </div>
    </div>
    <div class="footer">
      <div class="logo-pill">
        <div class="logo-circle">
          <img src="{{LOGO_PATH}}" alt="">
        </div>
        <span class="url">aguidetocloud.com</span>
      </div>
      <span class="brand">A Guide to <span>Cloud & AI</span></span>
    </div>
  </div>
</body>
</html>
