<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  /* V3 — Raycast-inspired OG template (April 2026 redesign) */
  @font-face {
    font-family: 'Inter';
    src: url('{{FONT_PATH}}') format('woff2');
    font-weight: 100 900;
    font-style: normal;
    font-display: block;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #030308;
    font-family: 'Inter', sans-serif;
  }

  .frame {
    width: 1200px;
    height: 630px;
    position: relative;
    overflow: hidden;
  }

  /* L1: Ambient accent gradient wash */
  .ambient {
    position: absolute; inset: 0; z-index: 1;
  }

  /* L2: SVG abstract art pattern — per category */
  .art-layer {
    position: absolute; inset: 0; z-index: 2;
    opacity: {{PATTERN_OPACITY}};
  }
  .art-layer svg { width: 100%; height: 100%; }

  /* L3: Vignette fade — softens pattern edges */
  .fade-overlay {
    position: absolute; inset: 0; z-index: 3;
    background: radial-gradient(ellipse 110% 90% at 50% 50%, transparent 40%, #030308 90%);
  }

  /* L4: Frosted glass card */
  .content {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 36px 56px;
  }

  .glass {
    background: rgba(8,8,20,0.55);
    backdrop-filter: blur(72px);
    -webkit-backdrop-filter: blur(72px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 48px 64px;
    text-align: center;
    max-width: 860px;
    width: 100%;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    position: relative;
  }

  /* Gradient border — accent glow at top-left corner */
  .glass::before {
    content: '';
    position: absolute; inset: -1px;
    border-radius: 24px; padding: 1.5px;
    background: linear-gradient(
      135deg,
      color-mix(in srgb, var(--accent) 55%, transparent) 0%,
      color-mix(in srgb, var(--accent) 12%, transparent) 25%,
      transparent 50%
    );
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  /* Inner accent glow */
  .glass::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 50%; height: 50%;
    border-radius: 24px 0 0 0;
    background: radial-gradient(ellipse at 0% 0%, var(--accent-glow), transparent 70%);
    opacity: 0.06;
    pointer-events: none;
  }

  /* Typography */
  .category {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 22px;
    opacity: 0.9;
  }

  .title {
    font-size: 76px;
    font-weight: 800;
    color: #ffffff;
    margin: 0 0 18px;
    letter-spacing: -2px;
    line-height: 1.02;
    text-shadow: 0 0 80px var(--accent-glow);
  }

  .title.title-sm { font-size: 62px; }
  .title.title-xs { font-size: 52px; }

  .separator {
    width: 56px;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 30%, transparent));
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .tagline {
    font-size: 24px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    margin: 0;
    line-height: 1.4;
    max-width: 720px;
  }
</style>
</head>
<body>
  <div class="frame" style="--accent: {{ACCENT}}; --accent-glow: {{ACCENT_GLOW}};">

    <!-- L1: Ambient gradient -->
    <div class="ambient" style="background:
      radial-gradient(ellipse 800px 600px at 20% 25%, {{AMBIENT_PRIMARY}}, transparent 70%),
      radial-gradient(ellipse 500px 400px at 80% 70%, {{AMBIENT_SECONDARY}}, transparent 70%),
      radial-gradient(ellipse 400px 300px at 50% 50%, rgba(138,43,226,0.04), transparent 70%);">
    </div>

    <!-- L2: Category SVG art -->
    <div class="art-layer">
      {{PATTERN_SVG}}
    </div>

    <!-- L3: Vignette -->
    <div class="fade-overlay"></div>

    <!-- L4: Glass card + content -->
    <div class="content">
      <div class="glass">
        <div class="category">{{CATEGORY}} · Free Tool</div>
        <h1 class="title {{TITLE_CLASS}}">{{TITLE}}</h1>
        <div class="separator"></div>
        <p class="tagline">{{TAGLINE}}</p>
      </div>
    </div>

  </div>
</body>
</html>
