<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  /* V3 — Section Page OG template (April 2026 redesign) */
  @font-face {
    font-family: 'Inter';
    src: url('{{FONT_PATH}}') format('woff2');
    font-weight: 100 900;
    font-style: normal;
    font-display: block;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #030308;
    font-family: 'Inter', sans-serif;
  }

  .frame { width: 1200px; height: 630px; position: relative; overflow: hidden; }

  .ambient { position: absolute; inset: 0; z-index: 1; }

  .art-layer { position: absolute; inset: 0; z-index: 2; opacity: 0.40; }
  .art-layer svg { width: 100%; height: 100%; }

  .fade-overlay {
    position: absolute; inset: 0; z-index: 3;
    background: radial-gradient(ellipse 110% 90% at 50% 50%, transparent 40%, #030308 90%);
  }

  .content {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 10px 56px;
  }

  .glass {
    background: rgba(8,8,20,0.58);
    backdrop-filter: blur(90px); -webkit-backdrop-filter: blur(90px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 52px 72px;
    text-align: center;
    max-width: 860px; width: 100%;
    position: relative;
  }

  .glass::before {
    content: '';
    position: absolute; inset: -1px;
    border-radius: 24px; padding: 1.5px;
    background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 50%, transparent) 0%, color-mix(in srgb, var(--accent) 10%, transparent) 25%, transparent 50%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
  }

  .pill {
    font-size: 17px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 24px; opacity: 0.9;
  }

  .title {
    font-size: 92px; font-weight: 800;
    color: #fff; margin: 0 0 18px;
    letter-spacing: -2.5px; line-height: 1.02;
  }
  .title.title-sm { font-size: 72px; }

  .separator {
    width: 56px; height: 3px;
    background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 30%, transparent));
    border-radius: 2px; margin: 0 auto 22px;
  }

  .tagline {
    font-size: 28px; font-weight: 400;
    color: rgba(255,255,255,0.55);
    margin: 0; line-height: 1.4;
  }
</style>
</head>
<body>
  <div class="frame" style="--accent: {{ACCENT}};">
    <div class="ambient" style="background:
      radial-gradient(ellipse 800px 600px at 15% 20%, {{AMBIENT_PRIMARY}}, transparent 70%),
      radial-gradient(ellipse 500px 400px at 85% 70%, {{AMBIENT_SECONDARY}}, transparent 70%),
      radial-gradient(ellipse 400px 300px at 50% 50%, rgba(138,43,226,0.04), transparent 70%);">
    </div>
    <div class="art-layer">
      {{PATTERN_SVG}}
    </div>
    <div class="fade-overlay"></div>
    <div class="content">
      <div class="glass">
        <div class="pill">{{PILL}}</div>
        <h1 class="title {{TITLE_CLASS}}">{{TITLE}}</h1>
        <div class="separator"></div>
        <p class="tagline">{{TAGLINE}}</p>
      </div>
    </div>
  </div>
</body>
</html>
