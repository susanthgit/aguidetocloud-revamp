<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  /* V3 — Written Blog OG template (April 2026 redesign) */
  @font-face {
    font-family: 'Inter';
    src: url('{{FONT_PATH}}') format('woff2');
    font-weight: 100 900;
    font-style: normal;
    font-display: block;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #030308;
    font-family: 'Inter', sans-serif;
  }

  .frame { width: 1200px; height: 630px; position: relative; overflow: hidden; }

  /* L1: Ambient accent wash */
  .ambient { position: absolute; inset: 0; z-index: 1; }

  /* L2: Editorial text-lines pattern */
  .art-layer { position: absolute; inset: 0; z-index: 2; opacity: 0.50; }
  .art-layer svg { width: 100%; height: 100%; }

  /* L3: Vignette */
  .fade-overlay {
    position: absolute; inset: 0; z-index: 3;
    background: radial-gradient(ellipse 110% 90% at 50% 50%, transparent 40%, #030308 90%);
  }

  /* L4: Glass card — left-aligned editorial */
  .content {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 16px 56px;
  }

  .glass {
    background: rgba(8,8,20,0.55);
    backdrop-filter: blur(72px); -webkit-backdrop-filter: blur(72px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 44px 64px;
    text-align: left;
    max-width: 920px; width: 100%;
    position: relative;
  }

  .glass::before {
    content: '';
    position: absolute; inset: -1px;
    border-radius: 24px; padding: 1.5px;
    background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 50%, transparent) 0%, color-mix(in srgb, var(--accent) 10%, transparent) 25%, transparent 50%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
  }

  .meta { display: flex; align-items: center; gap: 14px; margin-bottom: 22px; }
  .meta-cat { font-size: 14px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--accent); opacity: 0.9; }
  .meta-dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.2); }
  .meta-date { font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.3); }

  .title {
    font-size: 64px; font-weight: 800; color: #fff;
    margin: 0 0 16px; letter-spacing: -1.5px; line-height: 1.06;
    max-width: 780px;
  }
  .title.title-sm { font-size: 54px; }
  .title.title-xs { font-size: 46px; }

  .separator {
    width: 48px; height: 3px;
    background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 30%, transparent));
    border-radius: 2px; margin-bottom: 18px;
  }

  .subtitle {
    font-size: 24px; font-weight: 400;
    color: rgba(255,255,255,0.5);
    margin: 0; line-height: 1.4; max-width: 700px;
  }
</style>
</head>
<body>
  <div class="frame" style="--accent: {{ACCENT}};">
    <div class="ambient" style="background:
      radial-gradient(ellipse 800px 600px at 15% 20%, {{AMBIENT_PRIMARY}}, transparent 70%),
      radial-gradient(ellipse 500px 400px at 85% 70%, {{AMBIENT_SECONDARY}}, transparent 70%),
      radial-gradient(ellipse 400px 300px at 50% 50%, rgba(138,43,226,0.04), transparent 70%);">
    </div>
    <div class="art-layer">
      <svg viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="60" y="60" width="280" height="4" rx="2" fill="{{PCOLOR}}"/>
        <rect x="60" y="78" width="220" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="60" y="94" width="260" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="60" y="110" width="180" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="60" y="126" width="240" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="60" y="142" width="200" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="60" y="158" width="260" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="60" y="174" width="140" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="60" y="200" width="250" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="60" y="216" width="190" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="60" y="232" width="270" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="60" y="248" width="160" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="880" y="380" width="260" height="4" rx="2" fill="{{PCOLOR}}"/>
        <rect x="880" y="398" width="200" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="880" y="414" width="240" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="880" y="430" width="180" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="880" y="446" width="260" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="880" y="462" width="220" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="880" y="478" width="240" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="880" y="494" width="160" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="880" y="520" width="200" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="880" y="536" width="260" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="880" y="552" width="140" height="3" rx="2" fill="{{PCOLOR}}"/>
        <line x1="60" y1="280" x2="340" y2="280" stroke="{{PCOLOR}}" stroke-width="1" stroke-dasharray="6,4"/>
        <line x1="880" y1="360" x2="1140" y2="360" stroke="{{PCOLOR}}" stroke-width="1" stroke-dasharray="6,4"/>
        <text x="420" y="120" font-family="Inter" font-size="80" font-weight="900" fill="{{PCOLOR}}" opacity="0.15">"</text>
        <circle cx="500" cy="500" r="3" fill="{{PCOLOR}}"/>
        <circle cx="750" cy="100" r="4" fill="none" stroke="{{PCOLOR}}" stroke-width="1.5"/>
        <circle cx="400" cy="400" r="3" fill="{{PCOLOR}}"/>
        <rect x="60" y="430" width="200" height="140" rx="6" fill="none" stroke="{{PCOLOR}}" stroke-width="1"/>
        <rect x="60" y="430" width="200" height="30" rx="6" fill="{{PCOLOR}}" opacity="0.08"/>
        <rect x="78" y="478" width="120" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="78" y="492" width="80" height="3" rx="2" fill="{{PCOLOR}}"/>
        <rect x="78" y="506" width="140" height="3" rx="2" fill="{{PCOLOR}}"/>
      </svg>
    </div>
    <div class="fade-overlay"></div>
    <div class="content">
      <div class="glass">
        <div class="meta">
          <span class="meta-cat">{{CATEGORY}}</span>
          <span class="meta-dot"></span>
          <span class="meta-date">{{DATE}}</span>
        </div>
        <h1 class="title {{TITLE_CLASS}}">{{TITLE}}</h1>
        <div class="separator"></div>
        <p class="subtitle">{{SUBTITLE}}</p>
      </div>
    </div>
  </div>
</body>
</html>
