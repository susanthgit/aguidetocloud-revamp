<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family: 'Inter'; src: url('{{FONT_PATH}}') format('woff2'); font-weight: 100 900; font-style: normal; font-display: block; }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 1200px; overflow: hidden; background: #030308; font-family: 'Inter', sans-serif; }
  .frame { width: 1200px; height: 1200px; position: relative; overflow: hidden; }
  .ambient { position: absolute; inset: 0; z-index: 1; }
  .art-layer { position: absolute; inset: 0; z-index: 2; opacity: {{PATTERN_OPACITY}}; }
  .art-layer svg { width: 100%; height: 100%; }
  .content { position: absolute; inset: 0; z-index: 10; display: flex; justify-content: center; align-items: center; }
  .glass {
    background: rgba(8,8,20,0.50); backdrop-filter: blur(72px); -webkit-backdrop-filter: blur(72px);
    border: 1px solid rgba(255,255,255,0.10); border-radius: 32px;
    width: 880px; height: 880px; display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 52px; text-align: center; position: relative;
  }
  .glass::before {
    content: ''; position: absolute; inset: -1px; border-radius: 32px; padding: 1.5px;
    background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 55%, transparent) 0%, color-mix(in srgb, var(--accent) 12%, transparent) 25%, transparent 50%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
  }
  .type-badge {
    display: inline-block; font-size: 36px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase;
    color: var(--accent); background: rgba(255,255,255,0.06); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent); border-radius: 50px; padding: 16px 48px; margin-bottom: 32px;
  }
  .hero { font-size: {{HERO_SIZE}}; font-weight: 900; letter-spacing: -4px; line-height: 1.0; color: #fff; margin: 0 0 20px; text-shadow: 0 0 80px var(--glow); white-space: nowrap; }
  .separator { width: 64px; height: 4px; background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 30%, transparent)); border-radius: 2px; margin: 0 auto 24px; }
  .title { font-size: 64px; font-weight: 700; color: rgba(255,255,255,0.65); margin: 0 0 16px; line-height: 1.2; }
  .meta { font-size: 40px; font-weight: 500; color: rgba(255,255,255,0.35); margin: 0; }
  .price-pill {
    display: inline-block; padding: 14px 36px; border-radius: 20px; font-size: 34px; font-weight: 700;
    color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    background: color-mix(in srgb, var(--accent) 6%, transparent); margin-top: 24px;
  }
</style>
</head>
<body>
  <div class="frame" style="--accent: {{ACCENT}}; --glow: {{ACCENT_GLOW}};">
    <div class="ambient" style="background: radial-gradient(ellipse 1000px 1000px at 25% 20%, {{AMBIENT_PRIMARY}}, transparent 70%), radial-gradient(ellipse 900px 900px at 75% 80%, {{AMBIENT_SECONDARY}}, transparent 70%);"></div>
    <div class="art-layer">{{PATTERN_SVG}}</div>
    <div class="content">
      <div class="glass">
        <div class="type-badge">{{TYPE_BADGE}}</div>
        <h1 class="hero">{{HERO_TEXT}}</h1>
        <div class="separator"></div>
        {{TITLE_HTML}}
        <p class="meta">{{META}}</p>
        <div class="price-pill">{{PRICE_TEXT}}</div>
      </div>
    </div>
  </div>
</body>
</html>
