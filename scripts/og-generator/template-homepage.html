<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'Inter';
    src: url('{{FONT_PATH}}') format('woff2');
    font-weight: 100 900;
    font-style: normal;
    font-display: block;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #0f0f1a;
    font-family: 'Inter', sans-serif;
  }

  .frame { width: 1200px; height: 630px; position: relative; overflow: hidden; }

  .orbs {
    position: absolute; inset: 0; z-index: 1;
    background:
      radial-gradient(ellipse 700px 500px at 20% 25%, rgba(255,102,255,0.30), transparent 60%),
      radial-gradient(ellipse 600px 450px at 80% 50%, rgba(102,255,255,0.25), transparent 60%),
      radial-gradient(ellipse 500px 400px at 50% 85%, rgba(138,43,226,0.18), transparent 65%),
      radial-gradient(ellipse 350px 300px at 5% 65%, rgba(59,130,246,0.14), transparent 65%),
      radial-gradient(ellipse 350px 280px at 95% 15%, rgba(255,102,255,0.10), transparent 65%),
      radial-gradient(ellipse 250px 250px at 40% 10%, rgba(102,255,255,0.08), transparent 70%);
  }

  .grid {
    position: absolute; inset: 0; z-index: 2;
    background-image:
      linear-gradient(rgba(102,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(102,255,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 20%, transparent 100%);
    -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 20%, transparent 100%);
  }

  .content {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 48px 72px;
  }

  .glass {
    background: rgba(255,255,255,0.035);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 24px;
    padding: 44px 64px;
    text-align: center;
    max-width: 900px; width: 100%;
    position: relative;
  }

  .glass::before {
    content: ''; position: absolute; inset: -1px; border-radius: 24px; padding: 1.5px;
    background: linear-gradient(135deg, #66ffff 0%, transparent 35%, transparent 65%, rgba(255,102,255,0.35) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
  }

  .logo-circle {
    width: 88px; height: 88px;
    border-radius: 50%; overflow: hidden;
    margin: 0 auto 20px;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: 0 0 40px rgba(255,102,255,0.20), 0 0 80px rgba(255,102,255,0.08);
  }
  .logo-circle img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .site-name {
    font-size: 46px; font-weight: 800; color: #fff; margin: 0; letter-spacing: -0.5px;
  }
  .site-name .mag { color: #ff66ff; }

  .line {
    width: 100px; height: 3px; margin: 14px auto;
    background: linear-gradient(90deg, #66ffff, #ff66ff); border-radius: 2px;
  }

  .tagline {
    font-size: 20px; color: rgba(255,255,255,0.55); margin: 0; line-height: 1.4;
  }

  .pills { display: flex; gap: 14px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
  .pill {
    padding: 6px 18px; border-radius: 20px;
    font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.65);
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  }

  .footer {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
    display: flex; justify-content: center; padding: 18px;
  }
  .footer-url { font-size: 15px; color: rgba(102,255,255,0.35); font-weight: 500; }
</style>
</head>
<body>
  <div class="frame">
    <div class="orbs"></div>
    <div class="grid"></div>
    <div class="content">
      <div class="glass">
        <div class="logo-circle">
          <img src="{{LOGO_PATH}}" alt="">
        </div>
        <h1 class="site-name">A Guide to <span class="mag">Cloud & AI</span></h1>
        <div class="line"></div>
        <p class="tagline">{{TAGLINE}}</p>
        <div class="pills">{{PILLS_HTML}}</div>
      </div>
    </div>
    <div class="footer">
      <span class="footer-url">aguidetocloud.com</span>
    </div>
  </div>
</body>
</html>
