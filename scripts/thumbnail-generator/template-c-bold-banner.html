<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'Inter';
    src: url('{{FONT_PATH}}') format('woff2');
    font-weight: 100 900;
    font-style: normal;
    font-display: block;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px; height: 720px; overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: {{BG_GRADIENT}};
  }

  .frame { width: 1280px; height: 720px; position: relative; overflow: hidden; }

  /* Large frosted panel — fills most of frame */
  .backdrop {
    position: absolute;
    inset: 28px;
    z-index: 5;
    border-radius: 32px;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
    border: 1.5px solid rgba(255,255,255,0.75);
    box-shadow:
      0 12px 48px rgba(0,0,0,0.06),
      inset 0 1px 0 rgba(255,255,255,0.9);
  }

  /* Accent accent strip — left edge of card */
  .accent-strip {
    position: absolute;
    left: 28px; top: 28px; bottom: 28px;
    width: 8px;
    border-radius: 32px 0 0 32px;
    background: linear-gradient(180deg, {{ACCENT}}, {{ACCENT_LIGHT}});
    z-index: 10;
  }

  /* Content over the backdrop */
  .content {
    position: absolute; inset: 28px;
    z-index: 10;
    display: flex; flex-direction: column; justify-content: center;
    padding: 48px 80px;
    border-radius: 32px;
  }

  /* Category pill — top */
  .pill {
    display: inline-flex; align-self: flex-start;
    padding: 7px 22px;
    border-radius: 22px;
    font-size: 15px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: #fff;
    background: {{ACCENT}};
    margin-bottom: 20px;
    box-shadow: 0 4px 16px {{ACCENT_SHADOW}};
  }

  /* MASSIVE title for max YouTube readability */
  .title {
    font-size: 72px; font-weight: 900;
    letter-spacing: -3px; line-height: 1.0;
    color: {{TEXT_DARK}};
    margin: 0 0 16px;
    max-width: 1000px;
  }
  .title.title-sm { font-size: 58px; letter-spacing: -2px; }
  .title.title-xs { font-size: 48px; letter-spacing: -1.5px; }

  .subtitle {
    font-size: 26px; font-weight: 400;
    color: rgba(0,0,0,0.35);
    margin: 0; line-height: 1.3;
    max-width: 800px;
  }

  /* Bottom bar */
  .footer {
    position: absolute; bottom: 44px; left: 80px; right: 80px;
    z-index: 15;
    display: flex; justify-content: space-between; align-items: center;
  }

  .logo-row { display: flex; align-items: center; gap: 14px; }
  .logo-circle {
    width: 44px; height: 44px; border-radius: 50%; overflow: hidden;
    background: rgba(255,255,255,0.8); border: 1.5px solid rgba(0,0,0,0.08);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .logo-circle img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .channel-name { font-size: 17px; font-weight: 600; color: rgba(0,0,0,0.4); }

  /* Emoji floater — decorative, top-right area */
  .emoji-float {
    position: absolute; top: 72px; right: 100px; z-index: 12;
    width: 100px; height: 100px;
    filter: drop-shadow(0 8px 24px {{ACCENT_SHADOW}});
    opacity: 0.85;
  }
  .emoji-float img { width: 100%; height: 100%; }

  /* "Bites" badge — bottom right */
  .bites-badge {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 20px;
    border-radius: 22px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1.5px solid rgba(0,0,0,0.06);
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .bites-badge .dot { width: 10px; height: 10px; border-radius: 50%; background: {{ACCENT}}; }
  .bites-badge span { font-size: 14px; font-weight: 700; color: rgba(0,0,0,0.5); letter-spacing: 1px; text-transform: uppercase; }

  /* Series indicator */
  .series {
    position: absolute; top: 48px; left: 80px; z-index: 20;
    padding: 7px 18px;
    border-radius: 20px;
    background: {{ACCENT}};
    color: #fff;
    font-size: 14px; font-weight: 700; letter-spacing: 0.5px;
    box-shadow: 0 2px 8px {{ACCENT_SHADOW}};
  }

  /* Ambient orbs */
  .orb {
    position: absolute; border-radius: 50%; z-index: 0;
  }
  .orb-1 {
    width: 400px; height: 400px; top: -120px; right: -80px;
    background: radial-gradient(circle, {{ORB_1}}, transparent 70%);
  }
  .orb-2 {
    width: 350px; height: 350px; bottom: -100px; left: -60px;
    background: radial-gradient(circle, {{ORB_2}}, transparent 70%);
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="backdrop"></div>
    <div class="accent-strip"></div>

    {{SERIES_HTML}}

    <div class="content">
      <div class="pill">{{CATEGORY}}</div>
      <h1 class="title {{TITLE_CLASS}}">{{TITLE}}</h1>
      <p class="subtitle">{{SUBTITLE}}</p>
    </div>

    <div class="emoji-float"><img src="{{EMOJI_PATH}}" alt=""></div>

    <div class="footer">
      <div class="logo-row">
        <div class="logo-circle"><img src="{{LOGO_PATH}}" alt=""></div>
        <span class="channel-name">A Guide to Cloud & AI</span>
      </div>
      <div class="bites-badge">
        <div class="dot"></div>
        <span>Bites</span>
      </div>
    </div>
  </div>
</body>
</html>
