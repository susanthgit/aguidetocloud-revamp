<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'Inter';
    src: url('{{FONT_PATH}}') format('woff2');
    font-weight: 100 900;
    font-style: normal;
    font-display: block;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px; height: 720px; overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: {{BG_BASE}};
  }

  .frame { width: 1280px; height: 720px; position: relative; overflow: hidden; }

  /* ─── PROMINENT GRADIENT ORBS ─── */
  .orb {
    position: absolute; border-radius: 50%; z-index: 1;
    filter: blur(70px);
  }
  /* Large accent orb — top right, big and punchy */
  .orb-1 {
    width: 600px; height: 600px;
    top: -160px; right: -60px;
    background: {{ORB_ACCENT}};
  }
  /* Secondary orb — bottom left, warm contrast */
  .orb-2 {
    width: 520px; height: 520px;
    bottom: -150px; left: -100px;
    background: {{ORB_SECONDARY}};
  }
  /* Tertiary — mid-centre, adds depth */
  .orb-3 {
    width: 400px; height: 400px;
    top: 40%; left: 35%;
    transform: translate(-50%, -50%);
    background: {{ORB_TERTIARY}};
  }

  /* Soft dot grid overlay */
  .grid-dots {
    position: absolute; inset: 0; z-index: 2;
    background-image:
      radial-gradient(circle 1.2px at center, rgba(0,0,0,0.04) 0%, transparent 100%);
    background-size: 32px 32px;
    mask-image: radial-gradient(ellipse 100% 100% at 50% 50%, black 40%, transparent 100%);
    -webkit-mask-image: radial-gradient(ellipse 100% 100% at 50% 50%, black 40%, transparent 100%);
  }

  /* ─── GLASSMORPHISM CARD ─── */
  .glass-card {
    position: absolute;
    top: 28px; left: 28px; right: 28px; bottom: 28px;
    z-index: 5;
    border-radius: 28px;
    background: rgba(255, 255, 255, 0.40);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1.5px solid rgba(255, 255, 255, 0.70);
    box-shadow:
      0 8px 40px rgba(0,0,0,0.06),
      0 1px 3px rgba(0,0,0,0.03),
      inset 0 1px 0 rgba(255,255,255,0.85);
    overflow: hidden;
  }

  /* Gradient border glow */
  .glass-card::before {
    content: ''; position: absolute; inset: -1.5px;
    border-radius: 28px; padding: 2px;
    background: linear-gradient(
      135deg,
      {{ACCENT}} 0%,
      transparent 30%,
      transparent 70%,
      {{ACCENT_LIGHT}} 100%
    );
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    pointer-events: none;
    z-index: 1;
  }

  /* Accent strip — left edge */
  .accent-strip {
    position: absolute;
    left: 0; top: 0; bottom: 0; width: 8px;
    background: linear-gradient(180deg, {{ACCENT}}, {{ACCENT_LIGHT}});
    z-index: 2;
    border-radius: 28px 0 0 28px;
  }

  /* ─── TWO-COLUMN LAYOUT ─── */
  .content {
    position: absolute;
    top: 28px; left: 28px; right: 28px; bottom: 28px;
    z-index: 10;
    display: flex; align-items: center;
    padding: 48px 56px;
    border-radius: 28px;
    gap: 24px;
  }

  /* Left column — text, takes up ~65% */
  .text-col {
    flex: 1 1 65%;
    display: flex; flex-direction: column;
    justify-content: center;
    min-width: 0;
  }

  /* Right column — hero visual, takes up ~35% */
  .visual-col {
    flex: 0 0 320px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }

  /* Hero image/emoji — large, commanding */
  .hero-visual {
    width: 240px; height: 240px;
    filter: drop-shadow(0 12px 32px {{ACCENT_SHADOW}});
    opacity: 0.90;
    position: relative;
    z-index: 2;
  }
  .hero-visual img {
    width: 100%; height: 100%;
    object-fit: contain;
  }

  /* Product logo badge — overlaps bottom-right of hero */
  .product-badge {
    position: absolute;
    bottom: -8px; right: -8px;
    width: 90px; height: 90px;
    z-index: 3;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 50%;
    border: 2.5px solid rgba(255,255,255,0.9);
    box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    display: flex; align-items: center; justify-content: center;
    padding: 14px;
  }
  .product-badge img {
    width: 100%; height: 100%;
    object-fit: contain;
  }
  .product-badge.hidden { display: none; }

  /* Decorative glow ring behind the hero visual */
  .glow-ring {
    position: absolute;
    width: 280px; height: 280px;
    border-radius: 50%;
    border: 3px solid {{ACCENT_LIGHT}};
    opacity: 0.30;
    z-index: 1;
  }
  .glow-ring-2 {
    position: absolute;
    width: 340px; height: 340px;
    border-radius: 50%;
    border: 2px solid {{ACCENT_LIGHT}};
    opacity: 0.15;
    z-index: 1;
  }

  /* Category pill */
  .pill {
    display: inline-flex; align-self: flex-start;
    padding: 8px 22px;
    border-radius: 22px;
    font-size: 16px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: #fff;
    background: {{ACCENT}};
    margin-bottom: 16px;
    box-shadow: 0 4px 16px {{ACCENT_SHADOW}};
  }

  /* MASSIVE title — multi-line friendly */
  .title {
    font-size: 84px; font-weight: 900;
    letter-spacing: -3.5px; line-height: 0.95;
    color: {{TEXT_DARK}};
    margin: 0 0 18px;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  /* Scale down for longer titles — still big! */
  .title.title-md { font-size: 68px; letter-spacing: -3px; line-height: 0.98; }
  .title.title-sm { font-size: 56px; letter-spacing: -2px; line-height: 1.0; }

  /* Subtitle — much more visible */
  .subtitle {
    font-size: 28px; font-weight: 600;
    color: {{SUBTITLE_COLOR}};
    margin: 0; line-height: 1.3;
  }

  /* ─── FOOTER ─── */
  .footer {
    position: absolute;
    bottom: 44px; left: 56px;
    z-index: 15;
    display: flex; align-items: center; gap: 14px;
  }
  .logo-circle {
    width: 44px; height: 44px; border-radius: 50%; overflow: hidden;
    background: {{ACCENT}};
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 12px {{ACCENT_SHADOW}};
  }
  .logo-circle img { width: 80%; height: 80%; object-fit: contain; display: block; }
  .channel-name { font-size: 18px; font-weight: 700; color: {{CHANNEL_NAME_COLOR}}; }

  /* Series capsule — top left, BIG and bold */
  .series {
    position: absolute;
    top: 42px; left: 48px;
    z-index: 20;
    padding: 12px 28px;
    border-radius: 26px;
    background: {{TEXT_DARK}};
    color: #fff;
    font-size: 22px; font-weight: 800; letter-spacing: 0.5px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
  }
</style>
</head>
<body>
  <div class="frame">
    <!-- Gradient orbs — visible behind the frosted card -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-dots"></div>

    <!-- Frosted glassmorphism card -->
    <div class="glass-card">
      <div class="accent-strip"></div>
    </div>

    <!-- Series indicator (optional) -->
    {{SERIES_HTML}}

    <!-- Two-column content -->
    <div class="content">
      <!-- Left: text -->
      <div class="text-col">
        <div class="pill">{{CATEGORY}}</div>
        <h1 class="title {{TITLE_CLASS}}">{{TITLE}}</h1>
        <p class="subtitle">{{SUBTITLE}}</p>
      </div>

      <!-- Right: hero visual (emoji or custom image) + product badge -->
      <div class="visual-col">
        <div class="glow-ring"></div>
        <div class="glow-ring-2"></div>
        <div class="hero-visual">
          <img src="{{HERO_PATH}}" alt="">
          <div class="product-badge {{BADGE_HIDDEN}}"><img src="{{BADGE_PATH}}" alt=""></div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="logo-circle"><img src="{{LOGO_PATH}}" alt=""></div>
      <span class="channel-name">A Guide to Cloud & AI</span>
    </div>
  </div>
</body>
</html>
