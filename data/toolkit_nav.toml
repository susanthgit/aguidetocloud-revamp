# ═══════════════════════════════════════════════════════════════════════════
# TOOLKIT MASTER REGISTRY — Single Source of Truth
# ═══════════════════════════════════════════════════════════════════════════
#
# This file drives EVERYTHING:
#   - Homepage toolkit cards (carousel)
#   - Tool count in stats bar
#   - "Browse all X tools" link
#   - Prev/next circular navigation
#   - Colour lookups (homepage + free-tools)
#
# WHEN ADDING A NEW TOOL:
#   1. Add entry here with ALL fields
#   2. Check tool_colours.toml for hue distance (≥30° from all, ≥45° in category)
#   3. Add entry to tool_colours.toml (validation/reference)
#   4. Create CSS file, template, content
#   5. Run `hugo server` — everything else auto-updates
#
# FIELDS:
#   url       — URL path (with trailing slash)
#   emoji     — Display emoji
#   name      — Full display name
#   short     — Short name for mobile nav
#   desc      — One-liner description (homepage + free-tools cards)
#   color     — Accent hex color
#   category  — Filter category: learning, copilot, informed, compare, admin, community
#   visual    — SVG abstract art type: lines, bars, grid, gauge, timeline, wave, blocks, scatter, circles, keys
#   is_tool   — true = counted as a tool, false = excluded from count (feedback, analytics)
#
# ═══════════════════════════════════════════════════════════════════════════

