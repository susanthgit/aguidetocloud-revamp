explanation = "This is likely a legitimate internal notification. Key indicators: sent from your company's actual domain, addresses you by name, provides internal methods (Ctrl+Alt+Del), links to your company's own domain, and includes a specific internal extension number."

[[scenarios]]
id = "linkedin-fake"
difficulty = 2
verdict = "phishing"
sender_name = "LinkedIn"
sender_email = "security@linkedln-mail.com"
subject = "Someone viewed your profile — 23 new views this week"
preview = "Your profile is trending! See who's been looking..."
body = "LinkedIn\n\n23 people viewed your profile this week!\n\nSee your viewers and find out who's interested:\n\n[See All Views]\nhttps://linkedln-mail.com/feed/profile-views\n\nTop viewer industries: Technology, Finance, Healthcare\n\nLinkedIn Corporation, 1000 W Maude Ave, Sunnyvale, CA 94085"
red_flags = ["Fake domain: linkedln-mail.com (lowercase L looks like I — it's 'linkedln' not 'linkedin')", "Real LinkedIn uses linkedin.com or e.linkedin.com for emails", "Link destination is the fake domain", "Designed to exploit curiosity ('who viewed my profile')"]
explanation = "Credential harvesting using LinkedIn impersonation. The domain uses 'linkedln' (with an L that looks like an I) instead of 'linkedin'. This is a classic homograph attack. Real LinkedIn emails come from @linkedin.com."

