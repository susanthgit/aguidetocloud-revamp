[[scenarios]]
id = "sextortion"
difficulty = 1
verdict = "phishing"
sender_name = "Private Investigator"
sender_email = "anonymous-tip@protonmail.com"
subject = "I have access to your webcam recordings"
preview = "I installed malware on your device and recorded you..."
body = "Hello,\n\nI am a hacker who has access to your operating system. I also have full access to your account.\n\nI've been watching you for a few months now. I installed malware on a site you visited and recorded you through your webcam.\n\nI have a video of you doing embarrassing things. If you don't send $2,000 in Bitcoin to the address below within 48 hours, I'll send the video to all your contacts.\n\nBitcoin address: bc1q...\n\nDon't try to contact the police. The timer starts now."
