explanation = "Invoice phishing with malware attachment. The domain uses 'quickb00ks' (with zeros) to impersonate QuickBooks. The 'PDF' attachment is likely a malware dropper. Never open unexpected invoice attachments."

[[scenarios]]
id = "real-password-expiry"
