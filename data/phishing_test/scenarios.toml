# ============================================================================
# Phishing Simulator — 30 email scenarios
# ============================================================================
# verdict: phishing | legit | verify
# difficulty: 1 (obvious) | 2 (moderate) | 3 (expert)

[[scenarios]]
id = "ceo-wire"
difficulty = 1
verdict = "phishing"
sender_name = "John Smith (CEO)"
sender_email = "john.smith@c0ntoso.com"
subject = "URGENT: Wire Transfer Needed Today"
preview = "I need you to process an urgent wire transfer. This is confidential..."
body = "Hi,\n\nI'm in a meeting and can't talk right now. I need you to urgently process a wire transfer of $47,500 to a new vendor. I'll explain later.\n\nPlease keep this confidential — don't discuss with anyone else until it's done.\n\nThanks,\nJohn Smith\nCEO"
red_flags = ["Urgency pressure ('URGENT', 'today')", "Confidentiality pressure ('don't discuss with anyone')", "CEO impersonation from misspelled domain (c0ntoso vs contoso)", "Unusual request — CEO asking for wire transfers directly", "No details about the vendor or invoice"]
explanation = "This is a classic Business Email Compromise (BEC) attack. The attacker spoofs the CEO's name but uses a lookalike domain (c0ntoso with a zero). The urgency and confidentiality pressure are designed to bypass normal approval processes."

[[scenarios]]
id = "ms-password"
difficulty = 1
verdict = "phishing"
sender_name = "Microsoft 365 Team"
sender_email = "security@microsoft-365-alert.com"
subject = "Your password expires in 24 hours"
preview = "Your Microsoft 365 password will expire soon. Click here to update..."
body = "Dear User,\n\nYour Microsoft 365 password will expire in 24 hours. To avoid losing access to your email and files, please update your password immediately.\n\n[Update Password Now]\nhttps://microsoft-365-login.security-update.com/reset\n\nIf you did not request this, please ignore this email.\n\nMicrosoft 365 Security Team"
red_flags = ["Fake domain (microsoft-365-alert.com is not microsoft.com)", "Fake link destination (security-update.com is not microsoft.com)", "Generic greeting ('Dear User' instead of your name)", "Urgency tactic (24-hour deadline)", "Microsoft never asks you to click a link to reset passwords via email"]
explanation = "Credential harvesting attack. The email looks official but both the sender domain and link destination are fake. Microsoft password reset emails come from microsoft.com and direct you to account.microsoft.com."

[[scenarios]]
id = "real-ms-security"
difficulty = 2
verdict = "legit"
sender_name = "Microsoft account team"
sender_email = "account-security-noreply@accountprotection.microsoft.com"
subject = "Microsoft account security info was added"
preview = "Security info was recently added to your Microsoft account..."
body = "Microsoft account\nSecurity info was added\n\nAn alternate email address was added to your Microsoft account su****@outlook.com.\n\nIf this was you, you can safely ignore this email.\n\nIf this wasn't you, your account may be compromised. Please review your security info: https://account.live.com/SecurityInfo\n\nThanks,\nThe Microsoft account team"
red_flags = []
explanation = "This is a legitimate Microsoft notification. The sender domain accountprotection.microsoft.com is a real Microsoft domain. The link goes to account.live.com which is a real Microsoft property. The email partially masks your address (su****@outlook.com) for privacy."

[[scenarios]]
id = "sharepoint-share"
difficulty = 2
verdict = "verify"
sender_name = "Sarah Chen"
sender_email = "sarah.chen@contoso.com"
subject = "Sarah Chen shared 'Q4 Budget Review' with you"
preview = "Sarah Chen has shared a file with you. Click to open in SharePoint..."
body = "Sarah Chen shared a file with you\n\nQ4 Budget Review.xlsx\n\n[Open]\nhttps://contoso.sharepoint.com/sites/finance/Q4-Budget-Review.xlsx\n\nNote: This link will expire in 7 days."
red_flags = ["Could be legitimate OR a phishing email using a real colleague's name", "Verify: Do you know Sarah Chen? Were you expecting this file?", "The link LOOKS correct (contoso.sharepoint.com) but could be a display-text trick"]
explanation = "This could go either way. The email format matches real SharePoint sharing notifications. If you know Sarah Chen and were expecting a budget file, it's likely legitimate. If not, verify by contacting Sarah directly through Teams or phone — not by replying to the email."

[[scenarios]]
id = "it-mfa"
difficulty = 1
verdict = "phishing"
sender_name = "IT Department"
sender_email = "it-helpdesk@contoso-support.net"
subject = "MFA Update Required — Action Needed"
preview = "We are updating our MFA system. Please re-register your device..."
body = "Dear Employee,\n\nAs part of our security upgrade, all employees must re-register their MFA devices by Friday.\n\nPlease click the link below to complete re-registration:\nhttps://mfa-update.contoso-support.net/register\n\nFailure to complete this by Friday will result in account lockout.\n\nThank you,\nIT Help Desk\nContoso Support"
red_flags = ["External domain (contoso-support.net is NOT contoso.com)", "Threat of account lockout creates urgency", "Generic greeting ('Dear Employee')", "IT departments use internal portals (aka.ms/mysecurityinfo), not external links", "No specific person's name signed"]
explanation = "AiTM (Adversary-in-the-Middle) phishing. The attacker creates a fake MFA registration page to capture your credentials AND your MFA token in real-time. Your IT team would use https://aka.ms/mysecurityinfo for MFA changes."

