subject = "Quick favour needed — confidential"
preview = "I need you to purchase some gift cards for a client meeting..."
body = "Hi,\n\nAre you available? I need a quick favour.\n\nI'm in a meeting and can't make a call. Could you purchase 5x $100 Amazon gift cards for a client appreciation event? I'll reimburse you.\n\nPlease buy them and send me the card numbers and PINs by email.\n\nKeep this between us for now — it's a surprise.\n\nThanks,\nMark Thompson\nVP Operations"
red_flags = ["Lookalike domain (contoso-exec.com is NOT contoso.com)", "Gift card request — the #1 BEC attack type", "'Confidential' / 'keep this between us' prevents verification", "Executive impersonation", "Asks for card numbers via email (no legitimate process works this way)", "Urgency ('I'm in a meeting')"]
explanation = "Gift card scam — the most common Business Email Compromise type. The FBI reports billions in losses from this attack. No legitimate executive asks employees to buy gift cards and email the codes. Always verify through a separate channel (call, Teams)."

[[scenarios]]
id = "ms-onedrive-share"
difficulty = 3
verdict = "legit"
sender_name = "OneDrive"
sender_email = "no-reply@onedrive.com"
subject = "Storage almost full — 95% of your OneDrive is used"
preview = "You're running low on OneDrive storage. Manage your files..."
body = "OneDrive\n\nYour storage is almost full\n\nYou're using 95 GB of your 100 GB OneDrive storage.\n\nTo free up space:\n- Delete files you no longer need\n- Empty your recycle bin\n- Move large files to a shared library\n\n[Manage your storage]\nhttps://onedrive.live.com/manage/storage\n\nNeed more space? Contact your IT admin about upgrading your plan.\n\nMicrosoft OneDrive"
red_flags = []
explanation = "Legitimate OneDrive notification. Key indicators: sent from onedrive.com (real Microsoft domain), references specific storage numbers (95/100 GB), provides practical steps (not just a link), and links to the real OneDrive management page."

[[scenarios]]
id = "tax-refund"
difficulty = 1
verdict = "phishing"
sender_name = "Inland Revenue"
sender_email = "refunds@ird-nz-refund.com"
subject = "You are eligible for a tax refund of $1,847.50"
preview = "Our records indicate you have been overcharged. Claim your refund..."
body = "Inland Revenue\n\nTax Refund Notification\n\nDear Taxpayer,\n\nAfter reviewing your tax records for the 2025-2026 year, we have determined that you are eligible for a refund of $1,847.50 NZD.\n\nTo claim your refund, please verify your details:\n\n[Claim Refund]\nhttps://ird-nz-refund.com/claim\n\nPlease note: If you do not claim within 14 days, your refund will be forfeited.\n\nInland Revenue Department\nNew Zealand Government"
red_flags = ["Fake domain (ird-nz-refund.com is NOT ird.govt.nz)", "IRD uses myIR (myir.ird.govt.nz) for all refunds — never email links", "Generic greeting ('Dear Taxpayer')", "Urgency ('14 days', 'forfeited')", "Specific dollar amount designed to seem legitimate"]
explanation = "Government impersonation phishing — extremely common in NZ. The real IRD uses myir.ird.govt.nz and never emails links to claim refunds. Tax refunds are processed automatically through your myIR account."
