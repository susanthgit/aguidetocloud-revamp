[[scenarios]]
id = "payroll-update"
difficulty = 3
verdict = "phishing"
sender_name = "Finance Team"
sender_email = "payroll@contoso.com"
subject = "Update Required: Verify Your Bank Details for Next Pay Run"
preview = "Please verify your bank account details before the next pay cycle..."
body = "Hi,\n\nAs part of our annual payroll audit, we need all employees to verify their bank account details.\n\nPlease click below to confirm your details by Friday:\n\n[Verify Bank Details]\nhttps://contoso-payroll-verify.com/employee\n\nIf your details are unchanged, you still need to confirm.\n\nFinance Team\nContoso Ltd"
red_flags = ["The sender email looks right (contoso.com) but the LINK goes to contoso-payroll-verify.com", "Display email vs actual sender may differ", "Payroll changes should be done through official HR systems, not email links", "Banks never ask you to 'verify' details via email links", "'All employees' blanket request is suspicious"]
explanation = "Sophisticated BEC attack. The sender APPEARS to be from your company (spoofed or compromised), but the link goes to an external lookalike domain. Payroll verification always happens through your HR/payroll system directly, never via email links. This is how bank details get stolen."

