[last-one-standing]
story = "The great resignation hit. One by one, your team left. The network admin. The security analyst. The helpdesk lead. But you stayed. You held down the fort. You became the entire IT department. Singular."
confirm = "I have been the sole remaining IT person during a mass departure"

[change-management-pro]
story = "Major system rollout. 2,000+ users affected. New processes, new tools, new everything. Zero helpdesk tickets on go-live day. Zero. Your change management plan was so good that users didn't even realise things had changed."
confirm = "I have rolled out a major change with zero helpdesk tickets"

[script-wizard]
story = "The manual process took 4 hours. Click, wait, copy, paste, click, wait, repeat. You wrote a script. 47 lines of PowerShell. Now it takes 30 seconds. You've automated yourself into having time for coffee."
