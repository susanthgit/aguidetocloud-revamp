# ============================================================================
# AI Cost Calculator — Implementation & Training Benchmarks
# ============================================================================
# Sources: Forrester TEI, Microsoft Copilot Success Kit, Gartner AI TCO
# last_verified: 2026-04-16
# ============================================================================

[meta]
last_verified = "2026-04-16"
sources = [
  "Forrester TEI for M365 Copilot (2024)",
  "Microsoft Copilot Success Kit",
  "Gartner AI TCO Framework (2025)"
]

# ── Training Costs ──────────────────────────────────────────────────────────

[training]
# Per-user cost by approach (Year 1)
self_serve = 50
train_the_trainer = 150
vendor_led = 300
# Productivity loss during training (hours per user)
training_hours_per_user = 4
# Ongoing refresher (per user per year, Year 2+)
annual_refresher = 25
# Average hourly productivity cost for training time
avg_hourly_productivity_cost = 50

[training.descriptions]
self_serve = "Online resources, MS adoption content, self-paced learning"
train_the_trainer = "Internal champions trained, then cascade to teams"
vendor_led = "External trainers, custom curriculum, hands-on workshops"

# ── Implementation Costs ────────────────────────────────────────────────────

[implementation.small]
# <100 users — fixed estimates
label = "Small (under 100 users)"
data_governance_audit = 5000
security_configuration = 3000
pilot_planning = 2000
integration_customisation = 5000

[implementation.medium]
# 100-1000 users — scaled estimates
label = "Medium (100–1,000 users)"
data_governance_audit = 15000
security_configuration = 10000
pilot_planning = 8000
integration_customisation = 15000

[implementation.large]
# 1000+ users — enterprise estimates
label = "Large (1,000+ users)"
data_governance_audit = 40000
security_configuration = 25000
pilot_planning = 20000
integration_customisation = 50000

[implementation.descriptions]
data_governance_audit = "Permission remediation, sensitivity labels, access reviews"
security_configuration = "Conditional Access policies, Purview setup, DLP rules"
pilot_planning = "Champion selection, success metrics, pilot group setup"
integration_customisation = "Connectors, custom agents, API integrations, workflows"

# Implementation support multipliers
[implementation.support_multiplier]
internal_only = 0.5
light_consulting = 1.0
full_partner = 2.0

[implementation.support_descriptions]
internal_only = "DIY with internal IT team and free MS resources"
light_consulting = "Part-time external guidance, internal team executes"
full_partner = "Dedicated deployment partner manages end-to-end"

# ── Governance Costs ────────────────────────────────────────────────────────

[governance]
sharepoint_advanced_mgmt = 3.00
purview_addon_price = 5.00
purview_included_in = ["e5", "e7"]
# Admin time (hours per month per 100 users)
agent_governance_hours_per_100 = 4
compliance_review_annual = 5000

[governance.data_classification]
small = 5000
medium = 20000
large = 60000

# ── Ongoing Operations ──────────────────────────────────────────────────────

[operations]
admin_fte_fraction_per_100_users = 0.05
support_uplift_percent = 10
quarterly_update_hours = 8
monthly_monitoring_hours = 4
average_admin_hourly_rate = 75
average_support_hourly_rate = 50
# Average support desk tickets per 100 users per month during rollout
support_tickets_per_100_users = 15

# ── Scenario Benchmarks ────────────────────────────────────────────────────

[scenarios.copilot_only]
label = "Copilot Only"
time_to_value_months = 1
admin_complexity = 2
governance_load = 2
customisation = 2
vendor_lock_in = 5
description = "M365 Copilot for productivity, native governance via Admin Centre"
# Cost multiplier vs base (governance, operations complexity)
governance_multiplier = 1.0
operations_multiplier = 1.0

[scenarios.multi_ai]
label = "Multi-AI Strategy"
time_to_value_months = 3
admin_complexity = 3
governance_load = 4
customisation = 3
vendor_lock_in = 3
description = "M365 Copilot + Copilot Studio + external AI tools"
governance_multiplier = 1.5
operations_multiplier = 1.3

[scenarios.build_custom]
label = "Build Custom"
time_to_value_months = 9
admin_complexity = 5
governance_load = 5
customisation = 5
vendor_lock_in = 1
description = "Azure OpenAI / open-source, custom RAG, custom agents via SDKs"
governance_multiplier = 2.0
operations_multiplier = 2.0

# ── Rollout Timeline Presets ────────────────────────────────────────────────

[rollout.big_bang]
label = "Big Bang"
description = "Everyone on Month 1 — higher spike, faster value"
# month: percentage of rollout users active
phases = [100, 100, 100, 100, 100, 100, 100, 100, 100, 100, 100, 100]

[rollout.phased]
label = "Phased"
description = "Pilot → Wave 2 → Full over 6 months"
phases = [15, 15, 40, 40, 70, 100, 100, 100, 100, 100, 100, 100]

[rollout.conservative]
label = "Conservative"
description = "Small pilot → measure → expand over 12 months"
phases = [10, 10, 10, 20, 20, 30, 40, 50, 60, 70, 80, 100]

