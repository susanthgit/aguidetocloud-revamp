[[presets]]
id = "education"
name = "Education"
emoji = "🎓"
description = "Permissive for collaboration, with guardrails"
settings = { sp_external = "New and existing guests", od_external = "New and existing guests", teams_guest = "Enabled (open)", anyone_links = "Enabled", default_link = "People in your organisation", guest_expiry = "90 days", org_links = "Enabled" }
