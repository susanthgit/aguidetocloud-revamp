# ═══════════════════════════════════════════════════════════════
# M365 SECURITY TOOLKIT — Assessment Questions (50 questions)
# ═══════════════════════════════════════════════════════════════
# 8 categories, CIS M365 Benchmark aligned, with NIST/ISO/E8 mappings.
# Each question scores 0 (not done), 1 (partial), 2 (fully done).
# "Don't know" = 0 (treated as a gap).

# ── Score Tiers ───────────────────────────────────────────────
[[tiers]]
min = 0
max = 20
label = "Critical Risk"
emoji = "🔴"
color = "#EF4444"
desc = "Major security gaps detected. Immediate action needed on identity, email, and data protection basics."

[[tiers]]
min = 21
max = 40
label = "High Risk"
emoji = "🟠"
color = "#F97316"
desc = "Significant improvements needed. Foundational controls are missing or incomplete."

[[tiers]]
min = 41
max = 60
label = "Moderate"
emoji = "🟡"
color = "#EAB308"
desc = "Baseline protections are in place but gaps remain. Focus on the priority actions below."

[[tiers]]
min = 61
max = 80
label = "Good"
emoji = "🟢"
color = "#22C55E"
desc = "Solid security posture. Fine-tune the remaining gaps and maintain regular reviews."

[[tiers]]
min = 81
max = 100
label = "Excellent"
emoji = "🌟"
color = "#41A235"
desc = "Comprehensive hardening in place. Maintain, monitor, and stay current with new threats."


# ═══════════════════════════════════════════════════════════════
# CATEGORY 1: Identity & Authentication (7 questions, weight 1.5)
# ═══════════════════════════════════════════════════════════════
[[categories]]
id = "identity"
name = "Identity & Authentication"
icon = "🔐"
weight = 1.5

  [[categories.questions]]
  id = "mfa-all"
  text = "Is MFA enforced for ALL users (not just admins)?"
  options = [
    { label = "No", value = 0 },
    { label = "Admins only", value = 1 },
    { label = "All users", value = 2 }
  ]
  cis_ref = "1.1.1"
  nist_ref = "IA-2(1)"
  iso_ref = "A.8.5"
  e8_ref = "MFA"
  risk_score = 10
  remediation_title = "Enable MFA for all users"
  remediation_path = "Entra ID → Security → Authentication methods → MFA"
  remediation_effort = "quick"
  remediation_script = "# Create Conditional Access policy requiring MFA for all users\nConnect-MgGraph -Scopes 'Policy.ReadWrite.ConditionalAccess'\n$params = @{\n  DisplayName = 'Require MFA for All Users'\n  State = 'enabledForReportingButNotEnforced'\n  Conditions = @{\n    Users = @{ IncludeUsers = @('All') }\n    Applications = @{ IncludeApplications = @('All') }\n  }\n  GrantControls = @{\n    BuiltInControls = @('mfa')\n    Operator = 'OR'\n  }\n}\nNew-MgIdentityConditionalAccessPolicy @params"

  [[categories.questions]]
  id = "legacy-auth"
  text = "Have you disabled legacy authentication protocols?"
  options = [
    { label = "No", value = 0 },
    { label = "Partially blocked", value = 1 },
    { label = "Fully blocked via CA policy", value = 2 }
  ]
  cis_ref = "1.1.2"
  nist_ref = "IA-2(6)"
  iso_ref = "A.8.5"
  e8_ref = "MFA"
  risk_score = 9
  remediation_title = "Block legacy authentication"
  remediation_path = "Entra ID → Security → Conditional Access → New policy"
  remediation_effort = "quick"
  remediation_script = "# Block legacy authentication via Conditional Access\nConnect-MgGraph -Scopes 'Policy.ReadWrite.ConditionalAccess'\n$params = @{\n  DisplayName = 'Block Legacy Authentication'\n  State = 'enabled'\n  Conditions = @{\n    Users = @{ IncludeUsers = @('All') }\n    Applications = @{ IncludeApplications = @('All') }\n    ClientAppTypes = @('exchangeActiveSync','other')\n  }\n  GrantControls = @{\n    BuiltInControls = @('block')\n    Operator = 'OR'\n  }\n}\nNew-MgIdentityConditionalAccessPolicy @params"

  [[categories.questions]]
  id = "conditional-access"
  text = "Do you use Conditional Access policies?"
  options = [
    { label = "No", value = 0 },
    { label = "Basic (1-3 policies)", value = 1 },
    { label = "Comprehensive (5+ policies)", value = 2 }
  ]
  cis_ref = "1.1.3"
  nist_ref = "AC-2(12)"
  iso_ref = "A.8.2"
  e8_ref = ""
  risk_score = 8
  remediation_title = "Deploy Conditional Access policies"
  remediation_path = "Entra ID → Security → Conditional Access"
  remediation_effort = "halfday"
  remediation_script = "# List existing Conditional Access policies\nConnect-MgGraph -Scopes 'Policy.Read.All'\nGet-MgIdentityConditionalAccessPolicy | Select-Object DisplayName, State, CreatedDateTime | Format-Table -AutoSize"

  [[categories.questions]]
  id = "pim"
  text = "Is Privileged Identity Management (PIM) enabled for admin roles?"
  options = [
    { label = "No", value = 0 },
    { label = "Aware of it but not configured", value = 1 },
    { label = "Active for all admin roles", value = 2 }
  ]
  cis_ref = "1.1.4"
  nist_ref = "AC-6(1)"
  iso_ref = "A.8.2"
  e8_ref = "Restrict admin privileges"
  risk_score = 7
  remediation_title = "Enable PIM for just-in-time admin access"
  remediation_path = "Entra ID → Identity Governance → Privileged Identity Management"
  remediation_effort = "halfday"
  remediation_script = "# List current PIM-eligible role assignments\nConnect-MgGraph -Scopes 'RoleManagement.Read.Directory'\nGet-MgRoleManagementDirectoryRoleEligibilitySchedule | Select-Object PrincipalId, RoleDefinitionId, StartDateTime | Format-Table"

  [[categories.questions]]
  id = "break-glass"
  text = "Do you have break-glass emergency access accounts?"
  options = [
    { label = "No", value = 0 },
    { label = "Yes, but untested", value = 1 },
    { label = "Yes, tested quarterly", value = 2 }
  ]
  cis_ref = "1.1.5"
  nist_ref = "AC-2(2)"
  iso_ref = "A.5.18"
  e8_ref = "Restrict admin privileges"
  risk_score = 8
  remediation_title = "Create break-glass emergency access accounts"
  remediation_path = "Entra ID → Users → New user (cloud-only, no MFA, monitored)"
  remediation_effort = "quick"
  remediation_script = "# Create a break-glass account (manual steps recommended)\n# 1. Create a cloud-only account (not synced from AD)\n# 2. Assign Global Administrator permanently\n# 3. Exclude from ALL Conditional Access policies\n# 4. Use a strong 20+ character password stored in a safe\n# 5. Monitor sign-ins with an alert policy\n# See: https://learn.microsoft.com/entra/identity/role-based-access-control/security-emergency-access"

  [[categories.questions]]
  id = "separate-admin"
  text = "Are admin accounts separate from daily-use accounts?"
  options = [
    { label = "No, admins use their regular accounts", value = 0 },
    { label = "Some admins have separate accounts", value = 1 },
    { label = "All admins have dedicated admin accounts", value = 2 }
  ]
  cis_ref = "1.1.6"
  nist_ref = "AC-6(2)"
  iso_ref = "A.8.2"
  e8_ref = "Restrict admin privileges"
  risk_score = 7
  remediation_title = "Create dedicated admin accounts"
  remediation_path = "Entra ID → Users → New user (admin-only, no email, MFA required)"
  remediation_effort = "halfday"
  remediation_script = "# List users with admin role assignments\nConnect-MgGraph -Scopes 'RoleManagement.Read.Directory'\nGet-MgDirectoryRole | ForEach-Object {\n  $role = $_\n  Get-MgDirectoryRoleMember -DirectoryRoleId $_.Id | ForEach-Object {\n    [PSCustomObject]@{\n      Role = $role.DisplayName\n      User = $_.AdditionalProperties.userPrincipalName\n    }\n  }\n} | Format-Table -AutoSize"

  [[categories.questions]]
  id = "sspr-mfa"
  text = "Is self-service password reset enabled with MFA verification?"
  options = [
    { label = "No SSPR configured", value = 0 },
    { label = "SSPR enabled without MFA", value = 1 },
    { label = "SSPR enabled with MFA verification", value = 2 }
  ]
  cis_ref = "1.1.7"
  nist_ref = "IA-5(1)"
  iso_ref = "A.8.5"
  e8_ref = "MFA"
  risk_score = 5
  remediation_title = "Configure SSPR with MFA verification"
  remediation_path = "Entra ID → Password reset → Properties → All users"
  remediation_effort = "quick"
  remediation_script = "# Check SSPR configuration\nConnect-MgGraph -Scopes 'Policy.Read.All'\nGet-MgPolicyAuthorizationPolicy | Select-Object -ExpandProperty DefaultUserRolePermissions"


# ═══════════════════════════════════════════════════════════════
# CATEGORY 2: Email Protection (6 questions, weight 1.2)
# ═══════════════════════════════════════════════════════════════
[[categories]]
id = "email"
name = "Email Protection"
icon = "📧"
weight = 1.2

  [[categories.questions]]
  id = "spf-record"
  text = "Does your domain have a valid SPF record?"
  options = [
    { label = "Don't know", value = 0 },
    { label = "Yes, basic (~all)", value = 1 },
    { label = "Yes, strict (-all)", value = 2 }
  ]
  cis_ref = "4.1.1"
  nist_ref = "SI-8"
  iso_ref = "A.8.23"
  e8_ref = ""
  risk_score = 8
  remediation_title = "Configure SPF record for your domain"
  remediation_path = "DNS provider → Add TXT record for your domain"
  remediation_effort = "quick"
  remediation_script = "# Verify current SPF record\nResolve-DnsName -Name 'yourdomain.com' -Type TXT | Where-Object { $_.Strings -like '*spf*' } | Select-Object -ExpandProperty Strings"

  [[categories.questions]]
  id = "dkim-enabled"
  text = "Is DKIM signing enabled for your domain?"
  options = [
    { label = "Don't know", value = 0 },
    { label = "No", value = 0 },
    { label = "Yes", value = 2 }
  ]
  cis_ref = "4.1.2"
  nist_ref = "SI-8"
  iso_ref = "A.8.23"
  e8_ref = ""
  risk_score = 7
  remediation_title = "Enable DKIM signing"
  remediation_path = "Microsoft Defender → Email authentication → DKIM"
  remediation_effort = "quick"
  remediation_script = "# Check DKIM configuration\nConnect-ExchangeOnline\nGet-DkimSigningConfig | Select-Object Domain, Enabled, Status | Format-Table -AutoSize\n\n# Enable DKIM for a domain\n# Set-DkimSigningConfig -Identity 'yourdomain.com' -Enabled $true"

  [[categories.questions]]
  id = "dmarc-policy"
  text = "Do you have a DMARC policy?"
  options = [
    { label = "Don't know", value = 0 },
    { label = "Monitor only (p=none)", value = 1 },
    { label = "Quarantine or reject", value = 2 }
  ]
  cis_ref = "4.1.3"
  nist_ref = "SI-8"
  iso_ref = "A.8.23"
  e8_ref = ""
  risk_score = 8
  remediation_title = "Deploy DMARC policy"
  remediation_path = "DNS provider → Add TXT record: _dmarc.yourdomain.com"
  remediation_effort = "quick"
  remediation_script = "# Check current DMARC record\nResolve-DnsName -Name '_dmarc.yourdomain.com' -Type TXT | Select-Object -ExpandProperty Strings\n\n# Recommended DMARC record (start with p=none):\n# v=DMARC1; p=none; rua=mailto:dmarc@yourdomain.com; pct=100"

  [[categories.questions]]
  id = "safe-links-attachments"
  text = "Are Safe Links and Safe Attachments enabled?"
  options = [
    { label = "No", value = 0 },
    { label = "Partial coverage", value = 1 },
    { label = "Full coverage for all users", value = 2 }
  ]
  cis_ref = "4.2.1"
  nist_ref = "SI-3"
  iso_ref = "A.8.7"
  e8_ref = ""
  risk_score = 7
  remediation_title = "Enable Safe Links and Safe Attachments"
  remediation_path = "Microsoft Defender → Policies → Threat policies → Safe Links / Safe Attachments"
  remediation_effort = "quick"
  remediation_script = "# Check Safe Links policies\nConnect-ExchangeOnline\nGet-SafeLinksPolicy | Select-Object Name, IsEnabled, EnableSafeLinksForEmail | Format-Table\n\n# Check Safe Attachments policies\nGet-SafeAttachmentPolicy | Select-Object Name, Enable, Action | Format-Table"

  [[categories.questions]]
  id = "anti-phishing"
  text = "Is anti-phishing protection configured in Defender?"
  options = [
    { label = "Default settings only", value = 0 },
    { label = "Custom basic policies", value = 1 },
    { label = "Advanced anti-phishing with impersonation protection", value = 2 }
  ]
  cis_ref = "4.2.2"
  nist_ref = "SI-8(2)"
  iso_ref = "A.8.7"
  e8_ref = ""
  risk_score = 7
  remediation_title = "Configure advanced anti-phishing protection"
  remediation_path = "Microsoft Defender → Policies → Anti-phishing"
  remediation_effort = "halfday"
  remediation_script = "# Check anti-phishing policies\nConnect-ExchangeOnline\nGet-AntiPhishPolicy | Select-Object Name, Enabled, EnableMailboxIntelligenceProtection, EnableOrganizationDomainsProtection | Format-Table"

  [[categories.questions]]
  id = "outbound-monitoring"
  text = "Do you monitor outbound email for anomalies?"
  options = [
    { label = "No", value = 0 },
    { label = "Basic alerts configured", value = 1 },
    { label = "Active monitoring with alerts and response", value = 2 }
  ]
  cis_ref = "4.3.1"
  nist_ref = "SI-4(4)"
  iso_ref = "A.8.16"
  e8_ref = ""
  risk_score = 6
  remediation_title = "Set up outbound email monitoring"
  remediation_path = "Microsoft Defender → Policies → Alert policies"
  remediation_effort = "quick"
  remediation_script = "# Check outbound spam policies\nConnect-ExchangeOnline\nGet-HostedOutboundSpamFilterPolicy | Select-Object Name, NotifyOutboundSpam, NotifyOutboundSpamRecipients | Format-Table"


