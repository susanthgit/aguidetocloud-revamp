[[templates]]
id = "change-freeze"
title = "IT Change Freeze Notice"
category = "maintenance"
subject = "❄️ IT Change Freeze: {{START_DATE}} to {{END_DATE}}"
when_to_use = "Announce a change freeze period (e.g., end of financial year, major events)"
body = """Dear IT team and stakeholders,

We are implementing an IT change freeze from {{START_DATE}} to {{END_DATE}}.

**Reason:** {{REASON}}

**What this means:**
- No production deployments or infrastructure changes
- No new software installations or upgrades
- No firewall or network configuration changes
- Emergency fixes only (with {{APPROVER}} approval)

**Exceptions process:** Contact {{APPROVER}} with justification for emergency changes.

**What should be completed BEFORE the freeze:**
- {{PRE_TASK_1}}
- {{PRE_TASK_2}}

Normal change procedures resume on {{RESUME_DATE}}.

{{SENDER_NAME}}
IT Operations"""
placeholders = ["START_DATE", "END_DATE", "REASON", "APPROVER", "PRE_TASK_1", "PRE_TASK_2", "RESUME_DATE", "SENDER_NAME"]

