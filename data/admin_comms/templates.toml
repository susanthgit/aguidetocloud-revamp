[[templates]]
id = "password-reset-guide"
title = "Password Reset Instructions"
category = "helpdesk"
subject = "How to Reset Your Password"
when_to_use = "Send to users who need password reset guidance"
body = """Hi {{RECIPIENT}},

Here's how to reset your {{ORG_NAME}} password:

**Option 1: Self-Service (recommended)**
1. Go to https://aka.ms/sspr
2. Enter your email address
3. Complete the verification (phone or authenticator)
4. Choose a new password

**Option 2: Contact IT**
Email: {{HELPDESK_EMAIL}}
Phone: {{HELPDESK_PHONE}}

**Password requirements:**
- At least {{MIN_LENGTH}} characters
- Mix of uppercase, lowercase, numbers, and symbols
- Cannot reuse your last {{HISTORY_COUNT}} passwords

{{SENDER_NAME}}
IT Help Desk"""
placeholders = ["RECIPIENT", "ORG_NAME", "HELPDESK_EMAIL", "HELPDESK_PHONE", "MIN_LENGTH", "HISTORY_COUNT", "SENDER_NAME"]

[[templates]]
id = "phishing-warning"
title = "Phishing Alert Warning"
category = "security"
subject = "🔴 Security Alert: Phishing Emails Targeting {{ORG_NAME}}"
when_to_use = "Send when a phishing campaign targets your organisation"
body = """URGENT: Phishing Alert

We've detected phishing emails targeting {{ORG_NAME}} employees.

**What to look for:**
- Subject line: "{{PHISHING_SUBJECT}}"
- Sender appears to be: {{FAKE_SENDER}}
- Contains a link to: {{FAKE_URL}}

**If you received this email:**
1. DO NOT click any links
2. DO NOT download attachments
3. Report it: click the "Report Phishing" button in Outlook
4. Delete the email

**If you already clicked the link:**
1. Change your password immediately at https://aka.ms/sspr
2. Contact IT at {{HELPDESK_EMAIL}}
3. Check your Sent Items for unauthorised emails

Stay vigilant. When in doubt, verify directly with the sender.

{{SENDER_NAME}}
IT Security Team"""
placeholders = ["ORG_NAME", "PHISHING_SUBJECT", "FAKE_SENDER", "FAKE_URL", "HELPDESK_EMAIL", "SENDER_NAME"]

[[templates]]
id = "copilot-rollout"
title = "Copilot Rollout Announcement"
category = "changes"
subject = "🤖 Microsoft 365 Copilot is Coming to {{ORG_NAME}}"
when_to_use = "Send when rolling out M365 Copilot to users"
body = """Hi team,

Great news! Microsoft 365 Copilot is being rolled out to {{AUDIENCE}} starting {{DATE}}.

**What is Copilot?** An AI assistant built into Word, Excel, PowerPoint, Outlook, and Teams that helps you draft, summarise, analyse, and create.

**What you'll be able to do:**
- Draft emails and documents in seconds
- Summarise long email threads and meetings
- Analyse data in Excel with natural language
- Create presentations from a simple prompt

**Important to know:**
- Copilot respects your existing file permissions
- Your prompts are not used to train the AI model
- All data stays within {{ORG_NAME}}'s Microsoft 365 boundary

**Getting started:** {{GETTING_STARTED_URL}}

**Training session:** {{TRAINING_DATE}} at {{TRAINING_TIME}} — {{TRAINING_LINK}}

Questions? Contact {{HELPDESK_EMAIL}}.

{{SENDER_NAME}}
{{SENDER_TITLE}}"""
placeholders = ["ORG_NAME", "AUDIENCE", "DATE", "GETTING_STARTED_URL", "TRAINING_DATE", "TRAINING_TIME", "TRAINING_LINK", "HELPDESK_EMAIL", "SENDER_NAME", "SENDER_TITLE"]

[[templates]]
id = "welcome-new-starter"
title = "Welcome Email — New Starter"
category = "onboarding"
subject = "Welcome to {{ORG_NAME}} — Your IT Setup Guide"
when_to_use = "Send to new employees on their first day"
body = """Welcome to {{ORG_NAME}}, {{RECIPIENT}}! 🎉

Here's everything you need to get started with your IT setup.

**Your credentials:**
- Username: {{USERNAME}}
- Temporary password: Set via the link sent to your personal email
- Email: {{WORK_EMAIL}}

**First steps:**
1. Sign in at https://portal.office.com
2. Set up MFA (Multi-Factor Authentication) — {{MFA_GUIDE_URL}}
3. Install Microsoft Teams — {{TEAMS_URL}}
4. Set up OneDrive sync — {{ONEDRIVE_GUIDE_URL}}

**Key resources:**
- IT Help Desk: {{HELPDESK_EMAIL}} / {{HELPDESK_PHONE}}
- Self-service password reset: https://aka.ms/sspr
- Company intranet: {{INTRANET_URL}}

If you need any help, don't hesitate to reach out!

{{SENDER_NAME}}
IT Team"""
placeholders = ["ORG_NAME", "RECIPIENT", "USERNAME", "WORK_EMAIL", "MFA_GUIDE_URL", "TEAMS_URL", "ONEDRIVE_GUIDE_URL", "HELPDESK_EMAIL", "HELPDESK_PHONE", "INTRANET_URL", "SENDER_NAME"]

[[templates]]
id = "offboarding-checklist"
title = "Offboarding IT Checklist"
category = "onboarding"
subject = "IT Offboarding: {{EMPLOYEE_NAME}} — {{LAST_DAY}}"
when_to_use = "Send to IT team when an employee is leaving"
body = """IT Offboarding Checklist

**Employee:** {{EMPLOYEE_NAME}}
**Last working day:** {{LAST_DAY}}
**Manager:** {{MANAGER_NAME}}

**Before last day:**
☐ Backup user's OneDrive to {{BACKUP_LOCATION}}
☐ Transfer shared mailbox ownership
☐ Reassign Teams channels/groups ownership
☐ Transfer ownership of Power Automate flows
☐ Export/archive any critical data

**On last day:**
☐ Disable the user account in Entra ID
☐ Revoke all active sessions
☐ Reset password
☐ Remove from all security/distribution groups
☐ Set out-of-office with forwarding to {{FORWARD_TO}}
☐ Block mobile device access (Intune wipe if BYOD)
☐ Reclaim hardware (laptop, phone, accessories)
☐ Remove from Conditional Access exclusions

**After 30 days:**
☐ Convert to shared mailbox (if needed)
☐ Delete user account
☐ Reclaim licence

Completed by: _______________
Date: _______________"""
placeholders = ["EMPLOYEE_NAME", "LAST_DAY", "MANAGER_NAME", "BACKUP_LOCATION", "FORWARD_TO"]

