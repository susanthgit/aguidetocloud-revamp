[[templates]]
id = "planned-maintenance"
title = "Planned Maintenance Notice"
category = "maintenance"
subject = "Planned Maintenance: {{SERVICE}} — {{DATE}}"
when_to_use = "Send 5-7 days before planned maintenance or upgrades"
body = """Dear team,

We will be performing planned maintenance on {{SERVICE}} on {{DATE}} from {{START_TIME}} to {{END_TIME}} ({{TIMEZONE}}).

**What's happening:** {{DESCRIPTION}}

**Expected impact:** {{IMPACT}}

**What you need to do:** {{ACTION}}

If you experience any issues after the maintenance window, please contact the IT Help Desk at {{HELPDESK_EMAIL}}.

Thank you for your patience.

{{SENDER_NAME}}
{{SENDER_TITLE}}"""
placeholders = ["SERVICE", "DATE", "START_TIME", "END_TIME", "TIMEZONE", "DESCRIPTION", "IMPACT", "ACTION", "HELPDESK_EMAIL", "SENDER_NAME", "SENDER_TITLE"]

[[templates]]
id = "mfa-enforcement"
title = "MFA Enforcement Notice"
category = "security"
subject = "Action Required: Multi-Factor Authentication Now Required"
when_to_use = "Send 2 weeks before enforcing MFA"
body = """Dear {{RECIPIENT}},

Starting {{DATE}}, Multi-Factor Authentication (MFA) will be required for all {{ORG_NAME}} accounts.

**Why are we doing this?** MFA blocks 99.9% of account attacks. It's one of the most effective security measures available.

**What you need to do before {{DATE}}:**
1. Install the Microsoft Authenticator app on your phone
2. Sign in to https://aka.ms/mysecurityinfo
3. Add your phone as a second factor

**Need help?** Visit our setup guide at {{GUIDE_URL}} or contact IT at {{HELPDESK_EMAIL}}.

If you've already set up MFA — thank you! No action needed.

{{SENDER_NAME}}
{{SENDER_TITLE}}"""
placeholders = ["RECIPIENT", "DATE", "ORG_NAME", "GUIDE_URL", "HELPDESK_EMAIL", "SENDER_NAME", "SENDER_TITLE"]

[[templates]]
id = "service-incident"
title = "Service Incident Alert"
category = "incidents"
subject = "⚠️ Service Issue: {{SERVICE}} — Currently Impacted"
when_to_use = "Send immediately when a service outage is detected"
body = """Dear team,

We are currently experiencing issues with {{SERVICE}}.

**Status:** {{STATUS}}
**Started:** {{START_TIME}}
**Impact:** {{IMPACT}}
**Affected users:** {{AFFECTED}}

**What we're doing:** {{ACTIONS}}

We will provide updates every {{UPDATE_INTERVAL}}. For urgent issues, contact {{HELPDESK_EMAIL}}.

{{SENDER_NAME}}
IT Operations"""
placeholders = ["SERVICE", "STATUS", "START_TIME", "IMPACT", "AFFECTED", "ACTIONS", "UPDATE_INTERVAL", "HELPDESK_EMAIL", "SENDER_NAME"]

[[templates]]
