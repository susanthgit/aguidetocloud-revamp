# ═══════════════════════════════════════════════════════════════
# COMPLIANCE FRAMEWORK MAPPING
# ═══════════════════════════════════════════════════════════════
# Maps Purview features to compliance framework controls

[[frameworks]]
id = "iso27001"
name = "ISO 27001"
short = "ISO"
colour = "#60A5FA"

  [[frameworks.controls]]
  id = "A.8.2"
  name = "Information classification"
  description = "Information shall be classified according to legal requirements, value, criticality, and sensitivity"
  requires = ["labels"]

  [[frameworks.controls]]
  id = "A.8.3"
  name = "Information labelling"
  description = "An appropriate set of procedures for labelling shall be developed"
  requires = ["labels", "marking"]

  [[frameworks.controls]]
  id = "A.10.1"
  name = "Cryptographic controls"
  description = "A policy on the use of cryptographic controls shall be developed"
  requires = ["encryption"]

  [[frameworks.controls]]
  id = "A.13.2"
  name = "Information transfer"
  description = "Policies to protect information transfer shall be in place"
  requires = ["dlp-email", "dlp-sharing"]

[[frameworks]]
id = "nist"
name = "NIST 800-53"
short = "NIST"
colour = "#F87171"

  [[frameworks.controls]]
  id = "AC-16"
  name = "Security and privacy attributes"
  description = "Support for associating security/privacy attributes with information"
  requires = ["labels"]

  [[frameworks.controls]]
  id = "MP-4"
  name = "Media storage"
  description = "Physically control and securely store media"
  requires = ["dlp-endpoint"]

  [[frameworks.controls]]
  id = "SC-8"
  name = "Transmission confidentiality"
  description = "Protect the confidentiality of transmitted information"
  requires = ["encryption", "dlp-email"]

  [[frameworks.controls]]
  id = "SI-4"
  name = "System monitoring"
  description = "Monitor the system to detect attacks and unauthorised connections"
  requires = ["dlp-email", "dlp-sharing", "dlp-teams"]

[[frameworks]]
id = "essential8"
name = "Essential Eight"
short = "E8"
colour = "#FBBF24"

  [[frameworks.controls]]
  id = "E8-AppControl"
  name = "Application control"
  description = "Prevent execution of unapproved programs"
  requires = ["dlp-endpoint"]

  [[frameworks.controls]]
  id = "E8-Restrict"
  name = "Restrict admin privileges"
  description = "Restrict administrative privileges to operating systems and applications"
  requires = ["encryption"]

  [[frameworks.controls]]
  id = "E8-MFA"
  name = "Multi-factor authentication"
  description = "MFA for access to sensitive information"
  requires = ["encryption"]

[[frameworks]]
id = "gdpr"
name = "GDPR"
short = "GDPR"
colour = "#C084FC"

  [[frameworks.controls]]
  id = "Art.5"
  name = "Data processing principles"
  description = "Personal data shall be processed lawfully, fairly, and transparently"
  requires = ["labels", "dlp-email"]

  [[frameworks.controls]]
  id = "Art.25"
  name = "Data protection by design"
  description = "Implement appropriate technical measures to protect data"
  requires = ["encryption", "labels", "auto-label"]

  [[frameworks.controls]]
  id = "Art.32"
  name = "Security of processing"
  description = "Implement encryption, pseudonymisation, and ensure confidentiality"
  requires = ["encryption", "dlp-email", "dlp-sharing"]

  [[frameworks.controls]]
  id = "Art.33"
  name = "Breach notification"
  description = "Notify supervisory authority within 72 hours of breach awareness"
  requires = ["dlp-email", "dlp-sharing", "dlp-teams"]
