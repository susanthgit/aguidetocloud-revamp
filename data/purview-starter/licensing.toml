[[tiers]]
id = "e3"
name = "Microsoft 365 E3"
short = "E3"
colour = "#4ADE80"
description = "Basic sensitivity labels, manual DLP for Exchange/SharePoint/OneDrive"
pricing_note = "Included in M365 E3 licence"

[[tiers]]
id = "e5"
name = "Microsoft 365 E5"
short = "E5"
colour = "#60A5FA"
description = "Auto-labeling, endpoint DLP, Teams DLP, advanced classifiers"
pricing_note = "Included in M365 E5 licence"

[[tiers]]
id = "e5-compliance"
name = "Microsoft 365 E5 Compliance"
short = "E5 Compliance"
colour = "#C084FC"
description = "Full Purview suite — all DLP, all auto-labeling, insider risk, eDiscovery"
pricing_note = "E5 Compliance add-on or full E5"

[[tiers]]
id = "e5-security"
name = "Microsoft 365 E5 Security"
short = "E5 Security"
colour = "#F472B6"
description = "Includes information protection + Defender features"
pricing_note = "E5 Security add-on"

