[[cmdlets]]
id = "get-mailbox"
name = "Get-Mailbox"
module = "exchange"
description = "Retrieve mailbox information for one or all users"
learn_url = "https://learn.microsoft.com/powershell/module/exchange/get-mailbox"
last_reviewed = "2026-04-12"
status = "current"
tags = ["mailbox", "exchange", "reporting"]

  [[cmdlets.parameters]]
  name = "Identity"
  type = "string"
  required = false
  description = "Email address, alias, or display name"
  placeholder = "user@contoso.com"

  [[cmdlets.parameters]]
  name = "ResultSize"
  type = "string"
  required = false
  description = "Max results. Use 'Unlimited' for all"
  placeholder = "Unlimited"

  [[cmdlets.parameters]]
  name = "RecipientTypeDetails"
  type = "select"
  required = false
  description = "Filter by mailbox type"
  options = ["UserMailbox", "SharedMailbox", "RoomMailbox", "EquipmentMailbox"]

  [[cmdlets.parameters]]
  name = "Filter"
  type = "string"
  required = false
  description = "Server-side filter expression"
  placeholder = "{DisplayName -like 'Sales*'}"

