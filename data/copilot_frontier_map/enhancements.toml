# ── Ask Your Admin email template ─────────────────────────────────────────

[admin_email]
subject_template = "Request: Enable Copilot Frontier Programme for {feature_name}"
body_template = """Hi {admin_name},

I'd like to request access to {feature_name}, a new Microsoft 365 Copilot capability currently available through the Frontier early-access programme.

What it does:
{cio_description}

Prerequisites:
{prerequisites_list}

Business value for our team:
{value_prop}

You can learn more at: {source_url}

The Frontier programme can be enabled in the Microsoft 365 Admin Centre under Settings → Org settings → Copilot.

Would you be able to look into enabling this for our team?

Thanks,
{user_name}"""
