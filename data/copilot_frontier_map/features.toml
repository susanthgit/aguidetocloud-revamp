[[features]]
id = "copilot-cowork"
name = "Copilot Cowork"
app = "Microsoft 365"
app_icon = "brain"
status = "frontier"
frontier_date = "2026-03-31"
expected_ga = "TBA"
actual_ga = ""
last_status_change = "2026-03-31"
ai_models = ["Anthropic Claude", "Microsoft (GPT)"]
description = "An autonomous execution agent that plans, coordinates, and performs multi-step, long-running work across your entire Microsoft 365 environment. Unlike standard Copilot which responds to one prompt at a time, Cowork takes a goal and breaks it into steps — drafting documents, sending emails, scheduling meetings, and tracking progress over time."
value_prop = "Delegate complex workflows end-to-end instead of doing them step by step. Describe the outcome you want, and Cowork plans and executes across apps."
use_cases = ["Project coordination and status reports", "Onboarding new team members", "Budget preparation and tracking", "Research and report generation", "Event planning and coordination"]
who_benefits = ["Project managers", "Team leads", "Executives", "Anyone managing multi-step workflows"]
