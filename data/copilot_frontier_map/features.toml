custom_skills = "Up to 20 custom skills per tenant via SKILL.md files in OneDrive"
licensing_prereqs = "Microsoft 365 Copilot licence + Frontier programme enrolment"
admin_action_required = "Enable Frontier programme in M365 Admin Centre. Approve Anthropic as a sub-processor (required — Claude powers the execution engine)."
availability_scope = "Global. EU/EFTA/UK tenants must explicitly opt in to Anthropic sub-processor (disabled by default in these regions)."
evidence_level = "official"
source_urls = [
  "https://www.microsoft.com/en-us/microsoft-365/blog/2026/03/30/copilot-cowork-now-available-in-frontier/",
  "https://www.microsoft.com/en-us/microsoft-365-copilot/frontier-features"
]
status_source_url = "https://www.microsoft.com/en-us/microsoft-365-copilot/frontier-features"
last_verified = "2026-05-02"
notes = "Requires explicit user approval for actions like sending emails or modifying files. All actions logged in Purview Audit."

