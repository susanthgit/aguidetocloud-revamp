# ─── Copilot Feature Changes Timeline ───
# Track what changed and when, with source links

[[entries]]
date = "2026-04-15"
type = "removal"
scope = "Copilot Chat"
apps = ["word", "excel", "powerpoint", "outlook"]
title = "Copilot Chat removed from Office apps for large orgs"
summary = "Organisations with more than 2,000 users lose in-app Copilot Chat access in Word, Excel, PowerPoint, and Outlook. Web-based Copilot Chat at m365copilot.com remains available."
source = "https://learn.microsoft.com/en-us/microsoft-365/copilot/microsoft-365-copilot-licensing"
impact = "high"

[[entries]]
date = "2026-05-01"
type = "launch"
scope = "M365 Copilot"
apps = ["copilot_chat"]
title = "Agent 365 & M365 E7 (Frontier Suite) GA"
summary = "Microsoft 365 E7 bundles M365 E5 + Copilot + Agent 365. Centralised agent management across Teams, Outlook, SharePoint. New Agent 365 dashboard for IT admins."
source = "https://www.microsoft.com/microsoft-365"
impact = "high"

[[entries]]
