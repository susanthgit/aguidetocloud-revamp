[[roles]]
id = "it-support"
name = "IT Support Agent"
icon = "🖥️"
description = "Handle employee IT issues: password resets, software troubleshooting, VPN problems, ticket creation."
complexity = "Medium"
recommended_platform = "copilot-studio"
recommended_channels = ["Teams"]
recommended_knowledge = ["SharePoint (IT KB)", "ServiceNow KB"]
recommended_actions = ["Create ServiceNow ticket", "Check outage status", "Reset password via flow"]
recommended_model = "gpt-41-mini"
model_reason = "FAQ-style responses don't need deep reasoning — fast and cost-effective"
architecture = "single"
architecture_reason = "One agent can handle all IT support intents with topics for common issues"
estimated_topics = 15
estimated_tools = 5
credit_multiplier = 1.5

