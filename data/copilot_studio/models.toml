# ── Category Descriptions ────────────────────────────────────

[[categories]]
id = "Mini"
label = "Mini"
description = "Fast and cost-effective. Good for most everyday tasks."
strengths = "Summarisation, information tasks, image/document processing"
speed = "Fastest"
cost = "Lowest"
reasoning = "Shallow"

[[categories]]
id = "General"
label = "General"
description = "Balanced performance for complex tasks."
strengths = "Content creation, advanced Q&A, document processing"
speed = "Moderate"
cost = "Standard"
reasoning = "Moderate"

[[categories]]
id = "Deep"
label = "Deep"
description = "Optimised for deliberate, multi-step reasoning."
strengths = "Complex analytics, policy analysis, troubleshooting, long document synthesis"
speed = "Slowest"
cost = "Highest"
reasoning = "Multi-step, tool-rich"

[[categories]]
id = "Auto"
label = "Auto"
description = "Dynamically routes queries to the best model per turn."
strengths = "Mixed workloads, helpdesk agents, unpredictable complexity"
speed = "Variable"
cost = "Variable"
reasoning = "Adaptive per turn"

# ── Key Notes ────────────────────────────────────────────────

[notes]
cross_geo_warning = "Models marked 'cross-geo' may process data outside your region. Review data residency requirements before selecting."
anthropic_warning = "Anthropic Claude models are hosted outside Microsoft and subject to Anthropic's terms and data handling policies."
gcc_note = "GCC environments use GPT-4o mini and GPT-4o instead of GPT-4.1 variants."
default_fallback = "If a selected model is unavailable or turned off, the agent falls back to the default model (GPT-4.1 mini)."
retirement_note = "When a model is retired, you can continue using it for up to one month. Then it automatically falls back to the new default."
computer_use_note = "Claude Sonnet 4.5 supports Computer Use agents for controlling desktop applications via AI."
