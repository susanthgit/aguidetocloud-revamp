[[agent_types]]
id = "child"
name = "Child Agent (Inline)"
icon = "🔗"
description = "Lightweight agents within your existing agent. Share context with the parent agent and use their own tools and knowledge."
orchestration = "Parent's orchestration"
context_sharing = "Shared with parent"
deployment = "Part of parent agent — not independently deployable"
tool_limits = "Separate from parent (own limits)"
latency_impact = "Slight increase due to added orchestration layer"
when_to_use = [
  "Building a single agent to handle one intent or task",
  "A single developer or small team manages the entire solution",
  "You want to logically group tools, instructions, and knowledge into subagents",
  "You don't need separate configuration, authentication, or deployment",
  "You don't intend to publish the subagent independently",
  "You don't need to reuse the agent across multiple parent agents"
]
benefits = [
  "Separate tool limits from parent — scale beyond 30-40 tools",
  "Logical grouping of related functionality",
  "Simple context passing — shared conversation history",
  "No separate deployment or governance needed"
]
considerations = [
  "Added latency from extra orchestration layer",
  "Cannot be published or used independently",
  "Cannot be reused across multiple agents"
]
learn_url = "https://learn.microsoft.com/microsoft-copilot-studio/add-agent-child-agent"

[[agent_types]]
