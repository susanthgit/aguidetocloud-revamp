# ── Architecture Best Practices ──────────────────────────────

[best_practices]
tool_threshold = 30
tool_threshold_note = "Performance degrades when a main agent has more than 30-40 tools, topics, and other agents. Split functionality across multiple agents at that point."
start_simple = "Start with one agent. Only split into multiple agents when you clearly see a need for modularity or a boundary."

[[anti_patterns]]
id = "over-delegation"
name = "Over-delegation"
description = "Creating a separate agent for every small task — leads to architecture sprawl, hard to maintain/debug/secure."
fix = "Only create separate agents for genuinely distinct domains or when tool limits are hit."

[[anti_patterns]]
id = "under-delegation"
name = "Under-delegation (monolith)"
description = "One giant agent that handles HR, IT, sales, compliance, operations — impossible to maintain."
fix = "Split by domain when intents start overlapping or tool count exceeds 30-40."

[[anti_patterns]]
id = "undefined-boundaries"
name = "Undefined delegation boundaries"
description = "Parent doesn't know when to hand off, child agents don't know expected inputs, responsibilities overlap."
fix = "Describe each connected agent's purpose clearly. Treat it like a tool with a clear name and description."

[[anti_patterns]]
id = "security-bypass"
name = "Security bypass via connected agents"
description = "Connected agent has permissions the parent doesn't — calling it circumvents restrictions."
fix = "Treat connected agent calls like powerful actions. Apply same checks, consent, and approval gates."
