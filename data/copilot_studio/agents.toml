  "Must manage data handoff explicitly",
  "Security: connected agent may access things parent can't — govern carefully",
  "Need to correlate parent and connected session logs for debugging"
]
learn_url = "https://learn.microsoft.com/microsoft-copilot-studio/add-agent-copilot-studio-agent"

