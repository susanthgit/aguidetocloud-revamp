name = "Connected Agent (Copilot Studio)"
icon = "🔌"
description = "Separate Copilot Studio agents with their own orchestration, tools, and knowledge. The parent delegates requests to them."
orchestration = "Own orchestration"
context_sharing = "Conversation history passed by default; specific params can be sent"
deployment = "Independent — can be published and used on their own channels"
tool_limits = "Own limits (separate from parent)"
latency_impact = "Moderate — context switching between agents"
when_to_use = [
  "Multiple teams or developers manage different agents independently",
  "You need to publish and maintain agents separately",
  "Agents must have dedicated settings (model choice, environment)",
  "You need independent ALM (Application Lifecycle Management)",
  "You want to make the agent reusable across multiple parent agents",
  "The subtask is complex enough to need its own tools and knowledge",
  "Different governance rules or access controls are needed"
]
benefits = [
  "Full independence — own model, settings, deployment",
  "Reusable across multiple agents",
  "Separate governance and access controls",
  "Independent ALM and versioning"
]
considerations = [
