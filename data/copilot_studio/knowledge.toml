# ═══════════════════════════════════════════════════════════════
# COPILOT STUDIO COMPANION — Knowledge Sources & Limits
# Source: https://learn.microsoft.com/microsoft-copilot-studio/requirements-quotas
# ═══════════════════════════════════════════════════════════════

[[sources]]
id = "sharepoint-sites"
name = "SharePoint Sites"
icon = "📁"
category = "Microsoft 365"
max_files = 1000
max_folders = 50
max_subfolder_depth = 10
max_file_size_mb = 512
max_file_size_no_copilot_mb = 7
sync_frequency = "4-6 hours"
supported_file_types = ["DOC", "DOCX", "PPT", "PPTX", "PDF", "XLS", "XLSX"]
requires_licence = "Copilot Studio (M365 Copilot recommended for files >7MB)"
description = "Add SharePoint sites as knowledge sources. Modern pages only — classic ASPX pages are not supported."
gotchas = [
  "Only modern SharePoint pages supported — classic ASPX pages are ignored",
  "Without M365 Copilot licence, files must be under 7MB (split large files)",
  "With M365 Copilot licence, files up to 200MB supported via Tenant Graph Grounding",
  "SPFx components on modern pages are not supported",
  "Sensitivity labels 'Confidential' or 'Highly Confidential' block indexing",
  "Password-protected files show as Ready but don't provide responses",
  "Custom CSS or accordion navigation on SharePoint sites breaks content extraction",
  "Ampersand (&) in document or folder names is not supported",
  "Cannot answer queries that reference specific file names",
  "Guest users cannot use generative answers from SharePoint in SSO-enabled apps",
  "Document libraries are not supported as lists",
  "Omit https:// from SharePoint URLs — only sharepoint.com domain recognised"
]
learn_url = "https://learn.microsoft.com/microsoft-copilot-studio/knowledge-copilot-studio"

[[sources]]
id = "sharepoint-lists"
name = "SharePoint Lists"
icon = "📋"
category = "Microsoft 365"
max_rows = 2048
max_lists_per_session = 15
max_lookup_columns = 12
sync_frequency = "4-6 hours"
supported_file_types = []
requires_licence = "Copilot Studio"
description = "Use SharePoint lists as structured data sources. Add up to 15 lists per knowledge-add session."
gotchas = [
  "Only the first 2,048 rows are returned per query",
  "Max 15 lists selectable per Add Knowledge session — add more in batches",
  "Lists with more than 12 lookup columns in default view are not supported",
  "List views cannot be selected as a knowledge source",
  "Glossary and Synonyms are not supported for lists",
  "Attachments column does not index attachment contents"
]
learn_url = "https://learn.microsoft.com/microsoft-copilot-studio/knowledge-copilot-studio"

