min = 0
max = 30
label = "Not Ready"
colour = "red"
icon = "🔴"
summary = "Several prerequisites need attention before you start building."
action = "Address the flagged items below before creating your agent."

[[tiers]]
min = 31
max = 50
label = "Early Stage"
colour = "orange"
icon = "🟠"
summary = "Foundation is forming but key gaps remain."
action = "You can start exploring in a dev environment, but don't deploy to production yet."

[[tiers]]
