# ═══════════════════════════════════════════════════════════════════════════
# DEMO SCRIPT BUILDER — Demo Prompts Library
# ═══════════════════════════════════════════════════════════════════════════
# Curated prompts for Copilot demos, organised by M365 app.
# Each prompt shows expected output, talking point, and reliability rating.
# reliability: high = works consistently, medium = usually works well
# ═══════════════════════════════════════════════════════════════════════════

# ── COPILOT CHAT (BizChat) ───────────────────────────────────────────────

[[prompts]]
id = "chat-meeting-prep"
app = "copilot-chat"
category = "Meetings"
prompt = "Help me prepare for my meeting with [Name] tomorrow. Summarise our recent interactions and any open action items"
expected = "Copilot shows a briefing with recent emails, meetings, and outstanding tasks related to the person"
talk = "This is meeting prep on autopilot — full context in 30 seconds instead of 30 minutes of digging"
reliability = "high"

[[prompts]]
id = "chat-weekly-summary"
app = "copilot-chat"
category = "Productivity"
prompt = "Give me a summary of my week. What were the key meetings, decisions, and commitments I made?"
expected = "Copilot aggregates your calendar, emails, and meeting transcripts into a weekly summary"
talk = "Imagine starting every Monday with a clear view of what happened last week and what's pending"
reliability = "high"

[[prompts]]
id = "chat-find-document"
app = "copilot-chat"
category = "Search"
prompt = "Find the latest version of the Q3 budget proposal that was shared in the finance team"
expected = "Copilot locates the document in SharePoint or OneDrive and provides a direct link"
talk = "No more searching through SharePoint folders or asking colleagues 'where did you save that file?'"
reliability = "high"

[[prompts]]
id = "chat-action-items"
app = "copilot-chat"
category = "Productivity"
prompt = "What action items were assigned to me across all my meetings this week?"
expected = "Copilot searches meeting transcripts and surfaces action items with owners and context"
talk = "Personal accountability made effortless — you always know what you committed to"
reliability = "medium"

[[prompts]]
id = "chat-competitor-intel"
app = "copilot-chat"
category = "Sales"
prompt = "What have people in my organisation said about [Competitor Name] in the last month? Search emails and Teams messages"
expected = "Copilot surfaces mentions of the competitor from accessible M365 data"
talk = "Competitive intelligence already exists in your data — Copilot just makes it accessible"
reliability = "medium"

[[prompts]]
id = "chat-project-status"
app = "copilot-chat"
category = "Productivity"
prompt = "What's the current status of the [Project Name]? Search my emails, Teams, and recent documents for updates"
expected = "Copilot compiles a status summary from multiple data sources"
talk = "Cross-app project visibility without opening 5 different tools"
reliability = "medium"

