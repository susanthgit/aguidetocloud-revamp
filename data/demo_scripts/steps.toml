# ═══════════════════════════════════════════════════════════════════════════
# DEMO SCRIPT BUILDER — Demo Steps
# ═══════════════════════════════════════════════════════════════════════════
# Each step belongs to a scenario (by ID). Steps are ordered and filtered
# by min_duration (5/15/30), risk level, and app.
#
# min_duration: 5 = essential (all durations), 15 = medium, 30 = extended
# risk: low = reliable, medium = usually works, high = impressive but risky
# wow: true = highlight as a "wow moment" with ⭐
# ═══════════════════════════════════════════════════════════════════════════

# ── SALES PIPELINE REVIEW ────────────────────────────────────────────────

[[steps]]
scenario = "sales-pipeline"
order = 1
app = "copilot-chat"
title = "Get Customer Context"
action = "Open Microsoft 365 Copilot Chat (copilot.microsoft.com or the Copilot app in Teams)"
prompt = "Summarise my recent interactions with Contoso Ltd over the last 2 weeks, including emails, meetings, and Teams messages"
expected = "Copilot surfaces a chronological summary showing email exchanges, meeting highlights, and Teams chat topics — all in one consolidated view"
talk_technical = "Copilot uses Microsoft Graph to aggregate data across all M365 apps. It only accesses data the signed-in user has permission to see."
talk_business = "Think about how long it takes your sales team to manually piece together customer context before a meeting. Copilot does it in seconds."
talk_executive = "Multiply this time saving by every customer-facing employee in your org. That's the productivity unlock."
fallback = "If Copilot returns limited results, try narrowing to a specific person: 'Summarise my emails with Sarah from Contoso this week'. The account needs real M365 data to work with."
wow = true
risk = "low"
min_duration = 5

[[steps]]
scenario = "sales-pipeline"
order = 2
app = "excel"
title = "Analyse Pipeline Data"
action = "Open the sales pipeline Excel workbook → Click on a cell inside the data table → Select Copilot from the ribbon"
prompt = "Which deals are most likely to close this quarter? Show me the top 5 by revenue with their current stage and probability"
expected = "Copilot analyses the pipeline data and highlights top opportunities, potentially adding a sorted view or chart"
talk_technical = "Excel Copilot works with structured Tables. Behind the scenes, it generates formulas and PivotTables — you can inspect and modify everything it creates."
talk_business = "Instead of building filters and pivot tables manually, your sales ops team can ask questions in plain English and get instant answers."
talk_executive = "This is self-serve analytics for every employee — no more waiting for the BI team to run a report."
fallback = "If the Copilot button is greyed out, ensure the data is formatted as a Table (select data → Ctrl+T). Remove merged cells and blank rows."
wow = true
risk = "medium"
min_duration = 5

[[steps]]
scenario = "sales-pipeline"
order = 3
app = "teams"
title = "Recap Last Customer Meeting"
action = "Open Microsoft Teams → Find the most recent meeting with Contoso → Click the Copilot icon in the meeting recap"
prompt = "What were the key discussion points and action items from this meeting?"
expected = "Copilot shows a structured summary with topics discussed, decisions made, and action items with assigned owners"
talk_technical = "This works because meeting transcription captures every word. Copilot then uses NLP to extract structure from the conversation."
talk_business = "No more 'I thought you were handling that' moments. Every action item is captured and attributed automatically."
talk_executive = "Accountability at scale — every meeting, every action item, every owner. No excuses."
fallback = "If no transcript is available, transcription must be enabled BEFORE the meeting. Show a pre-recorded example instead."
wow = false
risk = "low"
min_duration = 5

[[steps]]
scenario = "sales-pipeline"
order = 4
app = "word"
title = "Draft Meeting Agenda"
action = "Open Microsoft Word → New blank document → Click the Copilot icon"
prompt = "Draft an agenda for tomorrow's sales pipeline review meeting with the team. Include sections for: pipeline overview, top deals update, risk deals, resource needs, and next steps"
expected = "Copilot generates a structured meeting agenda with clear sections, talking points under each, and placeholder time allocations"
talk_technical = "Word Copilot can also reference existing files — try adding 'based on /last week's meeting notes' to pull in context from other documents."
talk_business = "Your meeting agenda just went from a 15-minute task to a 30-second task. And it's more structured than what most people write manually."
talk_executive = "Better-prepared meetings mean faster decisions. Multiply that across hundreds of meetings a week."
fallback = "If the output is too generic, add more context: 'Our pipeline has 47 deals worth $2.3M. Focus on the 5 deals closing this month.'"
wow = false
risk = "low"
min_duration = 15

[[steps]]
scenario = "sales-pipeline"
order = 5
app = "outlook"
title = "Draft Customer Follow-up"
action = "Open Microsoft Outlook → Click New Email → Click the Copilot icon in the compose window"
prompt = "Draft a follow-up email to Sarah at Contoso thanking her for yesterday's meeting, summarising the 3 key next steps we agreed on, and proposing a check-in call next Thursday at 2pm"
expected = "Copilot generates a professional, personalised email with specific details from the meeting context"
talk_technical = "Copilot can reference your recent meetings and emails to add specific context. It respects your writing style over time."
talk_business = "Your sales team sends 50+ emails a day. If each email saves 3 minutes, that's 2.5 hours back per person, per day."
talk_executive = "Consistent, professional communication at scale. Every customer interaction reflects your brand quality."
fallback = "If the draft is too generic, use Outlook's Copilot coaching feature to adjust tone: try 'Make it more friendly and concise'."
wow = false
risk = "low"
min_duration = 15

[[steps]]
scenario = "sales-pipeline"
order = 6
app = "powerpoint"
title = "Create Pipeline Update Deck"
action = "Open Microsoft PowerPoint → New blank presentation (apply company theme first) → Click the Copilot icon"
prompt = "Create a 5-slide sales pipeline update presentation covering: pipeline summary, top opportunities, risk deals, competitive landscape, and next quarter forecast"
expected = "Copilot generates a structured deck with slides, bullet points, and placeholder content for each section"
talk_technical = "Copilot uses the active theme for styling. For best results, apply your corporate template before generating slides."
talk_business = "That deck used to take an hour to create. Your sales leaders now walk into pipeline reviews fully prepared, every time."
talk_executive = "This is the last slide anyone needs to see — Copilot just turned meeting prep from a chore into a competitive advantage."
fallback = "If slides look generic, try referencing a source document: 'Create a presentation based on /Q3 Pipeline Report.docx'."
wow = true
risk = "medium"
min_duration = 15

[[steps]]
scenario = "sales-pipeline"
order = 7
app = "copilot-chat"
title = "Prepare Competitive Intel"
action = "Return to Copilot Chat"
prompt = "Based on my recent emails and meetings, what competitive threats have been mentioned regarding the Contoso deal? Summarise any competitor mentions and concerns raised"
expected = "Copilot searches across emails and meeting transcripts to surface competitive intelligence"
talk_technical = "This is Microsoft Graph search in action — Copilot correlates data across apps to find patterns a human might miss."
talk_business = "Your sales team has competitive intel buried in emails and meeting notes. Copilot surfaces it automatically."
talk_executive = "This is intelligence you're already paying for — it's in your data. Copilot just makes it accessible."
fallback = "If results are thin, try: 'What has anyone in my organisation said about [Competitor Name] in the last month?'"
wow = true
risk = "high"
min_duration = 30

