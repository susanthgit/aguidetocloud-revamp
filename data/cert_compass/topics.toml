# ============================================================================
# TOPIC TAXONOMY — Controlled cross-cloud skill tags
# ============================================================================
# ~20 mid-granularity topics that apply across all 3 providers.
# Each cert gets 5-10 tags. Used for:
#   - Skills Translator overlap %
#   - Portfolio gap analysis
#   - Quiz recommendations
#
# NOT provider-specific service names (e.g., "S3" or "Blob Storage")
# NOT too broad (e.g., just "security")
# Goldilocks: transferable skill categories

# ── Topic Definitions ────────────────────────────────────────────────────

[[topics]]
id = "iam"
name = "Identity & Access Management"
description = "Authentication, authorisation, roles, policies, SSO, MFA"

[[topics]]
id = "compute"
name = "Compute & Virtual Machines"
description = "VMs, scaling, load balancing, availability sets"

[[topics]]
id = "containers"
name = "Containers & Orchestration"
description = "Docker, Kubernetes, container registries, managed container services"

[[topics]]
id = "serverless"
name = "Serverless & Functions"
description = "FaaS, event-driven compute, API gateways"

[[topics]]
id = "networking"
name = "Networking & Connectivity"
description = "VPCs/VNets, subnets, DNS, load balancers, CDN, hybrid connectivity"

[[topics]]
id = "storage"
name = "Storage & Object Storage"
description = "Blob/S3/GCS, file storage, disk storage, lifecycle policies"

[[topics]]
id = "databases"
name = "Database Services"
description = "Relational (SQL), NoSQL, in-memory, managed database services"

[[topics]]
id = "monitoring"
name = "Monitoring & Logging"
description = "Metrics, alerts, dashboards, log analytics, tracing"

[[topics]]
id = "security-controls"
name = "Security Controls & Compliance"
description = "Encryption, key management, firewalls, WAF, DDoS, compliance frameworks"

[[topics]]
id = "governance"
name = "Governance & Cost Management"
description = "Policies, tags, budgets, resource organisation, billing"

[[topics]]
id = "iac"
name = "Infrastructure as Code"
description = "ARM/CloudFormation/Terraform, templates, deployment automation"

[[topics]]
id = "cicd"
name = "CI/CD & DevOps Practices"
description = "Pipelines, source control, automated testing, release management"

[[topics]]
id = "data-pipelines"
name = "Data Pipelines & ETL"
description = "Data ingestion, transformation, orchestration, streaming"

[[topics]]
id = "data-warehousing"
name = "Data Warehousing & Analytics"
description = "Data lakes, warehouses, BI, query engines, big data"

[[topics]]
id = "ml-fundamentals"
name = "ML Fundamentals & Model Training"
description = "Algorithms, training, evaluation, feature engineering"

[[topics]]
id = "ai-services"
name = "AI Services & APIs"
description = "Pre-built AI (vision, speech, language, translation), AI platforms"

[[topics]]
id = "ml-ops"
name = "MLOps & Model Deployment"
description = "Model serving, pipelines, monitoring, A/B testing, endpoints"

[[topics]]
id = "incident-response"
name = "Threat Detection & Incident Response"
description = "SIEM, SOAR, threat hunting, security operations"

[[topics]]
id = "app-development"
name = "Application Development"
description = "SDKs, APIs, messaging, caching, app hosting patterns"

[[topics]]
id = "migration"
name = "Migration & Hybrid"
description = "Cloud migration strategies, hybrid architectures, multi-cloud"

