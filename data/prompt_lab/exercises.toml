criteria = [
  "Asks for initial version focused on one quality",
  "Reviews from 2+ distinct perspectives",
  "Each perspective catches different issues",
  "Produces improved version addressing all feedback"
]
keywords = ["version 1,first draft,initial,V1", "perspective,viewpoint,lens,as a,critique,review", "executive,employee,sceptic,helpdesk,manager", "version 2,improve,revise,address,fix,V2"]
sample_answer = "Write a company-wide email announcing our new password policy (minimum 16 characters, passphrase encouraged, no expiry, MFA required within 30 days). This is Version 1 — focus on clarity and completeness.\n\nAfter Version 1, critique from these perspectives:\n1. **The busy executive:** Can they understand the action required from just the subject line and first sentence?\n2. **The annoyed employee:** Does it explain WHY this is happening? Does it acknowledge the inconvenience?\n3. **The IT helpdesk:** Will this email generate more support tickets or fewer? Are self-service instructions clear enough?\n\nList specific improvements from each perspective, then produce Version 2 that addresses all feedback and stays under 200 words."

