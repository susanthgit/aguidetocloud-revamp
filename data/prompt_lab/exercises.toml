# ============================================================================
# PROMPT LAB — Exercises (3 per technique = 36 total)
# ============================================================================
# Each exercise has a workplace scenario, starter prompt, task, criteria
# (keyword-based for real-time checking), and sample answer.
# Difficulty: 1 (easy), 2 (medium), 3 (hard)
# ============================================================================

# ── Tree of Thought ──────────────────────────────────────────────────────────

[[exercises]]
technique_id = "tree-of-thought"
id = "tot-1"
title = "Cloud Storage Decision"
difficulty = 1
scenario = "Your team needs to choose between OneDrive, SharePoint, and a third-party cloud storage solution for your 200-person marketing department."
starter_prompt = "Which cloud storage should our marketing team use?"
task = "Rewrite this prompt to make the AI explore multiple storage options with structured evaluation."
hints = ["Ask for at least 3 options", "Request pros and cons for each", "Ask for a recommendation with reasoning"]
criteria = [
  "Mentions evaluating multiple options (3+)",
  "Asks for pros and cons or trade-offs",
  "Requests a final recommendation with reasoning",
  "Includes context about the team (marketing, 200 people)"
]
keywords = ["approaches,options,alternatives,compare,consider", "pros,cons,trade-offs,advantages,disadvantages", "recommend,best,evaluate,choose,pick", "marketing,200,team,department"]
sample_answer = "Consider 3 cloud storage approaches for our 200-person marketing department: (1) OneDrive only, (2) SharePoint team sites, (3) a hybrid with a third-party tool like Box. For each option, list 3 pros, 3 cons, estimated cost per user, and how well it handles large video files (a key marketing need). Then evaluate all three and recommend the best fit, explaining your reasoning."

[[exercises]]
technique_id = "tree-of-thought"
id = "tot-2"
title = "Security Architecture"
difficulty = 2
scenario = "Your CISO wants to implement Zero Trust for remote workers. There are different approaches: device-based, identity-based, or network-based Zero Trust models."
starter_prompt = "How do we implement Zero Trust for remote workers?"
task = "Use Tree of Thought to have the AI explore different Zero Trust models before recommending one."
hints = ["Specify the Zero Trust models to explore", "Ask for evaluation criteria", "Request scoring or ranking"]
criteria = [
  "Specifies multiple Zero Trust approaches to explore",
  "Asks for structured evaluation of each approach",
  "Includes context (remote workers, org details)",
  "Requests a scored or ranked recommendation"
]
keywords = ["approaches,models,strategies,paths,options", "evaluate,compare,score,rank,assess", "remote,workers,employees,hybrid", "recommend,best,strongest,winner"]
sample_answer = "Evaluate 3 Zero Trust approaches for our 500 remote workers on M365 E5: (1) Identity-first (Entra ID Conditional Access + MFA as the foundation), (2) Device-first (Intune compliance required for all access), (3) Network-first (ZTNA/Private Access replacing VPN). For each: explain the architecture, list 3 strengths and 3 weaknesses, rate implementation complexity (1-5), rate user impact (1-5), and estimate timeline. Then score each approach overall and recommend which to start with and why."

[[exercises]]
technique_id = "tree-of-thought"
id = "tot-3"
title = "Vendor Evaluation"
difficulty = 3
scenario = "You need to choose a SIEM solution. Options include Microsoft Sentinel, Splunk, and CrowdStrike. Budget is tight but security is critical."
starter_prompt = "Which SIEM should we buy?"
task = "Craft a Tree of Thought prompt that explores each option with specific evaluation criteria relevant to your constraints."
hints = ["Define evaluation dimensions (cost, features, integration)", "Include your specific constraints", "Ask for weighted scoring"]
criteria = [
  "Names specific SIEM options to evaluate",
  "Defines multiple evaluation criteria or dimensions",
  "Includes constraints (budget, existing stack)",
  "Asks for weighted or scored comparison"
]
keywords = ["Sentinel,Splunk,CrowdStrike,options,evaluate", "cost,price,budget,criteria,dimensions,features", "M365,existing,integration,stack,constraint", "score,weight,rank,compare,matrix"]
sample_answer = "Evaluate these 3 SIEM solutions for our 300-person organisation (M365 E5, Azure-heavy, $50K annual security budget): Microsoft Sentinel, Splunk Cloud, and CrowdStrike Falcon LogScale. Score each on these weighted criteria: (1) Annual cost for our data volume (~50GB/day) — weight 30%, (2) M365 integration depth — weight 25%, (3) Detection coverage (MITRE ATT&CK) — weight 20%, (4) Ease of management for a 2-person security team — weight 15%, (5) Vendor lock-in risk — weight 10%. Calculate weighted scores, then present a recommendation matrix showing the winner and runner-up with clear reasoning."

# ── Prompt Chaining ──────────────────────────────────────────────────────────

[[exercises]]
technique_id = "prompt-chaining"
id = "chain-1"
title = "Onboarding Documentation"
difficulty = 1
scenario = "You need to create a new employee IT onboarding guide. It needs to cover accounts, devices, software, and security training."
starter_prompt = "Create an IT onboarding guide for new employees."
task = "Break this into a chain of steps where each output feeds into the next."
hints = ["Start by identifying what new employees need", "Then create content for each area", "End with a final formatted guide"]
criteria = [
  "Breaks the task into 3+ sequential steps",
  "Each step clearly builds on the previous one",
  "Steps progress from research to creation to final output",
  "Includes a final assembly or formatting step"
]
keywords = ["step 1,step 2,step 3,first,then,next,finally", "using,based on,from the above,output,result", "list,identify,gather,research,inventory", "create,format,compile,assemble,produce"]
sample_answer = "Let's build this step by step:\n\nStep 1: List every system, tool, and account a new employee at our company needs access to on Day 1, grouped by category (Identity, Communication, Productivity, Security, Department-Specific).\n\nStep 2: For each item from Step 1, write a 2-3 sentence description of what it is and why the employee needs it, plus the exact steps to request or set up access.\n\nStep 3: Using the content from Steps 1 and 2, create a polished IT Onboarding Guide formatted as a checklist the employee can follow, with estimated time per task and a 'Need Help?' contact for each section."

[[exercises]]
technique_id = "prompt-chaining"
id = "chain-2"
title = "Security Incident Report"
difficulty = 2
scenario = "A phishing email compromised one user's account. You need to investigate, contain, remediate, and write the incident report."
starter_prompt = "Write a report about the phishing incident."
task = "Create a prompt chain that mirrors the incident response workflow — investigate first, then contain, then report."
hints = ["Mirror the real IR workflow: detect → investigate → contain → remediate → report", "Each step should use findings from the previous step", "The final report should reference all previous steps"]
criteria = [
  "Follows an incident response sequence",
  "Each step uses information from the previous one",
  "Covers investigation, containment, and reporting phases",
  "Final step produces a formal document"
]
keywords = ["step,phase,stage,first,then,next", "investigate,identify,detect,discover,assess", "contain,isolate,block,remediate,reset", "report,document,summary,findings,timeline"]
sample_answer = "Work through this phishing incident systematically:\n\nStep 1 — INVESTIGATE: A user (jane.doe@contoso.com) clicked a credential harvesting link at 2:15 PM yesterday. List all the checks I should perform to assess the blast radius — compromised mailbox rules, sent items, sign-in logs, file access, lateral movement indicators.\n\nStep 2 — CONTAIN: Based on the investigation findings above, list every containment action in priority order — what to block, reset, revoke, and isolate. Include the exact M365 admin portal path for each action.\n\nStep 3 — REMEDIATE: Now list the remediation steps to prevent recurrence — policy changes, user training, detection rules to add.\n\nStep 4 — REPORT: Using all findings from Steps 1-3, write a formal incident report with: Executive Summary, Timeline, Impact Assessment, Actions Taken, Root Cause, and Recommendations."

[[exercises]]
technique_id = "prompt-chaining"
id = "chain-3"
title = "Licence Optimisation"
difficulty = 3
scenario = "Your CFO wants to reduce M365 licensing costs. You need to analyse current usage, identify waste, model alternatives, and present recommendations."
starter_prompt = "How can we reduce our Microsoft 365 licensing costs?"
task = "Design a 4-step prompt chain that goes from analysis to executive recommendation."
hints = ["Start with inventory/analysis", "Move to waste identification", "Model alternative scenarios", "End with an executive-ready recommendation"]
criteria = [
  "Has 4+ distinct sequential steps",
  "Progresses from analysis to recommendation",
  "Includes a cost modelling or comparison step",
  "Ends with executive-ready output"
]
keywords = ["step,phase,first,then,next,finally", "analyse,audit,inventory,assess,review", "waste,unused,underutilised,savings,reduce", "executive,CFO,recommend,present,proposal"]
sample_answer = "Let's approach licence optimisation systematically:\n\nStep 1 — AUDIT: We have 800 users across E3, E5, and Business Premium. List every M365 licence tier's key features and identify which features justify the price premium between tiers. Create a decision matrix: 'If the user only needs X, they should be on Y tier.'\n\nStep 2 — IDENTIFY WASTE: Using the decision matrix from Step 1, describe a process to identify users on higher tiers than they need. What usage signals indicate someone doesn't need E5 vs E3? What admin reports and PowerShell commands would reveal this?\n\nStep 3 — MODEL SCENARIOS: Create 3 cost scenarios: (A) Current state, (B) Optimised by downgrading over-licensed users, (C) Aggressive — moving to cheapest viable tier per user. Calculate annual cost for each assuming 800 users.\n\nStep 4 — PRESENT: Using all the above, write a 1-page executive brief for our CFO showing current spend, savings per scenario, implementation risk, and your recommendation."

# ── Skeleton Prompting ───────────────────────────────────────────────────────

[[exercises]]
technique_id = "skeleton-prompting"
id = "skel-1"
title = "Incident Comms Template"
difficulty = 1
scenario = "You need to send an email to all staff about a service outage. You want consistent structure every time."
starter_prompt = "Write an outage notification email."
task = "Create a skeleton with specific sections the AI should fill in for this outage."
hints = ["Define each section with what should go there", "Include placeholders for variable information", "Make it reusable for future outages"]
criteria = [
  "Provides a clear template structure with sections",
  "Each section has guidance on what to include",
  "Includes context about the specific outage",
  "Structure is reusable for future incidents"
]
keywords = ["template,structure,section,fill in,skeleton,framework", "summary,impact,status,timeline,update,next", "outage,incident,service,disruption", "reusable,consistent,every time,standard"]
sample_answer = "Fill in this outage notification template for our current situation (Teams voice calling is down since 9 AM, affecting 200 users, ETA for fix is 2 PM):\n\n## Subject Line\nClear, specific subject — include the service name and status.\n\n## What's Happening (2 sentences)\nPlain English description of the issue. No jargon.\n\n## Who's Affected\nSpecific teams, locations, or user groups impacted.\n\n## What We're Doing\nActions IT is taking right now, in bullet points.\n\n## Workaround\nWhat users can do in the meantime.\n\n## Next Update\nWhen we'll send the next status update.\n\n## Contact\nWho to reach if they need urgent help."

[[exercises]]
technique_id = "skeleton-prompting"
id = "skel-2"
title = "Security Policy Document"
difficulty = 2
scenario = "You need to write an acceptable use policy for AI tools in your organisation."
starter_prompt = "Write an AI acceptable use policy."
task = "Design a skeleton that ensures the policy covers all necessary sections with specific guidance per section."
hints = ["Think about what a legal/compliance team would expect", "Include both rules and examples", "Add an enforcement section"]
criteria = [
  "Has 5+ distinct policy sections",
  "Each section includes what content should be generated",
  "Covers both allowed and prohibited uses",
  "Includes practical examples or scenarios"
]
keywords = ["template,structure,section,fill,skeleton,framework,outline", "policy,rule,guideline,acceptable,prohibited,allowed", "AI,copilot,ChatGPT,tool,generative", "example,scenario,enforcement,compliance"]
sample_answer = "Fill in this AI Acceptable Use Policy skeleton for our financial services company (300 employees, M365 E5 with Copilot, SOC 2 compliant):\n\n## 1. Purpose & Scope\nWhy this policy exists, who it applies to, which AI tools are covered.\n\n## 2. Approved AI Tools\nTable: Tool name | Approved use | Data classification allowed | Licence requirement.\n\n## 3. Prohibited Uses\nBullet list of specific things employees must NOT do with AI tools, with a real example for each.\n\n## 4. Data Handling Rules\nWhat data can be entered into each tool. Rules by classification level (Public / Internal / Confidential / Restricted).\n\n## 5. Review & Approval\nWhen does AI output need human review before sharing externally? Decision tree.\n\n## 6. Incident Reporting\nWhat to do if someone accidentally shares sensitive data with an AI tool.\n\n## 7. Enforcement\nConsequences for policy violations, ranging from warning to termination.\n\n## 8. Review Cycle\nHow often this policy is reviewed and by whom."

[[exercises]]
technique_id = "skeleton-prompting"
id = "skel-3"
title = "Architecture Decision Record"
difficulty = 3
scenario = "You need to document why you chose Microsoft Sentinel over Splunk for your SIEM. Future teams need to understand the reasoning."
starter_prompt = "Document why we chose Sentinel."
task = "Create an Architecture Decision Record (ADR) skeleton that captures the decision, context, options, and consequences."
hints = ["ADRs have a standard structure (context, decision, consequences)", "Include what was rejected and why", "Future-proof it with review triggers"]
criteria = [
  "Follows ADR format (context, decision, consequences)",
  "Includes rejected alternatives with reasons",
  "Captures assumptions and constraints",
  "Includes review triggers for revisiting the decision"
]
keywords = ["template,structure,ADR,record,skeleton,framework", "context,decision,consequence,rationale,status", "rejected,alternative,considered,option,chose", "review,trigger,revisit,assumption,constraint"]
sample_answer = "Fill in this Architecture Decision Record for our SIEM selection:\n\n## ADR-2026-003: SIEM Platform Selection\n\n### Status\n[Proposed / Accepted / Deprecated / Superseded]\n\n### Context\nWhat business need or technical problem drove this decision? What constraints existed (budget, timeline, team skills, existing infrastructure)?\n\n### Decision\nWhat did we decide? State it clearly in one sentence.\n\n### Options Considered\nFor each option (Sentinel, Splunk, CrowdStrike LogScale): Summary of approach, estimated cost, key strengths, key weaknesses, team capability fit.\n\n### Rationale\nWhy did we choose this option over the others? What were the deciding factors?\n\n### Consequences\nPositive: What benefits do we get?\nNegative: What trade-offs are we accepting?\nRisks: What could go wrong with this choice?\n\n### Assumptions\nWhat did we assume to be true that, if wrong, would change this decision?\n\n### Review Triggers\nList specific events that should trigger a re-evaluation (e.g., contract renewal, team growth to 5+ analysts, Azure cost exceeding $X/month)."

# ── Mega Prompting ───────────────────────────────────────────────────────────

[[exercises]]
technique_id = "mega-prompting"
id = "mega-1"
title = "Tenant Audit Prompt"
difficulty = 1
scenario = "You want to create a reusable prompt that generates a comprehensive M365 tenant security audit every quarter."
starter_prompt = "Audit our Microsoft 365 security."
task = "Transform this into a mega prompt that combines role, context, task, format, constraints, and examples."
hints = ["Assign a specific expert role", "Provide organisational context", "Define exact output format", "Set constraints on scope and depth"]
criteria = [
  "Assigns a specific expert role with experience",
  "Includes organisational context and constraints",
  "Specifies exact output format or structure",
  "Sets boundaries on what to include or exclude"
]
keywords = ["you are,role,expert,consultant,specialist,engineer", "context,organisation,company,environment,users,licensing", "format,structure,output,template,sections,table", "constraint,avoid,exclude,limit,focus,scope,requirement"]
sample_answer = "You are a senior Microsoft 365 security consultant with 10 years of experience in enterprise environments.\n\nContext: Our organisation has 500 users on M365 E5 licensing with hybrid Exchange and Entra ID. We're in financial services, subject to SOC 2 and privacy regulations. We have a 3-person IT security team.\n\nTask: Conduct a comprehensive security audit of our M365 tenant configuration, covering identity, email, data protection, devices, and monitoring.\n\nRequirements:\n- Each finding must include: severity (Critical/High/Medium/Low), the current state, the recommended state, and the exact admin portal path to fix it\n- Prioritise findings by risk, not alphabetically\n- Include a 1-page executive summary with a security score out of 100\n\nFormat: Start with the executive summary, then detailed findings grouped by security domain, ending with a 30-day remediation roadmap.\n\nConstraints:\n- Only include findings we can action with E5 licensing (no upsell)\n- Skip cosmetic issues — focus on real security risk\n- Keep the total under 2000 words\n\nThink step by step through each security domain before writing."

[[exercises]]
technique_id = "mega-prompting"
id = "mega-2"
title = "Training Material Creator"
difficulty = 2
scenario = "You need to create a 30-minute Copilot training session for managers who've never used AI tools."
starter_prompt = "Create a Copilot training session for managers."
task = "Build a mega prompt that produces a complete, facilitator-ready training session."
hints = ["Define the audience precisely", "Specify the deliverables (slides outline, script, exercises)", "Set tone and complexity constraints", "Include what NOT to cover"]
criteria = [
  "Defines the audience (managers, non-technical, first time)",
  "Specifies multiple deliverables",
  "Sets tone and complexity level",
  "Excludes topics that would overwhelm beginners"
]
keywords = ["you are,role,trainer,facilitator,instructor", "manager,executive,leader,non-technical,beginner", "slide,script,exercise,handout,agenda,deliverable", "avoid,exclude,don't,skip,not,simple,basic"]
sample_answer = "You are an experienced corporate trainer who specialises in making AI tools approachable for non-technical professionals.\n\nContext: You're creating a 30-minute Copilot introduction for 20 department managers. None have used AI tools before. Some are sceptical. They need to see immediate personal value, not hear about technology.\n\nTask: Create a complete facilitator-ready training session with these deliverables:\n1. Slide deck outline (10 slides max, with speaker notes)\n2. Three live demo scenarios they can follow along with\n3. A one-page 'cheat sheet' handout they'll keep\n\nRequirements:\n- Open with a 'wow moment' demo in the first 2 minutes\n- Every example must use THEIR daily tasks (emails, meetings, reports)\n- Include at least one interactive exercise where they try Copilot themselves\n- End with 3 specific things they can try tomorrow\n\nTone: Conversational, encouraging, zero jargon. Talk about what Copilot DOES, not how it WORKS.\n\nConstraints:\n- Don't mention tokens, models, APIs, or prompt engineering\n- Don't compare to ChatGPT or competitors\n- Don't oversell — be honest about limitations\n- Keep everything within M365 Copilot (no third-party tools)"

[[exercises]]
technique_id = "mega-prompting"
id = "mega-3"
title = "RFP Response Template"
difficulty = 3
scenario = "Your company is responding to an RFP for IT managed services. You need a compelling, structured response."
starter_prompt = "Help me write an RFP response for managed IT services."
task = "Craft a mega prompt that produces a professional RFP response with all necessary components."
hints = ["Assign a business development expert role", "Include your company's differentiators", "Specify RFP response conventions", "Request both executive summary and detailed sections"]
criteria = [
  "Assigns a specialised role (BD, proposal writer)",
  "Includes company differentiators and context",
  "Follows RFP response structure conventions",
  "Requests both summary and detailed components"
]
keywords = ["you are,role,expert,writer,consultant,strategist", "company,differentiator,strength,track record,capability", "RFP,proposal,response,section,executive summary,compliance", "structure,format,page,word count,section,appendix"]
sample_answer = "You are a senior proposal writer with 12 years of experience winning IT managed services contracts.\n\nContext: Our company (TechServe NZ, 50 employees) is responding to an RFP from a 1,000-person law firm seeking managed IT services. Our strengths: M365 expertise, 24/7 NZ-based support, legal industry experience (3 existing law firm clients), ISO 27001 certified. Our weakness: we're smaller than the incumbent (a large MSP).\n\nTask: Write a compelling RFP response that positions our size as an advantage (dedicated attention, senior staff on their account) while addressing the implied risk.\n\nFormat:\n1. Executive Summary (1 page — this wins or loses the deal)\n2. Company Overview with 3 client testimonials\n3. Technical Approach per RFP requirement\n4. Staffing Plan with named resources\n5. SLA commitments in a table\n6. Transition Plan (30/60/90 day)\n7. Pricing Summary\n\nConstraints:\n- Professional but warm tone — law firms value relationships\n- Avoid generic MSP language ('synergies', 'leverage', 'best-in-class')\n- Total response under 15 pages\n- Each section must directly reference the RFP requirement number it addresses"

# ── Self-Ask ─────────────────────────────────────────────────────────────────

[[exercises]]
technique_id = "self-ask"
id = "sa-1"
title = "Copilot Deployment"
difficulty = 1
scenario = "You're planning to deploy M365 Copilot to your first 50 pilot users."
starter_prompt = "Create a Copilot pilot deployment plan."
task = "Rewrite this so the AI first identifies what it needs to know before creating the plan."
hints = ["Ask the AI to list questions first", "Have it make stated assumptions", "Request that assumptions are flagged in the plan"]
criteria = [
  "Asks AI to list questions before answering",
  "Requires assumptions to be stated explicitly",
  "Still asks for the actual deployment plan",
  "Asks which recommendations would change if assumptions are wrong"
]
keywords = ["question,ask,need to know,information,clarif", "assumption,assume,state,explicit,flag", "plan,deploy,pilot,rollout", "change,different,wrong,adjust,depend"]
sample_answer = "I need a Copilot pilot deployment plan for 50 users.\n\nBefore creating the plan:\n1. List 8 questions you'd need answered to create the best possible pilot plan\n2. For each question, state your assumption since I haven't provided details\n3. Create the pilot plan based on those stated assumptions\n4. At the end, flag any recommendations that would change significantly if your assumptions are wrong\n5. Mark each assumption as [Safe to assume] or [Verify before proceeding]"

[[exercises]]
technique_id = "self-ask"
id = "sa-2"
title = "Budget Proposal"
difficulty = 2
scenario = "Your CTO asked you to propose a cybersecurity budget for next year."
starter_prompt = "Help me create a cybersecurity budget proposal."
task = "Use Self-Ask to make the AI surface all the unknowns before proposing numbers."
hints = ["Ask about existing spending, threats, compliance needs", "Have the AI categorise assumptions by risk level", "Request the budget be adjustable based on assumption changes"]
criteria = [
  "Has the AI identify unknowns about current spending and needs",
  "Asks for risk-categorised assumptions",
  "Still produces the actual budget proposal",
  "Includes sensitivity analysis or adjustable scenarios"
]
keywords = ["question,ask,need to know,unknown,gap", "assumption,assume,estimate,risk,confidence", "budget,cost,spend,invest,allocate", "scenario,adjust,sensitivity,change,depend,if"]
sample_answer = "I need to propose a cybersecurity budget for next financial year to our CTO.\n\nBefore proposing numbers:\n1. List 12 questions you'd need answered to create an accurate cybersecurity budget (covering current spend, threat landscape, compliance requirements, team size, tool contracts, and planned projects)\n2. Categorise each assumption as: 🟢 Low risk (safe to estimate), 🟡 Medium risk (should verify), 🔴 High risk (could significantly change the budget)\n3. Create the budget proposal with line items, using your assumptions\n4. Show a sensitivity table: if any 🔴 assumption is wrong, how does the total budget change?\n5. End with 'Questions to ask your CTO before finalising' — the 3 most impactful unknowns"

[[exercises]]
technique_id = "self-ask"
id = "sa-3"
title = "Compliance Gap Analysis"
difficulty = 3
scenario = "A new regulation (NZ Privacy Act changes) may affect how your organisation handles personal data in M365."
starter_prompt = "What do we need to change for the new privacy regulations?"
task = "Apply Self-Ask to make the AI surface regulatory uncertainties and organisational unknowns before advising."
hints = ["Separate what the AI knows vs what it needs from you", "Have it distinguish regulatory facts from interpretations", "Request conditional recommendations"]
criteria = [
  "Separates known regulatory facts from unknowns",
  "Asks about organisation-specific details it can't know",
  "Produces conditional recommendations (if X then Y)",
  "Flags areas needing legal review"
]
keywords = ["question,ask,need,know,unknown,gap,clarif", "assume,assumption,interpret,legal,review", "regulation,privacy,compliance,act,law", "conditional,if,depend,recommend,flag,review"]
sample_answer = "We need to assess the impact of NZ Privacy Act changes on our M365 environment.\n\nBefore advising:\n1. List what you know with certainty about these regulatory changes (cite sources if possible)\n2. List what you're uncertain about or interpreting (flag these clearly)\n3. List 8 organisation-specific questions you'd need answered (data types we hold, current controls, cross-border data flows, etc.)\n4. State your assumptions for each and flag confidence level\n\nThen provide:\n- A gap analysis with conditional recommendations: 'IF you [process health data / transfer data to Australia / etc.], THEN you need to [action]'\n- A clear list of items that require legal review vs items IT can action independently\n- Priority order based on risk and regulatory deadline"

# ── Self-Reflection ──────────────────────────────────────────────────────────

[[exercises]]
technique_id = "self-reflection"
id = "ref-1"
title = "Policy Review"
difficulty = 1
scenario = "You've asked the AI to write a BYOD (Bring Your Own Device) policy."
starter_prompt = "Write a BYOD policy for our company."
task = "Add Self-Reflection instructions so the AI reviews its own policy for gaps."
hints = ["Ask it to critique from specific quality criteria", "Include different stakeholder perspectives", "Request a revised version"]
criteria = [
  "Asks for the initial policy output",
  "Specifies quality criteria for self-review",
  "Requests specific improvements to be listed",
  "Asks for a revised version incorporating improvements"
]
keywords = ["review,critique,evaluate,assess,check", "criteria,quality,gap,weakness,improve", "list,specific,improvement,finding", "revise,version 2,updated,improved,rewrite"]
sample_answer = "Write a BYOD policy for our 200-person organisation (M365 E5, Intune-managed).\n\nAfter writing the policy, review it against these criteria:\n- Security: Does it address data loss if a personal device is lost or stolen?\n- Practicality: Could a non-technical employee understand and follow every rule?\n- Enforceability: Can IT actually verify compliance with each policy item?\n- Completeness: Does it cover all device types (phones, tablets, laptops, wearables)?\n\nList specific improvements for each criterion with examples, then produce a revised Version 2."

[[exercises]]
technique_id = "self-reflection"
id = "ref-2"
title = "Presentation Upgrade"
difficulty = 2
scenario = "You need a presentation for the board about your IT department's achievements this quarter."
starter_prompt = "Create a quarterly IT achievements presentation."
task = "Use Self-Reflection to make the AI review its presentation from the board's perspective."
hints = ["The board cares about business impact, not technical details", "Include quantifiable outcomes", "Critique from a CFO and CEO perspective"]
criteria = [
  "Asks for the initial presentation content",
  "Critique includes specific board-relevant perspectives",
  "Looks for business impact vs technical details",
  "Produces improved version with measurable outcomes"
]
keywords = ["review,critique,evaluate,perspective,lens", "board,executive,CEO,CFO,business,impact", "measurable,quantif,outcome,result,ROI,metric", "revise,version 2,improved,rewrite,update"]
sample_answer = "Create a 10-slide quarterly IT achievements presentation for our board of directors.\n\nAfter creating the slides, review each one from these perspectives:\n1. The CFO: Is every achievement tied to a dollar value, time saving, or risk reduction? Replace any 'we implemented X' with 'X saved/prevented/enabled Y.'\n2. The CEO: Does the narrative show IT as a business enabler, not a cost centre? Is there a clear connection to company strategy?\n3. A sceptical board member: Would they challenge any claim? Are all numbers defensible?\n\nList the weakest slide and the strongest slide with reasoning. Then produce Version 2 addressing all feedback."

[[exercises]]
technique_id = "self-reflection"
id = "ref-3"
title = "Runbook Quality"
difficulty = 3
scenario = "You've asked the AI to create a runbook for restoring Exchange Online mailboxes from backup."
starter_prompt = "Write a runbook for Exchange Online mailbox restoration."
task = "Apply Self-Reflection with the '2 AM test' — could a junior admin follow this during an outage?"
