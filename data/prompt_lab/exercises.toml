criteria = [
  "Asks for the initial runbook",
  "Applies the '2 AM test' criterion explicitly",
  "Checks for error handling and edge cases",
  "Requests actionable improvements and a revised version"
]
keywords = ["review,critique,test,check,evaluate,assess", "2 AM,junior,alone,stress,outage,emergency", "error,fail,wrong,edge case,troubleshoot", "revise,version 2,improve,fix,update,rewrite"]
sample_answer = "Write a runbook for restoring Exchange Online mailboxes from backup (native Microsoft tools, E5 licensing, Veeam backup as secondary).\n\nAfter writing the runbook, apply the '2 AM Test' — review as if you're a junior admin running this alone during a 2 AM outage:\n- Are any steps ambiguous? (Could someone do the wrong thing?)\n- Are there missing 'What if this fails?' branches?\n- Are PowerShell commands copy-pasteable? (No placeholder text that could be run literally)\n- Is the escalation path clear at every decision point?\n- Are expected completion times listed for each major phase?\n\nList every issue found, then produce Version 2 that a panicked junior admin could follow safely."

