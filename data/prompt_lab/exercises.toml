  "Produces initial version with clear focus",
  "Reviews from multiple C-suite perspectives",
  "Each review targets different concerns (financial, strategic, technical)",
  "Final version addresses all executive concerns"
]
keywords = ["version 1,V1,initial,first", "CFO,CEO,CTO,executive,perspective,critique", "cost,ROI,strategy,feasible,risk,revenue,competitive", "version 2,V2,improve,revise,address,final"]
sample_answer = "Create a 5-minute presentation (8 slides max) arguing that our 300-person company should invest in M365 Copilot and AI training. This is Version 1 — focus on making the strongest possible business case.\n\nAfter Version 1, critique it from 3 C-suite perspectives:\n1. **CFO lens:** Are the cost projections credible? Is the ROI timeline realistic? What's the total cost of ownership including training and change management?\n2. **CEO lens:** Does this align with our 3-year strategy? Will it give us competitive advantage? Is the transformation story compelling?\n3. **CTO lens:** Is the technical approach feasible? What infrastructure changes are needed? What are the security implications?\n\nList the single biggest weakness each executive would identify. Then produce Version 2 that survives all three critiques while staying concise enough for a 5-minute slot."

[[exercises]]
technique_id = "iterative-refinement"
id = "iter-3"
title = "Policy Document"
difficulty = 3
scenario = "You're writing an AI acceptable use policy that needs approval from Legal, HR, IT, and the CEO."
starter_prompt = "Write an AI acceptable use policy."
task = "Apply Iterative Refinement with 4 stakeholder perspectives to produce a policy everyone can approve."
hints = ["Each stakeholder has different concerns and language preferences", "Legal wants risk coverage, HR wants fairness, IT wants enforceability, CEO wants brevity", "The final version must balance all four"]
criteria = [
  "Produces initial policy focused on one dimension",
  "Reviews from 4 distinct stakeholder perspectives",
  "Each perspective represents genuine real-world concerns",
  "Final version balances all perspectives without being watered down"
]
keywords = ["version 1,V1,initial,draft", "legal,HR,IT,CEO,stakeholder,perspective,review", "risk,fair,enforce,brief,practical,liability", "version 2,V2,final,balance,address,approve"]
sample_answer = "Write an AI Acceptable Use Policy for our 300-person financial services company (M365 Copilot, ChatGPT Enterprise approved, personal AI use restricted). Version 1 — focus on being comprehensive and covering all scenarios.\n\nNow apply 4 rounds of stakeholder review:\n\nRound 1 — **Legal:** Flag any liability gaps. Are prohibited uses specific enough to be enforceable? Is there a clear safe harbour for good-faith mistakes? Does it address IP ownership of AI-generated content?\n\nRound 2 — **HR:** Is the policy fair and non-discriminatory? Does it account for accessibility needs? Is the language clear to non-technical employees? Are consequences proportionate?\n\nRound 3 — **IT Security:** Can every 'prohibited use' actually be detected and prevented technically? Are the monitoring provisions realistic? Does it align with our DLP and audit capabilities?\n\nRound 4 — **CEO:** Can this be summarised in 3 bullet points for the all-hands? Does it enable innovation or just restrict it? Will employees feel trusted or surveilled?\n\nAfter all 4 rounds, list the conflicting recommendations (there will be some) and produce a Version 2 that makes the best trade-off for each conflict."
