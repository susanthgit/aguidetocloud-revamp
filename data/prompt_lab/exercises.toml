# ── ReAct ────────────────────────────────────────────────────────────────────

[[exercises]]
technique_id = "react"
id = "react-1"
title = "MFA Lockout"
difficulty = 1
scenario = "Multiple users report they're locked out of their accounts after an MFA change was pushed overnight."
starter_prompt = "Users are locked out after MFA changes. Help!"
task = "Restructure this as a ReAct troubleshooting prompt with Think/Act/Observe cycles."
hints = ["Start with the most likely cause", "Each action should be a specific admin check", "Observations should determine the next step"]
criteria = [
  "Uses Think/Act/Observe structure",
  "Each cycle determines the next step",
  "Actions are specific admin portal checks or commands",
  "Continues until root cause is found"
]
keywords = ["think,thought,consider,likely,cause,hypothesis", "act,check,verify,look,run,navigate,action", "observe,result,finding,tells us,indicates,means", "repeat,continue,next,cycle,step,troubleshoot"]
sample_answer = "Multiple users are locked out this morning after we pushed MFA registration changes overnight via Conditional Access. Approximately 30 of 500 users affected, all reporting 'Your sign-in was blocked.'\n\nTroubleshoot this systematically using Think → Act → Observe:\n\n**Think:** What's the most likely cause given the timing and symptoms?\n**Act:** What specific check should I perform first? (Give the exact Entra admin portal path or PowerShell command)\n**Observe:** What would each possible result mean?\n\nContinue the investigation cycle, branching based on findings. Cover: CA policy configuration, MFA registration state, user group membership, and sign-in log error codes. Don't jump to solutions — diagnose first."

[[exercises]]
technique_id = "react"
id = "react-2"
title = "Email Delivery Failure"
difficulty = 2
scenario = "Emails from your domain to a specific partner are bouncing with NDR errors."
starter_prompt = "Our emails to partner.com are bouncing."
task = "Apply ReAct to create a systematic email delivery investigation."
hints = ["Email delivery has many potential failure points", "Each observation should narrow down the cause", "Include both sender-side and receiver-side checks"]
criteria = [
  "Follows Think/Act/Observe pattern",
  "Investigation covers multiple failure points",
  "Each cycle narrows the diagnosis",
  "Includes both internal and external checks"
]
keywords = ["think,thought,consider,likely,hypothesis", "act,check,test,verify,look,command,run", "observe,result,finding,means,indicates,NDR,bounce", "DNS,SPF,DKIM,DMARC,transport,connector,MX"]
sample_answer = "Emails from our M365 tenant (contoso.com) to partner.com are bouncing. NDR error: '550 5.7.1 Message rejected due to policy.' Started 2 days ago, only affects this one partner domain, internal emails work fine.\n\nInvestigate using Think → Act → Observe cycles:\n\n**Think:** Given the error code and symptoms, what are the top 3 possible causes?\n**Act:** For the most likely cause, what specific diagnostic check should I run? (PowerShell command, message trace, DNS lookup, or admin portal check)\n**Observe:** What would each possible result tell us?\n\nContinue cycling through: our SPF/DKIM/DMARC records, Exchange transport rules, connector configuration, message trace results, and potential recipient-side blocks. Each observation should determine the next check."

[[exercises]]
technique_id = "react"
id = "react-3"
title = "Performance Investigation"
difficulty = 3
scenario = "SharePoint Online is slow for your entire organisation. No Microsoft service health alerts. Users complain pages take 10+ seconds to load."
starter_prompt = "SharePoint is slow for everyone. What's wrong?"
task = "Build a comprehensive ReAct investigation covering network, tenant, client, and content layers."
hints = ["Performance issues can be network, client, tenant, or content-related", "Include specific diagnostic tools and metrics", "Branch the investigation based on findings"]
criteria = [
  "Systematic Think/Act/Observe across multiple layers",
  "Covers network, client, tenant, and content dimensions",
  "Uses specific diagnostic tools and metrics",
  "Investigation branches based on intermediate findings"
]
keywords = ["think,thought,consider,hypothesis,layer,possible", "act,check,test,measure,diagnose,run,tool", "observe,result,metric,latency,finding,indicates", "network,client,tenant,content,browser,DNS,CDN"]
sample_answer = "SharePoint Online is slow for our entire 400-person organisation. Pages take 10+ seconds to load. No Microsoft service health advisories. Started gradually over the past week. Affects all browsers and devices.\n\nConduct a systematic performance investigation using Think → Act → Observe, covering all possible layers:\n\nStart with Layer 1 (Network): DNS resolution, proxy/firewall inspection, M365 connectivity test results\nThen Layer 2 (Client): Browser dev tools network waterfall, client-side caching state\nThen Layer 3 (Tenant): Large lists, custom solutions, storage quotas\nThen Layer 4 (Content): Page complexity, web parts, embedded content\n\nFor each Think → Act → Observe cycle:\n- **Think:** Given what we know so far, what's the most likely cause at this layer?\n- **Act:** What specific diagnostic should I run? (Exact tool, command, or browser action)\n- **Observe:** What metric or result would confirm or rule out this cause? What's the threshold for 'normal'?\n\nBranch your investigation based on findings — don't follow a fixed script."

# ── Iterative Refinement ─────────────────────────────────────────────────────

[[exercises]]
