# ═══════════════════════════════════════════════════════════════════════════
# PLANETS MANIFEST — Cosmos Single Source of Truth
# ═══════════════════════════════════════════════════════════════════════════
#
# Lists every "planet" (subdomain or sibling product) in the A Guide to Cloud
# universe. Consumed by:
#   - layouts/partials/nav.html → renders Earth's planet rail (right side)
#   - layouts/partials/planet-icon.html → renders the SVG for a given planet
#   - layouts/index.html → newsletter form submit URL
#
# Mirrored at: guided/src/data/planets.json (Astro Moon)
#               shift/src/data/planets.json (Phase 2)
#               plainai/content/planets.json (Phase 2)
#               brainbar/data/planets.toml (Phase 2)
#
# DATA-SHAPED CONTRACT — per Cosmos Philosophy 4 May 2026:
# Each planet renders THIS list in its OWN visual register (icons, text pills,
# ASCII chips, gradient cards — whatever fits its atmosphere). The manifest
# itself has NO visual fields. Only: slug, name, url, tagline.
#
# WHEN ADDING A NEW PLANET:
#   1. Add entry here with all 4 fields
#   2. Mirror the entry in every other planet's manifest file (paths above)
#   3. Each planet's nav code filters out itself from this list
#   4. Bump cache_version in hugo.toml
#
# WHEN CHANGING THE NEWSLETTER PLATFORM (Beehiiv → Buttondown / something else):
#   1. Update [cosmos] newsletter_url here
#   2. Mirror the change in every other planet's manifest in the same commit
#   3. No code changes needed — every planet's signup form reads this field
#
# ═══════════════════════════════════════════════════════════════════════════

[cosmos]
# Single newsletter for the whole universe. Update this field across all 5
# manifests when switching platforms — every signup form on every planet
# reads this value, so one update propagates everywhere.
newsletter_url    = "https://guided-weekly.beehiiv.com/subscribe"
newsletter_label  = "A Guide to Cloud Newsletter"
newsletter_pitch  = "Cloud & AI insights, every Sunday — in 2 minutes. Free."
# Cross-planet feedback link (also vendored consistently).
feedback_url      = "https://www.aguidetocloud.com/about/"
parent_site       = "https://www.aguidetocloud.com/"

[[planets]]
slug    = "earth"
name    = "A Guide to Cloud"
url     = "https://www.aguidetocloud.com/"
tagline = "the home — certs, tools, mind maps"

[[planets]]
slug    = "brainbar"
name    = "Brain Bar"
url     = "https://cmd.aguidetocloud.com/"
tagline = "Microsoft jargon decoder"

[[planets]]
slug    = "shift"
name    = "Shift"
url     = "https://shift.aguidetocloud.com/"
tagline = "the AI job-change wire"

[[planets]]
slug    = "plainai"
name    = "Plain AI"
url     = "https://plainai.aguidetocloud.com/"
tagline = "museum of AI, in plain English"
