# ============================================================================
# TOOL COLOUR REGISTRY — Single Source of Truth
# ============================================================================
# 🔴 MANDATORY: Before adding a new tool, check this file!
#
# RULES:
# 1. Every tool MUST have a unique accent colour
# 2. New colours must be ≥30° hue distance from ALL existing colours
# 3. Within the same CATEGORY, colours must be ≥45° hue distance
# 4. Avoid pure red (hue 0°) — reserved for Deprecation Timeline (urgency)
# 5. Avoid pure cyan (hue 180°) — reserved for global site accents
# 6. Update this file BEFORE writing any CSS for a new tool
# 7. After adding, bump cache_version in hugo.toml
#
# HOW TO CHECK:
#   - Convert your candidate hex to HSL (use any online tool)
#   - Compare the hue (H) value against ALL entries below
#   - Ensure ≥30° gap from every other tool, ≥45° within same category
#   - If too close, pick a different shade
#
# AVAILABLE HUE GAPS (as of 2026-04-13):
#   95°–140° (yellow-green, between Prompt Guide 84° and PS Builder 142°)
#   ~105° specifically is wide open
#
# ============================================================================

