name = "Australia"
openai_processing = "Australia (Azure AU regions)"
anthropic_processing = "US"
eu_data_boundary = false
anthropic_default = "enabled"
notes = "OpenAI processing stays in AU. Anthropic processing occurs in US."

[[regions]]
id = "ca"
name = "Canada"
openai_processing = "Canada (Azure CA regions)"
anthropic_processing = "US"
eu_data_boundary = false
anthropic_default = "enabled"
notes = "OpenAI processing stays in CA. Anthropic processing occurs in US."

[[regions]]
id = "jp"
name = "Japan"
openai_processing = "Japan (Azure JP regions)"
anthropic_processing = "US"
eu_data_boundary = false
anthropic_default = "enabled"
notes = "OpenAI processing stays in JP. Anthropic processing occurs in US."

[[regions]]
id = "in"
name = "India"
openai_processing = "India (Azure IN regions)"
anthropic_processing = "US"
eu_data_boundary = false
anthropic_default = "enabled"
notes = "OpenAI processing stays in IN. Anthropic processing occurs in US."

[[regions]]
id = "nz"
name = "New Zealand"
openai_processing = "Australia (nearest Azure region)"
anthropic_processing = "US"
eu_data_boundary = false
anthropic_default = "enabled"
notes = "NZ tenants use AU Azure regions for OpenAI. Anthropic in US."

# ─────────────────────────────────────────────
# SCENARIO RISK RATINGS
# ─────────────────────────────────────────────
[risk_ratings]
email-summary = { level = "low", reason = "All data stays inside Microsoft 365 boundary. Standard Graph permissions apply." }
web-search = { level = "medium", reason = "A derived search query leaves the tenant to Bing. No tenant data is sent, but query content could be sensitive." }
claude-agent = { level = "medium", reason = "Data crosses to Anthropic sub-processor. Still under Microsoft DPA, but leaves the Microsoft boundary." }
word-draft = { level = "low", reason = "All data stays inside Microsoft 365 boundary. Document permissions and sensitivity labels apply." }
researcher = { level = "medium", reason = "Multi-model: data goes to both Azure OpenAI and Anthropic. Web search also used. Multiple external touchpoints." }

# ─────────────────────────────────────────────
# GRAPH DATA ACCESS (What Can Copilot See?)
# ─────────────────────────────────────────────
[[graph_access]]
id = "files"
name = "Files & Documents"
icon = "📄"
description = "OneDrive files, SharePoint documents, shared files — anything you have access to"
how_to_restrict = "Review SharePoint site permissions, remove 'Everyone except external users' access, use sensitivity labels with encryption"
risk = "High risk of oversharing if permissions are too broad"

[[graph_access]]
id = "emails"
name = "Emails"
icon = "📧"
description = "Your Outlook inbox, sent items, and shared mailboxes you have access to"
how_to_restrict = "Mailbox permissions, delegate access reviews, DLP policies on email content"
risk = "Low — typically limited to user's own mailbox"

[[graph_access]]
id = "chats"
name = "Teams Chats & Channels"
icon = "💬"
description = "Teams messages, channel conversations, meeting chats you participated in"
how_to_restrict = "Teams channel permissions, private channel access, information barriers"
risk = "Medium — channel membership can be broad"

[[graph_access]]
id = "calendar"
name = "Calendar & Meetings"
icon = "📅"
description = "Calendar events, meeting details, attendee lists, meeting transcripts"
how_to_restrict = "Calendar sharing settings, meeting policy controls, transcript retention"
risk = "Low — typically user's own calendar"

[[graph_access]]
id = "people"
name = "People & Org"
icon = "👥"
description = "Org chart, contact info, working relationships, collaboration patterns"
how_to_restrict = "Entra ID visibility settings, address book policies"
risk = "Low — public directory information"
