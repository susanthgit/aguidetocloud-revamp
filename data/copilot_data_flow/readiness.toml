# Copilot Data Flow Map — Readiness Checklist & Data Residency

# ─────────────────────────────────────────────
# SECURITY READINESS CHECKLIST
# ─────────────────────────────────────────────
[[checklist]]
id = "dlp"
name = "Data Loss Prevention configured"
category = "data-protection"
description = "Purview DLP policies inspect Copilot prompts and prevent sensitive data leaks."
doc_url = "https://learn.microsoft.com/en-us/purview/dlp-learn-about-dlp"
priority = "critical"

[[checklist]]
id = "sensitivity-labels"
name = "Sensitivity labels deployed"
category = "data-protection"
description = "Copilot respects encryption and usage rights from sensitivity labels on documents."
doc_url = "https://learn.microsoft.com/en-us/purview/sensitivity-labels"
priority = "critical"

[[checklist]]
id = "conditional-access"
name = "Conditional Access policies set"
category = "identity"
description = "MFA, device compliance, and location restrictions enforce who can access Copilot."
doc_url = "https://learn.microsoft.com/en-us/entra/identity/conditional-access/"
priority = "critical"

[[checklist]]
id = "audit-logging"
name = "Purview Audit logging enabled"
category = "monitoring"
description = "All Copilot prompts, responses, and web searches are logged for compliance review."
doc_url = "https://learn.microsoft.com/en-us/purview/audit-search"
priority = "important"

[[checklist]]
id = "anthropic-decision"
name = "Anthropic sub-processor decision made"
category = "data-protection"
description = "Decide whether to enable Claude models. Disabled by default in EU/UK. Enabling sends data outside Microsoft boundary."
doc_url = "https://learn.microsoft.com/en-us/microsoft-365/copilot/connect-to-ai-subprocessor"
priority = "important"

[[checklist]]
id = "web-search-decision"
name = "Web search grounding configured"
category = "data-protection"
description = "Decide whether Copilot can search the web via Bing. Enable Zero Query Logging if on."
doc_url = "https://learn.microsoft.com/en-us/microsoft-365/copilot/manage-public-web-access"
priority = "important"

[[checklist]]
id = "oversharing-remediated"
name = "SharePoint oversharing reviewed"
category = "data-protection"
description = "Copilot surfaces anything the user can access. Review broad sharing links, site permissions, and 'Everyone except external users' access."
doc_url = "https://learn.microsoft.com/en-us/microsoft-365/copilot/microsoft-365-copilot-privacy"
priority = "critical"

[[checklist]]
id = "permissions-reviewed"
name = "Microsoft Graph permissions audited"
category = "identity"
description = "Review what data each user can access via Graph — Copilot inherits these permissions."
doc_url = "https://learn.microsoft.com/en-us/graph/permissions-overview"
priority = "important"

# ─────────────────────────────────────────────
# DATA RESIDENCY REGIONS
# ─────────────────────────────────────────────
[[regions]]
id = "us"
name = "United States"
openai_processing = "US (Azure regions)"
anthropic_processing = "US"
eu_data_boundary = false
anthropic_default = "enabled"
notes = ""

[[regions]]
id = "eu"
name = "European Union"
openai_processing = "EU (Azure EU regions)"
anthropic_processing = "US (outside EU boundary)"
eu_data_boundary = true
anthropic_default = "disabled"
notes = "Anthropic is excluded from EU Data Boundary. Must explicitly opt-in. Data will leave EU."

[[regions]]
id = "uk"
name = "United Kingdom"
openai_processing = "UK (Azure UK regions)"
anthropic_processing = "US (outside UK boundary)"
eu_data_boundary = false
anthropic_default = "disabled"
notes = "Anthropic disabled by default. Opt-in required."

[[regions]]
