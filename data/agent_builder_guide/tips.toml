# ── Lifecycle — What Changes Over Time ──

[lifecycle]
title = "What Changes Over Time?"
description = "Agents aren't set-and-forget. Here's what to expect after you build one."

[[lifecycle.items]]
question = "How long does indexing take?"
answer = "SharePoint content: several minutes to hours for new sites. Uploaded files: 1-2 minutes (shown as grey until ready). New SharePoint sites may not appear in the picker for hours."
icon = "⏱️"

[[lifecycle.items]]
question = "What happens when source files change?"
answer = "SharePoint: changes are picked up automatically over time (not instant). Uploaded files: you must re-upload the updated version manually."
icon = "🔄"

[[lifecycle.items]]
question = "What happens when the agent creator leaves?"
answer = "The agent continues to work. Other users can still use it. However, only the creator (or an admin) can edit instructions and knowledge sources."
icon = "👤"

[[lifecycle.items]]
question = "Why does it work for me but not my colleague?"
answer = "Most likely a permission issue — your colleague may not have access to the SharePoint files, or they may not have the required licence tier (e.g. email needs M365 Copilot licence)."
icon = "🔐"

[[lifecycle.items]]
question = "How do I update my agent?"
answer = "Open microsoft365.com/chat → find your agent in the left panel → click the three dots → Edit. Changes take effect immediately."
icon = "✏️"

[[lifecycle.items]]
question = "Can multiple people edit the same agent?"
answer = "No — only the creator can edit. To collaborate, copy the agent to Copilot Studio where multiple makers can work together."
icon = "👥"

# ── Symptom-Based Troubleshooting ──

[[symptoms]]
symptom = "Agent gives generic answers"
likely_causes = ["Instructions too vague", "Knowledge sources too broad", "Web search overriding curated knowledge"]
quick_fix = "Add specific tasks to instructions. Enable 'Only use specified sources'. Narrow SharePoint to specific folders."
related_tab = "tips"

[[symptoms]]
symptom = "Agent answers off-topic questions"
likely_causes = ["No boundary instructions", "No fallback text", "General knowledge not restricted"]
quick_fix = "Use CAPS technique: CAPS keywords + exact fallback text + positive redirect."
related_tab = "tips"

[[symptoms]]
symptom = "Agent makes up answers"
likely_causes = ["No 'unknown' handling", "Knowledge sources don't cover the topic", "Instructions say 'be helpful'"]
quick_fix = "Add: 'If you don't know, say so. DO NOT guess.' and provide a fallback message."
related_tab = "tips"

[[symptoms]]
symptom = "Agent can't find my files"
likely_causes = ["Files still indexing", "Restricted SharePoint Search", "Wrong file format", "Permission issue"]
quick_fix = "Wait for 'Preparing' to finish. Check file type. Verify SharePoint access. Check admin settings."
related_tab = "knowledge"

[[symptoms]]
symptom = "I can't share my agent"
likely_causes = ["Free tier (sharing requires paygo/licence)", "Admin disabled sharing", "Sensitivity label blocking users"]
quick_fix = "Check licence tier. Ask admin about sharing settings. Remove files with restrictive labels."
related_tab = "matrix"

[[symptoms]]
symptom = "Colleague can't use my shared agent"
likely_causes = ["They lack the required licence", "They don't have SharePoint access", "Sensitivity label blocks them"]
quick_fix = "Verify they have the right licence tier. Check SharePoint permissions. Review sensitivity labels on embedded files."
related_tab = "matrix"

[[symptoms]]
symptom = "Agent creation fails silently"
likely_causes = ["Uploaded file has user-defined permissions", "File has disabled extract rights", "Double Key Encryption"]
quick_fix = "Remove all uploaded files, then add them back one by one to find the problematic file."
related_tab = "knowledge"

[[symptoms]]
symptom = "I don't see Agent Builder at all"
likely_causes = ["Using mobile (not supported)", "Tenant doesn't have Copilot enabled", "Using wrong app URL"]
quick_fix = "Go to microsoft365.com/chat on desktop or Teams desktop. Ask your admin to verify Copilot is enabled."
related_tab = "tips"
