# ═══════════════════════════════════════════════════════════════
# M365 Agent Builder Guide — Licensing & Capabilities
# ═══════════════════════════════════════════════════════════════

[[tiers]]
id = "free"
name = "Copilot Chat (Free)"
label = "Free"
badge_colour = "#6B7280"
description = "Build agents grounded on public web data only. No access to M365 Graph data."
example = "Personal research assistant, public FAQ bot"
pricing_note = "Included with any M365 licence"

[[tiers]]
id = "paygo"
name = "Copilot Chat + Usage Billing"
label = "Pay-as-you-go"
badge_colour = "#F59E0B"
description = "Build work-grounded agents with metered consumption. Admin enables pay-as-you-go billing — no per-user Copilot licence needed."
example = "Team knowledge bot for small pilot"
pricing_note = "Billed per Copilot credit consumed"

[[tiers]]
id = "paid"
name = "M365 Copilot (Paid Add-on)"
label = "Licensed"
badge_colour = "#10B981"
description = "Full Agent Builder with all knowledge sources, enterprise Graph grounding, sharing, and advanced capabilities."
example = "Project FAQ bot, onboarding assistant, document helper"
pricing_note = "Per-user add-on on M365 E3/E5/E7/Business Standard/Premium"

# ── Capability Matrix ──

[[capabilities]]
id = "web_search"
name = "Web search knowledge"
description = "Ground agents in public web content"
free = true
paygo = true
paid = true

[[capabilities]]
