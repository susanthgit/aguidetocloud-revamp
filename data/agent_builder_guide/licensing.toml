# ═══════════════════════════════════════════════════════════════
# Agent Builder Helper — Licensing, Capabilities & Scenarios
# Updated: 2026-04-18 from Microsoft Learn (knowledge-sources)
# ═══════════════════════════════════════════════════════════════

[[tiers]]
id = "free"
name = "Copilot Chat (Free)"
label = "Free"
badge_colour = "#6B7280"
description = "Build agents grounded on public web data only. Code interpreter and image generation included."
example = "Research assistant, public FAQ bot, data analyst"
pricing_note = "Included with any M365 licence"

[[tiers]]
id = "paygo"
name = "Copilot Chat + Usage Billing"
label = "Pay-as-you-go"
badge_colour = "#F59E0B"
description = "Add SharePoint, file uploads, and connectors. Admin enables pay-as-you-go — no per-user Copilot licence needed. Cannot access email, Teams, or people data."
example = "Team knowledge bot, SharePoint Q&A assistant"
pricing_note = "Billed per Copilot credit consumed"

[[tiers]]
id = "paid"
name = "M365 Copilot (Paid Add-on)"
label = "Licensed"
badge_colour = "#10B981"
description = "Full Agent Builder with ALL knowledge sources including email, Teams chats, meetings, and people data. Enterprise Graph grounding."
example = "Email assistant, meeting prep agent, org-wide knowledge bot"
pricing_note = "Per-user add-on on M365 E3/E5/E7/Business Standard/Premium"

