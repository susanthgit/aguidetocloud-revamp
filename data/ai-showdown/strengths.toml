# AI SaaS Showdown — Strengths, Weaknesses & Capability Scores
# Scores are 1-5 for radar chart: writing, coding, research, creative, enterprise, value

[openai]
strengths = [
  "Most versatile all-rounder — good at everything",
  "Largest plugin and tool ecosystem (custom GPTs, DALL-E, voice)",
  "Strongest brand recognition and community",
  "Excellent multimodal capabilities (text, image, voice, video)",
  "Persistent memory across conversations"
]
weaknesses = [
  "Pro plan is very expensive ($200/mo)",
  "Can be verbose and overly cautious in responses",
  "Enterprise pricing is opaque (custom quotes)",
  "Rate limits can be frustrating on Plus plan",
  "Privacy concerns — data used for training unless opted out"
]
best_for = ["General-purpose AI assistant", "Creative work and image generation", "Teams wanting an all-in-one AI tool"]
watch_out = ["Data training opt-out requires manual action", "Plus plan rate limits tighten during peak hours", "Pro plan is $200/mo — evaluate if you need it"]
scores = { writing = 4, coding = 5, research = 4, creative = 5, enterprise = 4, value = 3 }

