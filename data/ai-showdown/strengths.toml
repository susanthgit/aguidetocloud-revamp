  "Best-in-class writing quality — nuanced, thoughtful, accurate",
  "Industry-leading document analysis (200K–1M context)",
  "Strongest at following complex, multi-step instructions",
  "Excellent for coding (Claude Code is top-rated)",
  "Constitutional AI approach — safety-focused design"
]
weaknesses = [
  "No image generation capabilities",
  "No voice mode or audio features",
  "Smaller plugin/tool ecosystem than ChatGPT",
  "Can be overly cautious (refuses some legitimate requests)",
