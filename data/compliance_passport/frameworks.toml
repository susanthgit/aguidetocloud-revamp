# ============================================================================
# Compliance Passport — 8 frameworks with M365 mappings
# ============================================================================
# Uses "likely/possibly/unlikely" — NOT definitive legal advice.

[[frameworks]]
id = "gdpr"
name = "GDPR"
full_name = "General Data Protection Regulation"
region = "EU/EEA"
description = "Governs the processing and protection of personal data of EU residents"
triggers = ["eu_data", "eu_customers", "eu_employees"]
m365_features = ["Purview Data Loss Prevention", "Sensitivity Labels", "Data Subject Requests", "Audit Logs", "Microsoft Priva"]
url = "https://learn.microsoft.com/compliance/regulatory/gdpr"

[[frameworks]]
id = "hipaa"
name = "HIPAA"
full_name = "Health Insurance Portability and Accountability Act"
region = "United States"
description = "Protects sensitive patient health information (PHI)"
triggers = ["healthcare", "us_health_data"]
m365_features = ["Purview DLP", "Sensitivity Labels", "Encryption", "Audit Logs", "BAA with Microsoft"]
url = "https://learn.microsoft.com/compliance/regulatory/offering-hipaa-hitech"

[[frameworks]]
id = "soc2"
name = "SOC 2"
full_name = "System and Organization Controls 2"
region = "Global"
description = "Trust service criteria for service organisations — security, availability, confidentiality"
triggers = ["saas_provider", "customer_audit", "enterprise_sales"]
m365_features = ["Compliance Manager", "Audit Logs", "Conditional Access", "Defender for Cloud Apps"]
url = "https://learn.microsoft.com/compliance/regulatory/offering-soc-2"

[[frameworks]]
id = "iso27001"
name = "ISO 27001"
full_name = "ISO/IEC 27001 Information Security Management"
region = "Global"
description = "International standard for information security management systems (ISMS)"
triggers = ["global_ops", "customer_audit", "isms"]
m365_features = ["Compliance Manager", "Purview", "Defender XDR", "Entra ID Governance", "Audit Logs"]
url = "https://learn.microsoft.com/compliance/regulatory/offering-iso-27001"

[[frameworks]]
id = "nist"
name = "NIST 800-53"
full_name = "NIST Special Publication 800-53"
region = "United States"
description = "Security and privacy controls for federal information systems"
triggers = ["us_government", "us_contractor", "fedramp"]
m365_features = ["Compliance Manager (NIST template)", "Conditional Access", "Defender for Endpoint", "Sentinel"]
url = "https://learn.microsoft.com/compliance/regulatory/offering-nist-800-53"

[[frameworks]]
id = "e8"
name = "Essential Eight"
full_name = "Australian Essential Eight"
region = "Australia/NZ"
description = "ACSC baseline security strategies for Australian organisations"
triggers = ["australia", "nz", "anz_ops"]
m365_features = ["Intune (app control, patching)", "Entra MFA", "Defender for Endpoint", "Purview DLP"]
url = "https://learn.microsoft.com/compliance/regulatory/offering-australian-essential-eight"

[[frameworks]]
id = "pci"
name = "PCI-DSS"
full_name = "Payment Card Industry Data Security Standard"
region = "Global"
description = "Security standard for organisations that handle credit card information"
triggers = ["payment_processing", "credit_cards", "ecommerce"]
m365_features = ["Purview DLP (credit card detection)", "Encryption", "Audit Logs", "Network Segmentation"]
url = "https://learn.microsoft.com/compliance/regulatory/offering-pci-dss"

[[frameworks]]
id = "ccpa"
name = "CCPA/CPRA"
full_name = "California Consumer Privacy Act / California Privacy Rights Act"
region = "California, US"
description = "Consumer privacy rights for California residents"
triggers = ["california_customers", "us_consumer_data"]
m365_features = ["Microsoft Priva", "Data Subject Requests", "Purview Data Map", "Retention Policies"]
url = "https://learn.microsoft.com/compliance/regulatory/offering-ccpa"

# ── Quiz questions ────────────────────────────────────────────────────────

[[questions]]
id = "q1"
text = "Where are most of your employees physically located?"
options = [
  { value = "eu", label = "EU/EEA countries", triggers = ["eu_data", "eu_employees"] },
  { value = "us", label = "United States", triggers = ["us_government"] },
  { value = "anz", label = "Australia or New Zealand", triggers = ["australia", "nz", "anz_ops"] },
  { value = "global", label = "Multiple regions / Global", triggers = ["global_ops"] },
  { value = "other", label = "Other", triggers = [] }
]

[[questions]]
id = "q2"
text = "Do you have customers or users in the European Union?"
options = [
  { value = "yes", label = "Yes", triggers = ["eu_data", "eu_customers"] },
  { value = "no", label = "No", triggers = [] },
  { value = "unsure", label = "Not sure", triggers = ["eu_data"] }
]

[[questions]]
id = "q3"
text = "Does your organisation handle health or medical data?"
options = [
  { value = "yes", label = "Yes — patient records, clinical data", triggers = ["healthcare", "us_health_data"] },
  { value = "some", label = "Some — employee health plans, wellness", triggers = ["us_health_data"] },
  { value = "no", label = "No", triggers = [] }
]

[[questions]]
id = "q4"
text = "Do you process credit card payments or store cardholder data?"
options = [
  { value = "yes", label = "Yes", triggers = ["payment_processing", "credit_cards"] },
  { value = "third-party", label = "Third-party processor only", triggers = [] },
  { value = "no", label = "No", triggers = [] }
]

[[questions]]
id = "q5"
text = "Do you sell software/services to other businesses (B2B SaaS)?"
options = [
  { value = "yes", label = "Yes — customers request compliance reports", triggers = ["saas_provider", "customer_audit"] },
  { value = "sometimes", label = "Sometimes — larger customers ask", triggers = ["customer_audit"] },
  { value = "no", label = "No — internal use only", triggers = [] }
]

[[questions]]
id = "q6"
text = "Do you work with US government agencies or as a government contractor?"
options = [
  { value = "yes", label = "Yes", triggers = ["us_government", "us_contractor", "fedramp"] },
  { value = "no", label = "No", triggers = [] }
]

[[questions]]
id = "q7"
text = "Do you have customers in California?"
options = [
  { value = "yes", label = "Yes — we collect their personal data", triggers = ["california_customers", "us_consumer_data"] },
  { value = "no", label = "No or minimal", triggers = [] }
]

[[questions]]
id = "q8"
text = "Does your organisation operate an Information Security Management System (ISMS)?"
options = [
  { value = "yes", label = "Yes — formal ISMS in place", triggers = ["isms", "global_ops"] },
  { value = "planning", label = "Planning to implement one", triggers = ["isms"] },
  { value = "no", label = "No", triggers = [] }
]
