# M365 Migration Planner — Tool Recommendations

# --- Native Microsoft Tools ---

[[tools]]
id = "cross-tenant-mrs"
name = "Cross-Tenant Mailbox Migration (MRS)"
vendor = "Microsoft"
type = "native"
workloads = ["exchange"]
cost_model = "Free (included with M365)"
cost_per_user = 0
best_for = "Tenant-to-tenant Exchange mailbox migration"
scenarios = ["tenant-tenant"]
pros = [
  "Free — included with Microsoft 365",
  "Native integration with Exchange Online",
  "Supports incremental sync before cutover",
  "Microsoft-supported and maintained"
]
cons = [
  "Tenant-to-tenant only (not for on-prem)",
  "Requires organisation relationship setup",
  "Currently in preview for some features",
  "No chat or Teams data migration"
]
url = "https://learn.microsoft.com/microsoft-365/enterprise/cross-tenant-mailbox-migration"
org_size = "any"

