# ─────────────────────────────────────────────
# MULTI-MODEL PATTERNS
# ─────────────────────────────────────────────

[patterns]

  [patterns.critique]
  name = "Critique Mode"
  description = "One model drafts, another independently reviews for accuracy and completeness."
  how_it_works = "GPT generates the initial response → Claude reviews it for factual accuracy, citation quality, and completeness → The reviewed version is delivered to the user."
  features_using = ["researcher"]
  benefit = "Catches errors that a single model would miss. Similar to peer review in academic publishing."

  [patterns.council]
  name = "Council Mode"
  description = "Multiple models receive the same prompt in parallel, and a judge model selects or synthesises the best response."
  how_it_works = "Both GPT and Claude process the prompt simultaneously → A judge evaluates both outputs → The best response (or a synthesis) is presented to the user."
  features_using = ["researcher"]
  benefit = "Higher quality through diversity of reasoning approaches. Reduces single-model bias."

  [patterns.auto-routing]
  name = "Auto-Routing"
  description = "Copilot automatically selects the best model based on task complexity, latency requirements, and context."
  how_it_works = "Copilot's orchestration layer analyses each prompt → Routes to the most appropriate model based on complexity, speed needs, and context length → User sees a seamless experience."
  features_using = ["copilot-app", "bizchat", "copilot-word", "copilot-excel", "copilot-powerpoint", "copilot-outlook", "copilot-teams", "agent-mode", "copilot-pages"]
  benefit = "Optimises cost and speed without user intervention. Simple queries get fast, cheap responses; complex ones get powerful models."

  [patterns.fallback]
  name = "Fallback"
  description = "A lightweight model handles simple tasks, with escalation to more capable models when needed."
  how_it_works = "Simple queries (classification, quick lookups) → Phi-4 or GPT-5.3 → If the task needs deeper reasoning, escalates to GPT-5.4 or Claude."
  features_using = ["bizchat", "copilot-outlook", "copilot-teams"]
  benefit = "Reduces cost and latency for simple tasks while maintaining quality for complex ones."
