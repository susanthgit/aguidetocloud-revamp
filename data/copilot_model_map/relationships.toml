# Copilot Model Map — Feature ↔ Model Relationships
# Separates the mapping from feature/model definitions for easier updates
# role: primary | secondary | fallback | reviewer | selectable
# routing: auto | fixed | user-selectable
# admin_control: full | limited | none
# source: official | announced | inferred
# last_verified: date of last verification against public sources

# ─────────────────────────────────────────────
# M365 COPILOT APP (standalone app)
# ─────────────────────────────────────────────
[[relationships]]
feature = "copilot-app"
model = "gpt-5-4"
role = "primary"
routing = "auto"
admin_control = "limited"
admin_notes = "The Copilot App uses multi-model auto-routing. Admins can enable/disable Anthropic models at tenant level via M365 admin centre."
source = "official"
last_verified = "2026-04-29"

[[relationships]]
feature = "copilot-app"
model = "gpt-5-3"
role = "secondary"
routing = "auto"
admin_control = "limited"
admin_notes = "Used for simpler queries where full reasoning isn't needed. Routing is automatic."
