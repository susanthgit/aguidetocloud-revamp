# Copilot Model Map — AI Model Definitions
# Each model that powers M365 Copilot features
# Sources: Microsoft official blog, Microsoft Learn, public announcements

[gpt-5-4]
name = "GPT-5.4"
short = "GPT-5.4"
provider = "OpenAI"
type = "flagship"
description = "OpenAI's latest flagship model. Handles complex reasoning, deep analysis, long-form content generation, and multi-step planning."
strengths = ["Deep reasoning", "Complex analysis", "Long-form writing", "Multi-step planning"]
context_window = "1M tokens"
multimodal = true
speed = "medium"
launched = "2026"
