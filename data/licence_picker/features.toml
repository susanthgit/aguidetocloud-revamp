# ============================================
# M365 Licence Picker — Feature Definitions
# Each feature = one toggleable tile in the picker
# Plans reference these IDs in their features arrays
# ============================================
# supersedes: if a plan includes feature X that supersedes Y,
# selecting Y is satisfied by X. Example: entra-p2 supersedes entra-p1.
# ============================================

