# ── Popular quick-select combos ──────────────────

[[combos]]
id = "basic-office"
name = "Basic Office"
description = "Email, Teams, and file storage"
features = ["teams", "sharepoint", "onedrive", "exchange", "web-mobile-apps"]

[[combos]]
id = "e3-essentials"
name = "E3 Essentials"
description = "Desktop apps + basic security"
features = ["teams", "sharepoint", "onedrive", "exchange", "desktop-apps", "entra-p1", "intune-p1", "defender-endpoint-p1"]

[[combos]]
id = "full-security"
name = "Full Security"
description = "All Defender + Identity + Compliance"
features = ["defender-o365-p2", "defender-endpoint-p2", "defender-identity", "defender-cloud-apps", "entra-p2", "insider-risk", "dlp"]

[[combos]]
id = "copilot-ready"
name = "Copilot Ready"
description = "Desktop apps + Copilot"
features = ["teams", "sharepoint", "onedrive", "exchange", "desktop-apps", "m365-copilot"]

[[combos]]
id = "everything"
name = "Everything"
description = "Every feature — the full M365 E7 experience"
features = [
  "teams", "sharepoint", "onedrive", "exchange", "desktop-apps",
  "entra-p2", "intune-p2", "defender-endpoint-p2", "defender-o365-p2",
  "defender-identity", "defender-cloud-apps", "dlp", "information-protection",
  "ediscovery-premium", "insider-risk", "audit-premium",
  "power-bi-pro", "teams-phone", "audio-conferencing",
  "m365-copilot", "windows-enterprise", "autopilot"
]
