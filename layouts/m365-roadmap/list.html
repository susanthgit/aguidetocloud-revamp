{{ define "main" }}
<link rel="alternate" type="application/rss+xml" title="M365 Roadmap Updates" href="/data/roadmap/feed.xml">
<div class="rdmap-hero">
  <h1>M365 Roadmap Tracker</h1>
  <p class="rdmap-hero-sub" id="rdmap-hero-sub">Tracking all M365 Features across 11 Products — AI summarised, updated daily</p>
</div>
<div class="rdmap-container">
  <div class="rdmap-controls" id="rdmap-controls">
    <label for="rdmap-search" class="sr-only">Search roadmap items</label>
    <input type="text" id="rdmap-search" class="rdmap-search" placeholder="Search roadmap items..." autocomplete="off">
    <label for="rdmap-status-filter" class="sr-only">Filter by status</label>
    <select id="rdmap-status-filter" class="rdmap-select">
      <option value="all" selected>All Statuses</option>
      <option value="active">Active Only</option>
      <option value="Rolling out">Rolling Out</option>
      <option value="In development">In Development</option>
      <option value="Launched">Launched</option>
      <option value="Cancelled">Cancelled</option>
    </select>
    <label for="rdmap-product-filter" class="sr-only">Filter by product</label>
    <select id="rdmap-product-filter" class="rdmap-select">
      <option value="all">All Products</option>
    </select>
  </div>

  <div class="rdmap-chips" id="rdmap-chips" role="group" aria-label="Product filters"></div>

  <h2 class="sr-only">Roadmap Items</h2>
  <div class="rdmap-content" id="rdmap-content" aria-live="polite">
    <div class="rdmap-skeleton"><div class="rdmap-skeleton-row"></div><div class="rdmap-skeleton-row"></div><div class="rdmap-skeleton-row"></div><div class="rdmap-skeleton-row"></div></div>
  </div>

  <div class="rdmap-footer">
    <div class="rdmap-footer-links">
      <a href="/data/roadmap/feed.xml" target="_blank" rel="noopener">RSS Feed</a>
      <button class="rdmap-footer-btn" id="rdmap-csv">Download CSV</button>
      <a href="https://www.microsoft.com/en-us/microsoft-365/roadmap" target="_blank" rel="noopener">Official Roadmap</a>
    </div>
    <div class="rdmap-browse" id="rdmap-browse"></div>
    <div class="rdmap-freshness" id="rdmap-freshness"></div>
  </div>
</div>

<button class="rdmap-btt" id="rdmap-btt" aria-label="Back to top">&#8593;</button>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "M365 Roadmap Tracker",
  "url": "https://www.aguidetocloud.com/m365-roadmap/",
  "description": "Track every Microsoft 365 feature change with AI summaries, change detection, and smart filtering. Updated daily from the official Microsoft 365 Roadmap.",
  "applicationCategory": "BusinessApplication",
  "operatingSystem": "Any",
  "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
  "author": { "@type": "Person", "name": "Susanth Sutheesh", "url": "https://www.aguidetocloud.com/about/" },
  "publisher": { "@type": "Organization", "name": "A Guide to Cloud & AI", "url": "https://www.aguidetocloud.com" },
  "datePublished": "2026-04-10",
  "keywords": ["Microsoft 365 roadmap", "M365 updates", "Copilot roadmap", "Teams new features"]
}
</script>
<script src="/js/roadmap.js?v={{ now.Unix }}"></script>
{{ end }}
