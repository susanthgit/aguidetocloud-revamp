{{ define "main" }}
<meta name="theme-color" content="#0891B2">
<div class="rdmap-hero">
  <div class="rdmap-hero-inner">
    <div class="rdmap-hero-text">
      <h1>📋 M365 Roadmap Tracker</h1>
      <p>Every Microsoft 365 feature change — AI-summarised, tracked daily</p>
    </div>
    <!-- Live status distribution bar (populated by JS) -->
    <div class="rdmap-status-bar" id="rdmap-status-bar"></div>
  </div>
</div>
<div class="rdmap-container">
  <!-- Dashboard metrics row -->
  <div class="rdmap-metrics" id="rdmap-metrics"></div>

  <!-- Controls row: tabs + view toggle + search -->
  <div class="rdmap-toolbar">
    <div class="rdmap-tabs">
      <button class="rdmap-tab active" data-view="latest">Latest</button>
      <button class="rdmap-tab" data-view="weekly">This Week</button>
      <button class="rdmap-tab" data-view="monthly">This Month</button>
    </div>
    <div class="rdmap-view-toggle">
      <button class="rdmap-view-btn active" data-layout="list" title="List view">☰</button>
      <button class="rdmap-view-btn" data-layout="cards" title="Card view">▦</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="rdmap-filters">
    <input type="text" id="rdmap-search" class="rdmap-search" placeholder="Search 1,800+ roadmap items..." autocomplete="off">
    <select id="rdmap-status-filter" class="rdmap-select">
      <option value="active" selected>⚡ Active Only</option>
      <option value="all">All Statuses</option>
      <option value="Rolling out">🔵 Rolling Out</option>
      <option value="In development">🟡 In Development</option>
      <option value="Launched">🟢 Launched</option>
      <option value="Cancelled">🔴 Cancelled</option>
    </select>
    <select id="rdmap-product-filter" class="rdmap-select">
      <option value="all">All Products</option>
    </select>
  </div>

  <!-- Product category chips -->
  <div class="rdmap-chips" id="rdmap-chips"></div>

  <!-- GA Timeline bar (unique to roadmap!) -->
  <div class="rdmap-timeline" id="rdmap-timeline"></div>

  <!-- Main content area -->
  <div class="rdmap-content" id="rdmap-content">
    <div class="rdmap-skeleton"><div class="rdmap-skeleton-row"></div><div class="rdmap-skeleton-row"></div><div class="rdmap-skeleton-row"></div><div class="rdmap-skeleton-row"></div><div class="rdmap-skeleton-row"></div></div>
  </div>

  <!-- Source attribution -->
  <div class="rdmap-source">
    <span>📡 Data from the <a href="https://www.microsoft.com/en-us/microsoft-365/roadmap" target="_blank" rel="noopener">official Microsoft 365 Roadmap</a></span>
    <span class="rdmap-freshness" id="rdmap-freshness"></span>
  </div>
</div>
<script src="/js/roadmap.js?v={{ now.Unix }}"></script>
{{ end }}
