{{ define "main" }}
<div class="page-hero">
  <h1>{{ .Title }}</h1>
  <p>{{ .Description }}</p>
</div>
<div class="container">
  <div class="blog-filter-bar">
    <input type="text" id="blog-search" class="blog-search-sm" placeholder="🔍 Search..." autocomplete="off">
    <span class="blog-count">{{ len .Pages }} articles</span>
  </div>

  <div class="blog-cards" id="blog-list">
    {{ range .Pages.ByDate.Reverse }}
    <a href="{{ .RelPermalink }}" class="blog-mini">
      {{ if .Params.card_tag }}<span class="blog-mini-tag {{ .Params.tag_class }}">{{ .Params.card_tag }}</span>{{ end }}
      <h3>{{ .Title }}</h3>
      <span class="blog-mini-meta">{{ .Date.Format "Jan 2006" }} · {{ .ReadingTime }} min</span>
    </a>
    {{ end }}
  </div>
</div>

<script>
document.getElementById('blog-search').addEventListener('input', function() {
  var q = this.value.toLowerCase();
  document.querySelectorAll('.blog-mini').forEach(function(el) {
    el.style.display = (!q || el.textContent.toLowerCase().indexOf(q) !== -1) ? '' : 'none';
  });
});
</script>
{{ end }}
