{{ define "main" }}
<link rel="stylesheet" href="/css/ainews.css?v={{ site.Params.cache_version }}">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#6264A7">

<!-- JSON-LD Structured Data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "CollectionPage",
  "name": {{ .Title | jsonify }},
  "description": {{ .Description | jsonify }},
  "url": "{{ .Permalink }}",
  "isPartOf": {
    "@type": "WebPage",
    "name": "AI News",
    "url": "{{ .Site.BaseURL }}ai-news/"
  },
  "breadcrumb": {
    "@type": "BreadcrumbList",
    "itemListElement": [
      {"@type": "ListItem", "position": 1, "name": "Home", "item": "{{ .Site.BaseURL }}"},
      {"@type": "ListItem", "position": 2, "name": "AI News", "item": "{{ .Site.BaseURL }}ai-news/"},
      {"@type": "ListItem", "position": 3, "name": {{ .Title | jsonify }}}
    ]
  },
  "publisher": {
    "@type": "Organization",
    "name": "A Guide to Cloud & AI",
    "url": "{{ .Site.BaseURL }}"
  }
}
</script>

{{ partial "tool-hero.html" (dict "title" .Title "subtitle" .Description "accent" "#ff66ff") }}
<div class="container">
  <!-- SEO intro text (visible to search engines) -->
  <div style="grid-column:1/-1; padding: 0.8rem 0 0.5rem; color: var(--text-muted); font-size: 0.85rem; max-width: 800px; line-height: 1.6;">
    {{ .Content }}
  </div>

  <div class="ainews-grid" id="news-grid">
    <div class="ainews-skeleton-wrap" style="grid-column:1/-1">
      <div class="ainews-skeleton-card"></div>
      <div class="ainews-skeleton-card"></div>
      <div class="ainews-skeleton-card"></div>
    </div>
  </div>

  {{ partial "back-nav" (dict "Page" . "URL" "/ai-news/" "Label" "AI News") }}
</div>
<script>
  window.__ainewsCategoryFilter = "{{ .Params.category_filter }}";
</script>
<script src="/js/ainews.js?v={{ site.Params.cache_version }}"></script>
{{ end }}
