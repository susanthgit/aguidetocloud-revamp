{{/* Tool Hero — Shared hero section for all Cloud & AI Toolkit tools
     Usage: {{ partial "tool-hero.html" (dict "title" "AI News" "subtitle" "..." "accent" "#00e5ff") }}
     All tools get the same structure, just different accent color.
*/}}
<div class="tool-hero" style="--hero-accent: {{ .accent }}">
  <div class="tool-hero-inner">
    <h1 class="tool-hero-title">{{ .title }}</h1>
    {{ with .subtitle }}<p class="tool-hero-subtitle">{{ . }}</p>{{ end }}
  </div>
</div>
