{{ if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ .Site.Title }}",
  "url": "{{ .Site.BaseURL }}",
  "description": "{{ .Site.Params.description }}",
  "author": {
    "@type": "Person",
    "name": "{{ .Site.Params.author }}"
  }
}
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "{{ .Site.Title }}",
  "url": "{{ .Site.BaseURL }}",
  "logo": "{{ .Site.BaseURL }}images/og-default.jpg",
  "sameAs": [
    "{{ .Site.Params.youtube_channel }}",
    "{{ .Site.Params.linkedin }}",
    "{{ .Site.Params.github }}"
  ]
}
</script>
{{ else if .Params.youtube_id }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "VideoObject",
  "name": "{{ .Title }}",
  "description": "{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}",
  "thumbnailUrl": "https://img.youtube.com/vi/{{ .Params.youtube_id }}/maxresdefault.jpg",
  "uploadDate": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
  "embedUrl":"https://www.youtube-nocookie.com/embed/{{ .Params.youtube_id }}",
  "contentUrl": "https://www.youtube.com/watch?v={{ .Params.youtube_id }}"
}
</script>
{{ end }}
{{ if and .IsPage (eq .Section "blog") }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": "{{ .Title }}",
  "description": "{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}",
  "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
  "dateModified": "{{ with .Params.lastmod }}{{ (time .).Format "2006-01-02T15:04:05Z07:00" }}{{ else }}{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}{{ end }}",
  "author": {
    "@type": "Person",
    "name": "{{ .Site.Params.author }}",
    "url": "{{ .Site.BaseURL }}about/"
  },
  "publisher": {
    "@type": "Organization",
    "name": "{{ .Site.Title }}",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ .Site.BaseURL }}images/og-default.jpg"
    }
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  },
  {{ if .Params.youtube_id }}"image": "https://img.youtube.com/vi/{{ .Params.youtube_id }}/maxresdefault.jpg"{{ else if .Params.images }}"image": "{{ .Site.BaseURL }}{{ index .Params.images 0 | strings.TrimPrefix "/" }}"{{ else }}"image": "{{ .Site.BaseURL }}images/og-default.jpg"{{ end }},
  "wordCount": "{{ .WordCount }}"
}
</script>
{{ end }}
{{ if .Params.faq }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {{ range $i, $item := .Params.faq }}{{ if $i }},{{ end }}
    {
      "@type": "Question",
      "name": "{{ .question }}",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "{{ .answer }}"
      }
    }{{ end }}
  ]
}
</script>
{{ end }}
{{ if eq .RelPermalink "/about/" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "Susanth Sutheesh",
  "jobTitle": "Sr AI Solution Engineer",
  "worksFor": {
    "@type": "Organization",
    "name": "Microsoft"
  },
  "url": "https://www.aguidetocloud.com/about/",
  "image": "https://www.aguidetocloud.com/images/about/headshot.webp",
  "description": "Sr AI Solution Engineer at Microsoft New Zealand. Creator of A Guide to Cloud & AI — free YouTube tutorials on Microsoft 365 Copilot, Azure, AI Agents, and cloud certifications.",
  "sameAs": [
    "https://www.linkedin.com/in/susanthsutheesh/",
    "https://www.youtube.com/susanthsutheesh",
    "https://www.youtube.com/aguidetocloud",
    "https://github.com/susanthgit"
  ],
  "knowsAbout": ["Microsoft 365 Copilot", "Azure", "AI Agents", "Copilot Studio", "Microsoft Intune", "Cloud Architecture", "Yoga"],
  "alumniOf": {
    "@type": "CollegeOrUniversity",
    "name": "Anna University Chennai"
  },
  "nationality": "New Zealand",
  "address": {
    "@type": "PostalAddress",
    "addressLocality": "Auckland",
    "addressCountry": "NZ"
  }
}
</script>
{{ end }}
{{ if not .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ .Site.BaseURL }}"
    }{{ if and .Parent (not .Parent.IsHome) }},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ .Parent.Title }}",
      "item": "{{ .Parent.Permalink }}"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": "{{ .Title }}"
    }{{ else }},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ .Title }}"
    }{{ end }}
  ]
}
</script>
{{ end }}
