{{ define "main" }}
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#6264A7">
<div class="page-hero ainews-page-hero">
  <h1>{{ .Title }}</h1>
</div>
<div class="container">
  <div class="ainews-tabs">
    <button class="ainews-tab active" data-view="daily">📅 Today</button>
    <button class="ainews-tab" data-view="weekly">📊 This Week</button>
    <button class="ainews-tab" data-view="monthly">📈 This Month</button>
  </div>

  <div class="ainews-grid" id="news-grid">
    <div class="ainews-skeleton-wrap" style="grid-column:1/-1">
      <div class="ainews-skeleton-card"></div>
      <div class="ainews-skeleton-card"></div>
      <div class="ainews-skeleton-card"></div>
      <div class="ainews-skeleton-card"></div>
      <div class="ainews-skeleton-card"></div>
      <div class="ainews-skeleton-card"></div>
    </div>
  </div>
</div>
<button class="ainews-btt" id="ainews-btt" title="Back to top" aria-label="Back to top">&#8593;</button>
<script src="/js/ainews.js?v={{ now.Unix }}"></script>
{{ end }}
