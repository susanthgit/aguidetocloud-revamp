{{ define "main" }}
<link rel="stylesheet" href="/css/ainews.css?v={{ site.Params.cache_version }}">
<link rel="manifest" href="/manifest.json">
<link rel="alternate" type="application/rss+xml" title="AI News — A Guide to Cloud & AI" href="/data/ainews/feed.xml">
<meta name="theme-color" content="#6264A7">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "CollectionPage",
  "name": "{{ .Title }}",
  "description": "{{ .Description }}",
  "url": "{{ .Permalink }}",
  "publisher": { "@type": "Organization", "name": "A Guide to Cloud & AI", "url": "{{ .Site.BaseURL }}" },
  "breadcrumb": {
    "@type": "BreadcrumbList",
    "itemListElement": [
      {"@type": "ListItem", "position": 1, "name": "Home", "item": "{{ .Site.BaseURL }}"},
      {"@type": "ListItem", "position": 2, "name": "{{ .Title }}"}
    ]
  }
}
</script>
<div class="page-hero ainews-page-hero">
  <h1>{{ .Title }}</h1>
</div>
<div class="container">
  <div class="ainews-tabs" role="tablist" aria-label="Time period">
    <button class="ainews-tab active" data-view="daily" role="tab" aria-selected="true">📅 Today</button>
    <button class="ainews-tab" data-view="monthly" role="tab" aria-selected="false">📈 This Month</button>
  </div>

  <div class="ainews-grid" id="news-grid">
    <div class="ainews-skeleton-wrap" style="grid-column:1/-1">
      <div class="ainews-skeleton-card"></div>
      <div class="ainews-skeleton-card"></div>
      <div class="ainews-skeleton-card"></div>
      <div class="ainews-skeleton-card"></div>
      <div class="ainews-skeleton-card"></div>
      <div class="ainews-skeleton-card"></div>
    </div>
  </div>

  <div class="ainews-footer">
    <a href="/data/ainews/feed.xml" target="_blank" rel="noopener">📡 RSS Feed</a>
    <button id="ainews-csv" class="ainews-footer-btn">📥 Download CSV</button>
  </div>
</div>
<button class="ainews-btt" id="ainews-btt" title="Back to top" aria-label="Back to top">&#8593;</button>
<script>
window.__ainewsCategoryConfig = {
  {{ range $key, $val := hugo.Data.ainews_categories }}
  {{ $val.name | jsonify }}: { emoji: {{ $val.emoji | jsonify }}, color: {{ $val.color | jsonify }} },
  {{ end }}
};
</script>
<script src="/js/ainews.js?v={{ site.Params.cache_version }}"></script>
{{ end }}
