{{ define "main" }}
<div class="page-hero ainews-hero-banner">
  <img src="/images/ainews-banner.webp" alt="AI News Banner" class="ainews-banner-img" loading="eager">
  <div class="ainews-hero-overlay">
    <h1>{{ .Title }}</h1>
    <p>{{ .Description }}</p>
  </div>
</div>
<div class="container">
  <div class="ainews-tabs">
    <button class="ainews-tab active" data-view="daily">📅 Today</button>
    <button class="ainews-tab" data-view="weekly">📊 This Week</button>
    <button class="ainews-tab" data-view="monthly">📈 This Month</button>
  </div>

  <div class="ainews-header">
    <p class="ainews-date" id="news-date">Loading...</p>
    <p class="ainews-stats" id="news-stats"></p>
  </div>

  <div class="ainews-categories" id="category-filters">
  </div>

  <div class="ainews-grid" id="news-grid">
    <p class="ainews-loading">Loading AI news...</p>
  </div>
</div>
<script src="/js/ainews.js"></script>
{{ end }}
