name: 🧪 Post-Deploy Smoke Test

# Runs after every push to main. Cloudflare Pages auto-deploys from main, so we
# wait ~3 min then hit production with the SLA smoke tests + a click-flow check.
# This catches the class of bugs that 30 Apr / 1 May / 3 May incidents shared:
# all 3 SLA curl checks were green AT BUILD TIME but click-flow was broken on prod.

on:
  schedule:
    # Every 30 minutes — catches regressions within 30 min of any deploy.
    # Original trigger was 'on: push: branches: [main]' in susanthgit/guided
    # which fired after each guided commit (since CF Pages auto-deploys from guided).
    # Migrated to aguidetocloud-revamp on 2026-05-26 — guided's main branch is
    # no longer in this repo, so we use a schedule instead.
    - cron: '*/30 * * * *'
  workflow_dispatch:

env:
  PROD_URL: https://www.aguidetocloud.com
  # Paid canary cert for checkout + unlock-button assertions. MUST stay a PAID
  # cert (i.e. NOT in guided/src/lib/access.ts FREE_CERTS). If it ever becomes
  # free, these checks will false-alarm — switch to another paid cert. az-900
  # became free 2026-06-20 and broke this monitor; that's the whole reason these
  # steps use $CANARY_CERT instead of a hardcoded az-900.
  CANARY_CERT: az-104

permissions:
  issues: write
  contents: read

jobs:
  wait-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: ⏳ Wait for Cloudflare Pages deploy (3 min)
        run: sleep 180

      - name: 🩺 Health endpoint
        run: |
          BODY=$(curl -sf "$PROD_URL/guided/api/health")
          echo "$BODY" | python3 -m json.tool
          STATUS=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          if [ "$STATUS" != "healthy" ]; then
            echo "::error::Health endpoint reports $STATUS"
            exit 1
          fi

      - name: 📝 Questions JSON
        run: |
          curl -sf "$PROD_URL/guided/data/questions/$CANARY_CERT.json" \
            | head -c 50 | grep -q '\[{"meta"' \
            || (echo "::error::Questions JSON malformed" && exit 1)

      - name: 💳 Checkout API returns Stripe URL
        run: |
          RESP=$(curl -sf -X POST "$PROD_URL/guided/api/checkout" \
            -H "Content-Type: application/json" \
            -d "{\"productType\":\"cert\",\"certCode\":\"$CANARY_CERT\",\"vendorSlug\":\"microsoft\"}")
          echo "$RESP" | grep -q '"url":"https://checkout.stripe.com' \
            || (echo "::error::Checkout API did not return Stripe URL: $RESP" && exit 1)

      - name: 🆓 Free cert correctly refuses checkout (az-900 invariant)
        run: |
          # GROWING GUARDRAIL (2026-06-22): az-900 is free (guided FREE_CERTS), so
          # checkout MUST refuse it with HTTP 400. Turns the 2026-06-20 regression
          # into a tested invariant and documents why the paid canary is NOT az-900.
          CODE=$(curl -s -o /tmp/free.json -w "%{http_code}" -X POST "$PROD_URL/guided/api/checkout" \
            -H "Content-Type: application/json" \
            -d '{"productType":"cert","certCode":"az-900","vendorSlug":"microsoft"}')
          if [ "$CODE" != "400" ]; then
            echo "::error::Free cert az-900 checkout should return 400, got $CODE: $(cat /tmp/free.json)"
            exit 1
          fi
          grep -qi 'free\|no checkout required' /tmp/free.json \
            || (echo "::error::az-900 free-cert 400 body unexpected: $(cat /tmp/free.json)" && exit 1)
          echo "✅ Free cert az-900 correctly refused with 400"

      - name: 🎯 Practice page renders
        run: |
          curl -sf -o /dev/null -w "%{http_code}" "$PROD_URL/guided/$CANARY_CERT/practice/" | grep -q '^200$' \
            || (echo "::error::Practice page not 200" && exit 1)

      - name: 🔘 Cert landing has unlock button (no checkout-loop anchor)
        run: |
          BODY=$(curl -sf "$PROD_URL/guided/$CANARY_CERT/")
          # Must have button id (the 3 May fix)
          echo "$BODY" | grep -q 'id="cert-unlock-btn"' \
            || (echo "::error::Cert landing missing cert-unlock-btn" && exit 1)
          # Must NOT have the loop anchor (the 3 May bug)
          if echo "$BODY" | grep -q 'href="[^"]*?checkout=1'; then
            echo "::error::Cert landing has ?checkout=1 loop anchor (regression of 3 May bug)"
            exit 1
          fi

      - name: 🔘 Practice page has unlock button (no loop anchor)
        run: |
          BODY=$(curl -sf "$PROD_URL/guided/$CANARY_CERT/practice/")
          echo "$BODY" | grep -q 'id="practice-unlock-btn"' \
            || echo "::warning::Practice page missing practice-unlock-btn (may be intentional after activation flow change)"
          if echo "$BODY" | grep -q 'href="[^"]*?checkout=1'; then
            echo "::error::Practice page has ?checkout=1 loop anchor (regression of 3 May bug)"
            exit 1
          fi

      - name: ✅ All smoke checks passed
        run: echo "Production smoke tests green for commit ${{ github.sha }}"

  alert-on-failure:
    runs-on: ubuntu-latest
    needs: wait-and-test
    if: failure()
    steps:
      - name: 📣 Push to phone
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then
            echo "::warning::NTFY_TOPIC not set — skipping push"
            exit 0
          fi
          curl -s -X POST "https://ntfy.sh/$NTFY_TOPIC" \
            -H "Title: 🚨 Guided: post-deploy smoke FAILED" \
            -H "Priority: max" \
            -H "Tags: rotating_light,construction" \
            -H "Click: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "Production smoke test failed for commit ${{ github.sha }}. Customers may be unable to purchase or activate. Click for workflow run."

      - name: 🚨 Open GitHub issue
        # Targeting this repo (aguidetocloud-revamp) using github.token. Cross-repo
        # creation against susanthgit/guided isn't possible from this fine-grained
        # PAT (verified 2026-05-26).
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create guided-incident \
            --repo "${{ github.repository }}" \
            --color B60205 \
            --description "Failure in a workflow monitoring guided paid product" \
            2>/dev/null || true

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "🚨 Guided post-deploy smoke test FAILED" \
            --label guided-incident \
            --body "Post-deploy smoke test (running from aguidetocloud-revamp/.github/workflows/guided-post-deploy-smoke.yml) failed.

          **Action required:**
          1. Check https://www.aguidetocloud.com/guided/api/health
          2. Check Cloudflare Pages deployment logs for the 'guided' project
          3. [View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

          This is a paid product. Customers may be unable to purchase or activate. Treat as P0."
