name: 📊 Monthly Counter Refresh

on:
  schedule:
    - cron: '0 3 1 * *'  # 1st of every month at 3 AM UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-counters
  cancel-in-progress: true

jobs:
  refresh-counters:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: 🐍 Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies
        run: pip install google-analytics-data google-auth --quiet

      - name: 📊 Fetch GA4 data and update counters
        run: python scripts/refresh-counters.py

      - name: 💾 Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tool_counters.toml
          git diff --cached --quiet || git commit -m "📊 Counter refresh from GA4 — $(date -u +%Y-%m-%d)

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git pull --rebase || true
          git push
