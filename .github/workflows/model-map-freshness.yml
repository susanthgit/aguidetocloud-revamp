name: Model Map Freshness Check
on:
  schedule:
    - cron: '0 9 1,15 * *'  # 1st and 15th of each month at 9am UTC
  workflow_dispatch: {}

jobs:
  check-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install requests

      - name: Check Model Map data freshness
        id: check
        continue-on-error: true
        run: python scripts/check-model-map-freshness.py

      - name: Commit hash updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/model_map_hashes.json
          git diff --cached --quiet || git commit -m "chore: update model map freshness hashes [skip ci]"
          git pull --rebase
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue if changes detected
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔄 Copilot Model Map — Source pages changed',
              body: `The monthly freshness check detected changes in one or more Microsoft documentation pages monitored by the Copilot Model Map tool.\n\n**Action needed:** Review the changed pages and update \`data/copilot_model_map/*.toml\` if model assignments have changed.\n\nRun \`python scripts/check-model-map-freshness.py\` locally for details.\n\nSee workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['data-freshness', 'copilot-model-map']
            });
