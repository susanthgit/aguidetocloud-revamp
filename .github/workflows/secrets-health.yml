name: 🔑 Secrets & Pipeline Health Check

on:
  schedule:
    - cron: '0 4 1,15 * *'  # 1st & 15th at 4 AM UTC (4 PM NZST), before site-health
  workflow_dispatch:

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ secrets.PERSONAL_PAT }}
    steps:
      - name: Check PAT validity
        id: pat
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_PAT }}
        run: |
          echo "## 🔑 PAT & Pipeline Health Report" > report.md
          echo "" >> report.md
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> report.md
          echo "" >> report.md

          # Check if PAT works
          if [ -z "$GH_TOKEN" ]; then
            echo "### PAT Status: 🔴 NOT CONFIGURED" >> report.md
            echo "pat_broken=true" >> $GITHUB_OUTPUT
          else
            PAT_USER=$(gh api user --jq '.login' 2>/dev/null || echo "FAILED")
            if [ "$PAT_USER" = "FAILED" ]; then
              echo "### PAT Status: 🔴 EXPIRED/INVALID" >> report.md
              echo "pat_broken=true" >> $GITHUB_OUTPUT
            else
              echo "### PAT Status: ✅ Valid (user: $PAT_USER)" >> report.md
              echo "pat_broken=false" >> $GITHUB_OUTPUT
            fi
          fi
          echo "" >> report.md

      - name: Check pipeline repos last run
        id: pipelines
        if: steps.pat.outputs.pat_broken != 'true'
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_PAT }}
        run: |
          echo "### Pipeline Health" >> report.md
          echo "" >> report.md
          echo "| Pipeline | Last Run | Status | Age |" >> report.md
          echo "|----------|----------|--------|-----|" >> report.md

          ISSUES=0
          for REPO in "-ainews" "m365-roadmap" "service-health" "cert-tracker" "m365-deprecation-timeline"; do
            RESULT=$(gh run list --repo "susanthgit/$REPO" --limit 1 --json conclusion,updatedAt --jq '.[0]' 2>/dev/null)
            if [ -z "$RESULT" ]; then
              echo "| $REPO | ❌ No runs | — | — |" >> report.md
              ISSUES=$((ISSUES+1))
            else
              CONCLUSION=$(echo "$RESULT" | jq -r '.conclusion')
              UPDATED=$(echo "$RESULT" | jq -r '.updatedAt')
              AGE_HOURS=$(( ($(date -u +%s) - $(date -u -d "$UPDATED" +%s)) / 3600 ))

              STATUS="✅"
              if [ "$CONCLUSION" != "success" ]; then
                STATUS="🔴 $CONCLUSION"
                ISSUES=$((ISSUES+1))
              fi

              # Check staleness based on expected schedule
              STALE=""
              case "$REPO" in
                "-ainews")       [ $AGE_HOURS -gt 12 ] && STALE=" ⚠️ STALE" && ISSUES=$((ISSUES+1)) ;;
                "m365-roadmap")  [ $AGE_HOURS -gt 48 ] && STALE=" ⚠️ STALE" && ISSUES=$((ISSUES+1)) ;;
                "service-health") [ $AGE_HOURS -gt 6 ] && STALE=" ⚠️ STALE" && ISSUES=$((ISSUES+1)) ;;
                "cert-tracker")  [ $AGE_HOURS -gt 192 ] && STALE=" ⚠️ STALE" && ISSUES=$((ISSUES+1)) ;;
                "m365-deprecation-timeline") [ $AGE_HOURS -gt 48 ] && STALE=" ⚠️ STALE" && ISSUES=$((ISSUES+1)) ;;
              esac

              echo "| $REPO | ${UPDATED%T*} | $STATUS$STALE | ${AGE_HOURS}h |" >> report.md
            fi
          done

          echo "" >> report.md
          echo "issues=$ISSUES" >> $GITHUB_OUTPUT

      - name: Create issue if problems found
        if: steps.pat.outputs.pat_broken == 'true' || steps.pipelines.outputs.issues != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "" >> report.md
          echo "---" >> report.md
          echo "⚠️ **Action required** — check the items marked 🔴 or ⚠️ above." >> report.md
          echo "" >> report.md
          echo "**PAT rotation command:**" >> report.md
          echo '```' >> report.md
          echo '$pat = Get-Content "$env:USERPROFILE\.copilot\secrets\github-personal-pat"' >> report.md
          echo "@('-ainews','m365-roadmap','service-health','cert-tracker') | ForEach-Object { gh secret set PERSONAL_PAT --repo \"susanthgit/\$_\" --body \$pat }" >> report.md
          echo '```' >> report.md

          gh issue create \
            --repo "susanthgit/aguidetocloud-revamp" \
            --title "🔑 Secrets/Pipeline Health Alert — $(date -u '+%Y-%m-%d')" \
            --body "$(cat report.md)"

      - name: Summary (no issues)
        if: steps.pat.outputs.pat_broken != 'true' && steps.pipelines.outputs.issues == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "### ✅ All Clear" >> report.md
          echo "All pipelines healthy, PAT valid." >> report.md
          cat report.md >> $GITHUB_STEP_SUMMARY
