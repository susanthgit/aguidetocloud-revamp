name: cmd Tier 1 — Playwright diagnostic

# Runs the cmd Tier 1 regression suite on every push that touches the cmd
# planet. Catches regressions BEFORE they reach the live cmd.aguidetocloud.com
# (Cloudflare Pages auto-deploys, so this CI doesn't block deploys — but it
# DOES surface regressions promptly so Sush can revert quickly if needed).
#
# Why we run a real Hugo dev server + Playwright: cmd-pure unit tests cover
# logic, but the integration between cmd-terminal.js, the JSON adapter, and
# the rendered DOM only fails in a real page-load context (e.g. TDZ errors
# discovered in v2e errno mode round 2 — see brain-bar-lessons.md lesson 13).

on:
  push:
    branches: [main]
    paths:
      - 'brainbar/**'
      - '.github/workflows/cmd-tier1-check.yml'
  pull_request:
    paths:
      - 'brainbar/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cmd-tier1-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: brainbar

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js (22 for built-in test runner + ESM)
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@75d2e84710de30f6ff7268e08f310b60ef14033f # v3.0.0
        with:
          hugo-version: '0.159.1'
          extended: true

      - name: Install brainbar deps (smol-toml, playwright)
        run: npm install --no-audit --no-fund

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('brainbar/package-lock.json') }}

      - name: Install Playwright Chromium (with deps)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps even on cache hit
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Validator (license tree + skus)
        run: node scripts/validate-cmd-tree.mjs

      - name: Unit tests (cmd-pure.mjs)
        run: node --test test/cmd-pure.test.mjs

      - name: Hugo build (sanity check)
        run: hugo --quiet

      - name: Start Hugo dev server
        run: |
          hugo server --port 1315 --disableFastRender --bind 0.0.0.0 &
          echo $! > /tmp/hugo.pid
          # Poll for readiness (max ~90s)
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:1315/ > /dev/null 2>&1; then
              echo "✓ hugo server up"
              exit 0
            fi
            sleep 3
          done
          echo "✗ hugo server did not become ready in 90s"
          exit 1

      - name: Wait for cmd-index.json to be served
        run: |
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:1315/cmd-index.json | head -c 100 | grep -q '"entries"'; then
              echo "✓ cmd-index.json served"
              exit 0
            fi
            sleep 2
          done
          echo "✗ cmd-index.json never appeared"
          exit 1

      - name: Run Playwright diagnostic
        env:
          CMD_BASE_URL: http://localhost:1315/
          HEADLESS: 'true'
        run: node qa/cmd-tier1-diagnostic.mjs

      - name: Stop Hugo dev server
        if: always()
        run: |
          if [ -f /tmp/hugo.pid ]; then
            kill $(cat /tmp/hugo.pid) || true
          fi

  cmd-mcp-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@75d2e84710de30f6ff7268e08f310b60ef14033f # v3.0.0
        with:
          hugo-version: '0.159.1'
          extended: true

      - name: Build brainbar (creates cmd-index.json fixture for MCP tests)
        working-directory: brainbar
        run: hugo --quiet

      - name: Run MCP tests
        working-directory: brainbar-mcp
        run: node --test test/index.test.mjs
