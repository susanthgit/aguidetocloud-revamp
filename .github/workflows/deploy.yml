name: Build & Deploy to Azure Static Web Apps

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Setup Python for OG check
        if: github.event.action != 'closed'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check for stale OG images
        if: github.event.action != 'closed'
        id: og-check
        run: |
          pip install toml --quiet
          set +e
          python scripts/og-generator/generate_og.py --check
          EXIT_CODE=$?
          set -e
          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "needs_generation=false" >> $GITHUB_OUTPUT
          elif [ "$EXIT_CODE" -eq 1 ]; then
            echo "needs_generation=true" >> $GITHUB_OUTPUT
          else
            echo "ERROR: OG check failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

      - name: Generate stale OG images
        if: steps.og-check.outputs.needs_generation == 'true'
        run: |
          pip install playwright==1.58.0 toml --quiet
          playwright install chromium --with-deps
          python scripts/og-generator/generate_og.py --stale

      - name: Build site
        if: github.event.action != 'closed'
        run: hugo --minify

      - name: Build search index
        if: github.event.action != 'closed'
        run: npx pagefind@latest --site public

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: ${{ github.event.action == 'closed' && 'close' || 'upload' }}
          skip_app_build: true
          app_location: "public"
          api_location: "api"
