name: Build & OG Image Check

# Cloudflare Pages handles deployment automatically on push.
# This workflow only runs OG image staleness checks and generation.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  og-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.12'

      - name: Check for stale OG images
        id: og-check
        run: |
          pip install toml --quiet
          set +e
          python scripts/og-generator/generate_og.py --check
          EXIT_CODE=$?
          set -e
          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "needs_generation=false" >> $GITHUB_OUTPUT
          elif [ "$EXIT_CODE" -eq 1 ]; then
            echo "needs_generation=true" >> $GITHUB_OUTPUT
          else
            echo "ERROR: OG check failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

      - name: Generate stale OG images
        if: steps.og-check.outputs.needs_generation == 'true'
        run: |
          pip install playwright==1.58.0 toml --quiet
          playwright install chromium --with-deps
          python scripts/og-generator/generate_og.py --stale

      - name: Commit generated OG images
        if: steps.og-check.outputs.needs_generation == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/images/og/ scripts/og-generator/og_hashes.json
          git diff --cached --quiet || git commit -m "🖼️ Auto-generate stale OG images"
          git push
