name: 💾 Daily KV Backup

# Snapshots GUIDED_KV (licence records, session lookups, email mappings) to a
# GitHub Actions artifact every day at 03:00 UTC = 15:00 NZ. Retention 30 days.
#
# Recovery: download the latest artifact from the Actions UI, then re-PUT keys
# into KV via the CF API. Use this if KV ever gets corrupted, or to restore an
# accidentally-deleted record.
#
# Why GH artifacts (not R2): zero new infra, free, encrypted at rest, only
# accessible to repo maintainers. If we ever need longer retention or public
# URLs, we can switch to R2 later.

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC daily
  workflow_dispatch:

env:
  CF_ACCOUNT_ID: d42846fe2c29daf890ec57877fda5e04
  KV_NAMESPACE_ID: 49f5ddbc16c542ecb3ee92d767732bef

# Migrated from susanthgit/guided -> aguidetocloud-revamp on 2026-05-26.
# Still backs up guided's KV namespace (KV_NAMESPACE_ID is guided's).

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Dump all KV keys + values to a JSON file
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          mkdir -p backup
          STAMP=$(date -u +%Y-%m-%dT%H-%M-%SZ)
          OUT="backup/guided-kv-$STAMP.json"

          python3 - <<'PY' > "$OUT"
          import json, os, urllib.request, urllib.parse, time

          ACCOUNT = os.environ["CF_ACCOUNT_ID"]
          NS = os.environ["KV_NAMESPACE_ID"]
          TOK = os.environ["CF_API_TOKEN"]
          BASE = f"https://api.cloudflare.com/client/v4/accounts/{ACCOUNT}/storage/kv/namespaces/{NS}"

          def cf(path, **params):
              url = f"{BASE}{path}"
              if params:
                  url += "?" + urllib.parse.urlencode({k: v for k, v in params.items() if v is not None})
              req = urllib.request.Request(url, headers={"Authorization": f"Bearer {TOK}"})
              with urllib.request.urlopen(req, timeout=30) as r:
                  return r.read()

          all_keys = []
          cursor = None
          page = 0
          while True:
              page += 1
              data = json.loads(cf("/keys", limit=1000, cursor=cursor))
              all_keys.extend(data["result"])
              info = data.get("result_info", {})
              if data.get("result_info", {}).get("count", 0) < 1000 or not info.get("cursor"):
                  break
              cursor = info["cursor"]

          # Fetch each value (raw text — JSON parsing happens in the consumer)
          out = {
              "snapshotAt": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "namespaceId": NS,
              "keyCount": len(all_keys),
              "records": [],
          }

          for i, k in enumerate(all_keys):
              try:
                  val = cf(f"/values/{urllib.parse.quote(k['name'], safe='')}").decode("utf-8")
              except Exception as e:
                  val = None
                  print(f"WARN failed to fetch {k['name']}: {e}", flush=True)
              out["records"].append({
                  "key": k["name"],
                  "expiration": k.get("expiration"),
                  "value": val,
              })
              if (i + 1) % 100 == 0:
                  print(f"  {i+1}/{len(all_keys)} keys fetched", flush=True)

          print(json.dumps(out, indent=2))
          PY

          gzip -9 "$OUT"
          ls -lh backup/

      - name: 📤 Upload artifact (30-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: guided-kv-backup-${{ github.run_id }}
          path: backup/*.json.gz
          retention-days: 30
          compression-level: 0  # already gzipped

      - name: 📣 Push (only on failure)
        if: failure()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then exit 0; fi
          curl -s -X POST "https://ntfy.sh/$NTFY_TOPIC" \
            -H "Title: ⚠️ Guided: KV backup FAILED" \
            -H "Priority: default" \
            -H "Tags: warning,floppy_disk" \
            -d "Daily KV snapshot failed. [View run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
