<text x="620" y="52.099999999999994" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="26" fill="#000000" text-anchor="middle" xml:space="preserve">Designer vs Adobe Express vs Brand Kit — Which Do I Use?</text>
<text x="600" y="159.625" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="15" fill="#000000" text-anchor="middle" xml:space="preserve">Heads-up: Adobe Express is Adobe&apos;s free creative design tool (similar to Canva).</text>
<text x="600" y="178.375" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="15" fill="#000000" text-anchor="middle" xml:space="preserve">Inside Copilot Chat you call it with @Adobe Express to browse Adobe templates,</text>
<text x="600" y="197.125" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="15" fill="#000000" text-anchor="middle" xml:space="preserve">animate designs, and export back to Microsoft formats.</text>
<text x="600" y="319.05" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="18" fill="#000000" text-anchor="middle" xml:space="preserve">I need to create a visual</text>
<text x="600" y="415.6" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="16" fill="#000000" text-anchor="middle" xml:space="preserve">Is it going inside a PowerPoint deck</text>
<text x="600" y="435.6" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="16" fill="#000000" text-anchor="middle" xml:space="preserve">or Word document?</text>
<text x="815" y="404.9" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="14" fill="#000000" text-anchor="start" xml:space="preserve">YES</text>
<text x="1005" y="405.65" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="14" fill="#000000" text-anchor="middle" xml:space="preserve">✓ Use Office app + Brand Kit</text>
<text x="1005" y="423.15" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="14" fill="#000000" text-anchor="middle" xml:space="preserve">Drop in Brand Images</text>
<text x="1005" y="440.65" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="14" fill="#000000" text-anchor="middle" xml:space="preserve">from your OAL</text>
<text x="610" y="481.9" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="14" fill="#000000" text-anchor="start" xml:space="preserve">NO</text>
<text x="600" y="548.6" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="16" fill="#000000" text-anchor="middle" xml:space="preserve">Does it need animation, motion,</text>
<text x="600" y="568.6" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="16" fill="#000000" text-anchor="middle" xml:space="preserve">or magazine-style creative depth?</text>
<text x="815" y="539.9" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="14" fill="#000000" text-anchor="start" xml:space="preserve">YES</text>
<text x="1005" y="533.55" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="13" fill="#000000" text-anchor="middle" xml:space="preserve">✓ @Adobe Express agent</text>
<text x="1005" y="549.8" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="13" fill="#000000" text-anchor="middle" xml:space="preserve">in Copilot Chat</text>
<text x="1005" y="566.05" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="13" fill="#000000" text-anchor="middle" xml:space="preserve">(Brand Kit guides it less</text>
<text x="1005" y="582.3" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="13" fill="#000000" text-anchor="middle" xml:space="preserve">tightly — check brand manually)</text>
<text x="610" y="626.9" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="14" fill="#000000" text-anchor="start" xml:space="preserve">NO</text>
<text x="600" y="691.9" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="14" fill="#000000" text-anchor="middle" xml:space="preserve">✓ Microsoft Designer</text>
<text x="600" y="709.4" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="14" fill="#000000" text-anchor="middle" xml:space="preserve">in Copilot Create</text>
<text x="600" y="726.9" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="14" fill="#000000" text-anchor="middle" xml:space="preserve">(fast, on-brand static visuals:</text>
<text x="600" y="744.4" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="14" fill="#000000" text-anchor="middle" xml:space="preserve">banners, posters, infographics)</text>
<text x="600" y="877.575" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="17" fill="#000000" text-anchor="middle" xml:space="preserve">Brand Kit (colours, fonts, voice, imagery rules)</text>
<text x="600" y="898.825" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="17" fill="#000000" text-anchor="middle" xml:space="preserve">applies across ALL of these tools.</text>
<text x="600" y="920.075" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="17" fill="#000000" text-anchor="middle" xml:space="preserve">It&apos;s the rule book, not a tool you pick.</text>
<text x="1120" y="1000.2" font-family='"Comic Sans MS", "Marker Felt", system-ui, sans-serif' font-size="12" fill="#495057" text-anchor="end" xml:space="preserve">aguidetocloud.com — A Guide to Cloud</text>
</svg>