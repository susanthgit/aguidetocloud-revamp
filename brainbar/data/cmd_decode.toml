# ═══════════════════════════════════════════════════════════════════════════
# BRAIN BAR — DECODE REGISTRY  (errno mode)
# ═══════════════════════════════════════════════════════════════════════════
#
# Single source of truth for every cmd /decode/ entry. The Hugo content
# adapter at `content/decode/_content.gotmpl` generates one page per entry at
# the canonical URL `cmd.aguidetocloud.com/decode/<slug>/`.
#
# WHY THIS LIVES IN A SEPARATE FILE FROM cmd_entries.toml:
#   Per the parallel-session decision (cosmos-todo.md § P2, 5 May 2026):
#   "cmd is currently a synonym translator. Error codes are a sibling
#   job. Mixing them into one search dilutes both." → /decode/ is a separate
#   subsection with its own data + render path. Same planet, different surface.
#
# DESIGN RULES:
#   1. `code` is the display form (preserves case, e.g. "AADSTS50105" or
#      "0x80070005"). `slug` is the URL form (lowercase, hyphenated).
#   2. `slug` MUST be globally unique across this file (validator enforces).
#   3. `namespace` is one of: AADSTS · HRESULT · INTUNE · KB · GRAPH.
#   4. `last_verified` MUST be within 365 days at deploy time.
#   5. `related` may reference OTHER decode slugs OR brainbar entry slugs in
#      cmd_entries.toml — the renderer detects which.
#   6. NO spicy editorial voice on decode entries. Error codes earn their
#      keep by being right, not opinionated. (Voice mismatch — see P2 doc.)
#
# WHEN ADDING A NEW ENTRY:
#   1. Add the entry block here (validator runs on next build)
#   2. Bump cache_version in hugo.toml so the new entry shows up in the index
#   3. Run `cd brainbar && hugo` — the page is auto-generated at /decode/<slug>/
#
# ═══════════════════════════════════════════════════════════════════════════

# ── 1. AADSTS50105 — User not assigned to role ────────────────────────────
[[entries]]
code          = "AADSTS50105"
slug          = "aadsts50105"
namespace     = "AADSTS"
short         = "User not assigned to the app or role"
plain_english = "Sign-in worked, but this user account isn't assigned to the application (or its role). Microsoft Entra returns AADSTS50105 when an enterprise app has 'User assignment required' set to Yes and the signed-in user — or a group they're in — isn't on the Users and groups list for that app."
likely_cause  = [
  "Enterprise application has 'Assignment required' = Yes and the user (or their group) is not assigned",
  "App role exists but the user is assigned to a different role than the one the app is requesting",
  "Group-based assignment relies on a dynamic group rule that hasn't evaluated the user yet",
  "Conditional Access App Filter excluded the user from the assigned scope",
]
fix = [
  "Entra portal → Identity → Applications → Enterprise applications → <app> → Users and groups → Add user/group",
  "If the app uses roles: assign the user to the specific role the app expects (check the app's documentation for which role to use)",
  "If group-based: confirm the user is a member, and that any dynamic group rule has evaluated (Members tab shows the user)",
  "Check Sign-in logs → Failure → AADSTS50105 to see the exact app and user that failed",
]
seen_in       = ["Entra ID interactive sign-in", "Enterprise application launch", "Microsoft Graph", "OAuth 2.0 / OpenID Connect token requests"]
related       = ["aadsts65001", "entra-p1", "pim"]
learn_url     = "https://learn.microsoft.com/en-us/entra/identity-platform/reference-error-codes"
last_verified = "2026-05-05"

# ── 2. AADSTS65001 — Admin consent not granted ────────────────────────────
[[entries]]
code          = "AADSTS65001"
slug          = "aadsts65001"
namespace     = "AADSTS"
short         = "User or admin has not consented to the application"
plain_english = "The app is asking for permissions that nobody has consented to — usually because the app needs admin consent and only an admin can grant it on behalf of users. Until consent is granted, every sign-in to that app fails with AADSTS65001."
likely_cause  = [
  "App requests delegated permissions that require admin consent (e.g. Directory.Read.All, Group.ReadWrite.All)",
  "Tenant has 'Users can consent to apps' set to No, so users can't self-consent even for low-risk scopes",
  "App permissions (application-only) requested but never admin-consented",
  "Consent was previously revoked from the Enterprise application's Permissions tab",
]
fix = [
  "Open the consent URL with an admin account: https://login.microsoftonline.com/<tenant>/adminconsent?client_id=<app-id>",
  "OR: Entra portal → Enterprise applications → <app> → Security → Permissions → Grant admin consent for <tenant>",
  "If users should self-consent for low-risk scopes: Identity → Enterprise apps → Consent and permissions → User consent settings → 'Allow user consent for apps from verified publishers, for selected permissions'",
  "Confirm the app registration's API permissions match what the app actually requests at runtime — mismatched scopes also surface as 65001",
]
seen_in       = ["Entra ID interactive sign-in", "Microsoft Graph", "Custom app first-run", "Power Platform connectors"]
related       = ["aadsts50105", "entra-p1"]
learn_url     = "https://learn.microsoft.com/en-us/entra/identity-platform/application-consent-experience"
last_verified = "2026-05-05"

# ── 3. AADSTS50158 — External security challenge required ─────────────────
[[entries]]
code          = "AADSTS50158"
slug          = "aadsts50158"
namespace     = "AADSTS"
short         = "External security challenge not satisfied"
plain_english = "Entra redirected the user to an external security provider (a federation IdP, a third-party MFA service, or a Conditional Access Terms of Use page) and the challenge wasn't completed. Sign-in is interrupted, not denied — complete the external challenge and retry."
likely_cause  = [
  "Conditional Access Terms of Use is required and the user hasn't accepted it yet",
  "Tenant uses a third-party / federated MFA provider and the user didn't satisfy the prompt",
  "Federation to an on-prem ADFS / external IdP failed mid-flow",
  "User cancelled or timed out on the external provider's screen",
]
fix = [
  "Have the user complete the external challenge (re-accept Terms of Use, complete the third-party MFA prompt) and retry",
  "Entra portal → Protection → Conditional Access → Sign-in logs → find the failure → expand 'Conditional Access' to see the policy that interrupted",
  "If federated: check the federation IdP's logs (ADFS event logs, Okta system log, Ping audit) for the matching failure",
  "For Terms of Use: Entra → Protection → Conditional Access → Terms of use → confirm assignment + the user hasn't been removed from the audience",
  "Note: device-compliance failures usually surface as AADSTS53000, not 50158",
]
seen_in       = ["Entra ID interactive sign-in", "Federated tenant sign-in", "Third-party MFA flows", "Conditional Access Terms of Use"]
related       = ["aadsts50105", "entra-p1", "pim"]
learn_url     = "https://learn.microsoft.com/en-us/entra/identity-platform/reference-error-codes"
last_verified = "2026-05-05"

# ── 4. AADSTS50034 — User not found in directory ──────────────────────────
[[entries]]
code          = "AADSTS50034"
slug          = "aadsts50034"
namespace     = "AADSTS"
short         = "User account doesn't exist in this directory"
plain_english = "The username doesn't resolve to any account in the tenant the app is signing into. Almost always a wrong-tenant problem (B2B guest expected but missing, personal account hitting work tenant, deleted account, or typo)."
likely_cause  = [
  "User typed the wrong UPN or signed in to the wrong tenant entirely",
  "External user expected as a B2B guest but no guest invitation was redeemed",
  "User account was deleted or soft-deleted (still in the recycle bin)",
  "User has a personal Microsoft Account but the app only accepts work/school accounts",
]
fix = [
  "Confirm the UPN — Entra portal → Identity → Users → search the UPN. If absent, check Deleted users.",
  "For external collaborators: Entra → External Identities → All users → invite as guest, then have them redeem the invitation email",
  "If the user has both a personal and work account: have them choose 'Work or school account' on the account picker",
  "Check Sign-in logs to confirm the correct tenant ID was hit — wrong-tenant typos surface here as 50034 every time",
]
seen_in       = ["Entra ID interactive sign-in", "B2B guest first-time access", "Microsoft 365 sign-in"]
related       = ["aadsts50105"]
learn_url     = "https://learn.microsoft.com/en-us/entra/identity-platform/reference-error-codes"
last_verified = "2026-05-05"

# ── 5. AADSTS900971 — No reply address provided ───────────────────────────
[[entries]]
code          = "AADSTS900971"
slug          = "aadsts900971"
namespace     = "AADSTS"
short         = "App registration is missing a redirect URI"
plain_english = "The OAuth/OIDC flow needs to know where to send the user back after authentication. The app didn't send a redirect_uri in the request and there isn't a default one configured on the app registration. App-reg config error, not a user error."
likely_cause  = [
  "App registration has zero redirect URIs configured for the platform being used (Web / SPA / Mobile)",
  "The auth library didn't include redirect_uri in the request and there's no default registered",
  "Redirect URI was registered on the wrong platform tab (e.g. SPA URI registered under Web)",
  "Note: a redirect_uri value that doesn't MATCH a registered URI surfaces as AADSTS50011, not 900971",
]
fix = [
  "Entra portal → Identity → App registrations → <app> → Authentication → add the platform (Web / SPA / Mobile) and the redirect URI",
  "Confirm the URI matches EXACTLY what the app sends (including https vs http, trailing slash, port number)",
  "For SPA apps using MSAL.js: the URI must be on the Single-page application platform, NOT Web",
  "Check the app's code/config for the redirect_uri value — that's the literal string Entra expects to find on the registration",
]
seen_in       = ["Custom app first run", "App registration setup", "Postman or local development against Entra"]
related       = ["aadsts65001"]
learn_url     = "https://learn.microsoft.com/en-us/entra/identity-platform/reply-url"
last_verified = "2026-05-05"

# ── 6. 0x80070005 — Access denied ─────────────────────────────────────────
[[entries]]
code          = "0x80070005"
slug          = "0x80070005"
namespace     = "HRESULT"
short         = "E_ACCESSDENIED — the calling process doesn't have permission"
plain_english = "Win32 facility-7 (Win32 errors) error 5 — ACCESS_DENIED — wrapped in HRESULT form. The thread doesn't have rights to do what it tried to do: open a file, write to a registry key, modify a service, call an API, anything. UAC, ACL, or token elevation is the usual cause."
likely_cause  = [
  "UAC: process needs to run elevated and isn't (Run as administrator)",
  "DACL on the target file/folder/registry key denies the user's SID",
  "Endpoint protection or Defender ASR rule blocking the action",
  "Service account lacks the right ('Log on as a service', 'Replace process-level token', etc.)",
  "GPO 'User Rights Assignment' has revoked the privilege the action needs",
]
fix = [
  "Re-run the action elevated (right-click → Run as administrator)",
  "Inspect effective permissions: Get-Acl <path> | Format-List, or icacls <path>",
  "Check Defender ASR rules: Get-MpPreference | Select AttackSurfaceReductionRules_Ids",
  "If a service: confirm the service account has the required user right (secpol.msc → Local Policies → User Rights Assignment)",
  "Event Viewer → Security → audit-failure events around the time of the error often name the exact missing right",
]
seen_in       = ["Win32 file/registry/service operations", "PowerShell module loading", "MSI installs", "Group Policy processing"]
related       = ["0x80004005"]
learn_url     = "https://learn.microsoft.com/en-us/windows/win32/debug/system-error-codes--0-499-"
last_verified = "2026-05-05"

# ── 7. 0x80004005 — Unspecified failure ───────────────────────────────────
[[entries]]
code          = "0x80004005"
slug          = "0x80004005"
namespace     = "HRESULT"
short         = "E_FAIL — generic 'something went wrong'"
plain_english = "The most useless of useful error codes. E_FAIL is 'unspecified error' — it tells you a COM/Win32 call failed but not why. The cause is somewhere in the calling component's logs (Outlook OST, network share, COM activation, COM automation, Hyper-V, MSI). Treat this code as a starting point, not an answer."
likely_cause  = [
  "Outlook: OST/PST corruption or a SharePoint/share with broken auth",
  "Network share: SMB signing mismatch, NTLM blocked, or Kerberos delegation failure",
  "COM/DCOM: activation permission denied, server unreachable, or port blocked",
  "Hyper-V: VM config mismatch, integration services missing, or storage driver fault",
  "MSI installs: a custom action returned the wrong code or a prerequisite isn't installed",
]
fix = [
  "Find the component that raised it: Event Viewer → Application + System logs filtered to the time of the error",
  "For Outlook: scanpst.exe on the OST/PST, or recreate the profile",
  "For COM: Component Services (dcomcnfg) → check launch/access permissions on the failing CLSID",
  "For network shares: \\\\server\\share over UNC vs DNS name, capture an SMB trace if reproducible",
  "Always pair this code with the calling component's own log — Outlook ETL, Hyper-V Worker log, MSI verbose log, etc.",
]
seen_in       = ["Outlook send/receive", "Network share access", "COM/DCOM activation", "Hyper-V VM start", "MSI installer custom actions"]
related       = ["0x80070005"]
learn_url     = "https://learn.microsoft.com/en-us/openspecs/windows_protocols/ms-erref/0642cb2f-2075-4469-918c-4441e69c548a"
last_verified = "2026-05-05"

# ── 8. 0x800F0922 — Windows Update install failed ─────────────────────────
[[entries]]
code          = "0x800F0922"
slug          = "0x800f0922"
namespace     = "HRESULT"
short         = "Windows Update install/cleanup failed (component store / connectivity / disk)"
plain_english = "Windows Update couldn't complete a component-store install or cleanup. Most common causes are component-store corruption, .NET payload failures, low disk space, or connectivity blocking access to the update servers. (Note: KB5034441's notorious WinRE-too-small failure surfaces as 0x80070643, not 0x800F0922.)"
likely_cause  = [
  "Component store (WinSxS) is corrupted",
  "Free disk space too low on system drive",
  "Network blocking access to WSUS / Microsoft Update during install",
  ".NET Framework install failed inside the update payload",
  "System reserved partition is full or has no free space for staging",
]
fix = [
  "Run DISM repairs: DISM /Online /Cleanup-Image /RestoreHealth then sfc /scannow",
  "Check disk space: at least 20GB free on C: for feature updates, 5GB for security updates",
  "Review the CBS log at C:\\Windows\\Logs\\CBS\\CBS.log around the failure timestamp for the actual blocking error",
  "Confirm the device can reach Microsoft Update endpoints (or your WSUS) — proxy/firewall changes are a frequent cause",
  "If repeated on a single device: try Microsoft's Show or hide updates troubleshooter, or skip the update via WSUS/Intune for that ring",
  "If you're chasing a WinRE partition issue (KB5034441 era), look up 0x80070643 — that's the matching error code",
]
seen_in       = ["Windows Update", "WSUS deployments", "Intune Update Rings", "Feature update installs"]
related       = ["kb5034441"]
learn_url     = "https://learn.microsoft.com/en-us/troubleshoot/windows-client/setup-upgrade-and-drivers/windows-update-issues-troubleshooting"
last_verified = "2026-05-05"

# ── 9. 0x80180014 — Intune MDM enrollment failed ──────────────────────────
[[entries]]
code          = "0x80180014"
slug          = "0x80180014"
namespace     = "INTUNE"
short         = "MDM enrolment blocked — 'organisation does not support this version of Windows'"
plain_english = "Intune refused to enrol the device with the user-facing message 'Your organization does not support this version of Windows'. The actual cause is almost always Intune's enrolment restrictions blocking Windows MDM enrolment for this user, group, or device type — not a real Windows version problem."
likely_cause  = [
  "Intune enrolment restriction has Windows (MDM) set to Block on the device-type platform settings",
  "Personal Windows enrolment is blocked but the device was enrolled as personally-owned",
  "Enrolment restriction policy is scoped to a group that doesn't include this user",
  "Custom enrolment restriction blocks specific Windows versions (e.g. Home edition, or below a min build)",
  "Less common: clock skew >5 min breaks the certificate request — enrolment fails before reaching the restriction policy",
]
fix = [
  "Intune admin centre → Devices → Enrollment → Enrollment restrictions → Default (or the assigned restriction) → Properties → Platform settings → set Windows (MDM) = Allow",
  "Confirm Personally-owned vs Corporate-owned column is set the way you want — Block on either side will surface as 0x80180014",
  "If using a custom restriction: check assignments → ensure the user/group is in scope and the restriction allows this Windows edition + build",
  "Re-run enrolment on the device after the restriction change (it's near-realtime, no Intune sync needed for a fresh enrolment attempt)",
  "If the user's clock is >5 min off: sync with time.windows.com first, then retry",
  "Pull MDM diagnostics for confirmation: Settings → Accounts → Access work or school → Info → Export",
]
seen_in       = ["Intune device enrolment", "Autopilot first-run experience", "BYOD self-enrolment via Company Portal"]
related       = []
learn_url     = "https://learn.microsoft.com/en-us/intune/intune-service/enrollment/troubleshoot-windows-enrollment-errors"
last_verified = "2026-05-05"

# ── 10. KB5034441 — January 2024 WinRE update (CVE-2024-20666) ────────────
[[entries]]
code          = "KB5034441"
slug          = "kb5034441"
namespace     = "KB"
short         = "Retired Jan 2024 WinRE update — failed with 0x80070643 if WinRE partition was too small"
plain_english = "A January 2024 Windows 10 security update for a BitLocker bypass (CVE-2024-20666). It became infamous because installation fails with 0x80070643 (NOT 0x800F0922) on millions of OEM laptops whose WinRE recovery partition was too small. Microsoft has since retired this specific KB; current remediation is to ensure WinRE is healthy (~250MB free, version >= 10.0.19041.3920) — Microsoft now ships the WinRE update via the regular monthly cadence."
likely_cause  = [
  "WinRE recovery partition has less than 250MB free space",
  "WinRE partition placement on disk prevents extending it via Disk Management",
  "WinRE is disabled (reagentc /info shows Windows RE status = Disabled)",
  "Third-party recovery solution has replaced or moved the WinRE partition",
]
fix = [
  "Run reagentc /info — note WinRE status, location, version, and partition",
  "If WinRE is disabled: reagentc /enable",
  "If partition is too small: follow KB5028997 to manually shrink the OS partition by 250MB and extend WinRE",
  "Confirm WinRE version is at least 10.0.19041.3920 (the patched payload). If older, run Windows Update — current monthly LCUs carry the WinRE refresh.",
  "For fleets: deploy the KB5028997 PowerShell script via Intune Win32 app or Configuration Manager package before WinRE updates land",
]
seen_in       = ["Historical: Windows Update on Win10 21H2/22H2", "WSUS catalogue", "Intune Update Rings (Windows 10)", "Manual MSU install"]
related       = ["0x800f0922"]
learn_url     = "https://support.microsoft.com/en-us/topic/kb5034441-windows-recovery-environment-update-for-windows-10-version-21h2-and-22h2-january-9-2024-62c04204-aaa5-4fee-a02a-2fdea17075a8"
last_verified = "2026-05-05"
