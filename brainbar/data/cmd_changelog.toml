# BRAIN BAR — RELEASE CHANGELOG
# ═══════════════════════════════════════════════════════════════════════════
#
# Newest first. Rendered by layouts/_default/changelog.html at /changelog/.
#
# ENTRY SHAPE:
#   date         = "YYYY-MM-DD"
#   title        = "short release headline"
#   tag          = "feature" | "polish" | "content" | "infra" | "launch"
#   summary      = "1–3 sentence plain-English description"
#   highlights   = ["bullet", "bullet", ...]   (optional)
#   commit       = "git short SHA(s)"          (optional)
#
# Each release is one [[releases]] block. Add new releases at the top.
# ═══════════════════════════════════════════════════════════════════════════

[[releases]]
date    = "2026-05-05"
title   = "errno mode — /decode/ launches"
tag     = "feature"
summary = "cmd gains a sibling surface for Microsoft error codes. Paste an AADSTS code, an HRESULT (0x...), an Intune MDM error, or a KB number, and get a plain-english explainer plus the most-likely fix path. Same terminal, same green prompt — red is used only as a severity glyph on the result card."
highlights = [
  "/decode/ landing — instant client-side filter over the curated error catalogue",
  "10 seed codes covering AADSTS · HRESULT · INTUNE · KB",
  "Each entry: in-plain-english · most likely causes · fix path · seen in · related",
  "Cross-links: related lists detect whether the slug points to a decode entry or an existing cmd entry, and route accordingly",
  "Boot block on home gets // decode error as a new utility link",
]

