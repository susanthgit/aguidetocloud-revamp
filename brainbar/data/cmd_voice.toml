sush_take_status = "spicy"

[windows-365]
mascot = "🖥️ The fixed-price Cloud PC"
sush_take = "AVD is a power tool — you build the multi-session host, you size it, you optimise it. Windows 365 is a fixed-price contract — Microsoft hands you a Cloud PC. Different shape, different bill, different audience. Pick on audience first, price second."
