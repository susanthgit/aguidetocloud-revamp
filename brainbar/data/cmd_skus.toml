# ═══════════════════════════════════════════════════════════════════════════
# cmd · License SKU GUID → slug map
# ═══════════════════════════════════════════════════════════════════════════
#
# Microsoft's published licensing reference assigns a stable GUID to each
# subscription SKU. When admins paste a SKU GUID into cmd (e.g., from
# `Get-MgSubscribedSku` or a CSV), the smart-suggest matcher resolves it to
# the cmd entry slug via this table.
#
# Source of truth (Microsoft published list):
# https://learn.microsoft.com/en-us/entra/identity/users/licensing-service-plan-reference
#
# Top-30 most common SKUs seeded for v1. Add more as needed — adapter exposes
# the whole table via /cmd-index.json under the `skus` field.
#
# Schema:
#   guid: the GUID Microsoft uses to identify the SKU
#   sku:  Microsoft's own SKU partNumber (the human-readable code)
#   slug: the cmd_entries.toml slug this resolves to (or "" if no entry yet)
#
# Validation: validate-cmd-tree.mjs checks every non-empty `slug` references
# an existing entry in cmd_entries.toml.
# ═══════════════════════════════════════════════════════════════════════════

