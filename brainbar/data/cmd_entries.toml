# ═══════════════════════════════════════════════════════════════════════════
# BRAIN BAR — ENTRY REGISTRY
# ═══════════════════════════════════════════════════════════════════════════
#
# This is the single source of truth for every Brain Bar entry. The Hugo
# content adapter at `content/_content.gotmpl` generates one page per entry
# at the canonical URL `cmd.aguidetocloud.com/<slug>/`.
#
# DESIGN RULES:
# 1. `slug` MUST be globally unique across all `slug` values AND all
#    `terms.aliases` values (validator enforces).
# 2. `learn_url` is REQUIRED for kind = product | portal | feature.
# 3. `last_verified` MUST be within 365 days at deploy time.
# 4. Sush's voice (mascot, sush_take) lives in `cmd_voice.toml` — keyed by
#    slug. The entity layer here is reusable for Shift / MCP / Grandma.
# 5. Neutral-by-default voice; spicy take only when there is genuine
#    conviction. Silence > forced fit.
#
# WHEN ADDING A NEW ENTRY:
#   1. Add the entry block here (validator catches collisions on next build)
#   2. Optionally add a voice block to cmd_voice.toml
#   3. Run `cd brainbar && hugo` — the page is auto-generated
#
# ═══════════════════════════════════════════════════════════════════════════

